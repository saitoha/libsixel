# SPDX-License-Identifier: MIT
#
# Native file for building with the Microsoft C toolchain from an environment
# where vcvarsall.bat has already populated PATH, INCLUDE, and LIB.
#
# Usage:
#   meson setup builddir --native-file build-aux/meson-native/msvc.ini
#
# The GitHub Actions helper layers a generated msvc-vcpkg.ini file on top of
# this native file when vcpkg package metadata is needed.

[binaries]
c = 'cl'
ar = 'lib'
