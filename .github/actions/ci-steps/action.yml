name: libsixel CI steps

description: >-
  Composite action that runs the build and test steps for the CI matrix.

inputs:
  matrix_json:
    description: JSON-encoded matrix entry for CI configuration.
    required: true
  github_token:
    description: Token used for Coveralls uploads.
    required: true

runs:
  using: composite
  steps:
    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Load matrix inputs
      shell: bash
      run: |
        printf '%s\n' "CI_EXEC_TYPE=${{ fromJSON(inputs.matrix_json).exec_type || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_EXTRA_PACKAGES=${{ fromJSON(inputs.matrix_json).extra_packages || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_BUILDTOOL=${{ fromJSON(inputs.matrix_json).buildtool || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_RUNNER=${{ fromJSON(inputs.matrix_json).runner || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_SETUP_PREFIX=${{ fromJSON(inputs.matrix_json).setup_prefix || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_SETUP_OPTIONS=${{ fromJSON(inputs.matrix_json).setup_options || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_CHECK_TARGET=${{ fromJSON(inputs.matrix_json).check_target || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_MAKE=${{ fromJSON(inputs.matrix_json).make || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_GUEST_PACKAGES=${{ fromJSON(inputs.matrix_json).guest_packages || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_CP_OS=${{ fromJSON(inputs.matrix_json).cp_os || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_CP_ARCH=${{ fromJSON(inputs.matrix_json).cp_arch || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_CP_VERSION=${{ fromJSON(inputs.matrix_json).cp_version || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_VERSION=${{ fromJSON(inputs.matrix_json).version || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_MSYSTEM=${{ fromJSON(inputs.matrix_json).msystem || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_VCPKG_PACKAGES=${{ fromJSON(inputs.matrix_json).vcpkg_packages || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_PIP_PACKAGES=${{ fromJSON(inputs.matrix_json).pip_packages || '' }}" >> "$GITHUB_ENV"
        printf '%s\n' "CI_LABEL=${{ fromJSON(inputs.matrix_json).label || '' }}" >> "$GITHUB_ENV"

    - name: Install extra packages (Linux)
      if: >-
        ${{ runner.os == 'Linux'
            && env.CI_EXEC_TYPE == 'bash'
            && env.CI_EXTRA_PACKAGES != '' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends ${{ env.CI_EXTRA_PACKAGES }}

    - name: Install extra packages (macOS)
      if: ${{ runner.os == 'macOS' && env.CI_EXTRA_PACKAGES != '' }}
      shell: bash
      run: |
        #brew update
        brew install ${{ env.CI_EXTRA_PACKAGES }}

    - name: Install extra packages (FreeBSD)
      if: >-
        ${{ env.CI_EXEC_TYPE == 'cross-platform-vms'
            && env.CI_CP_OS == 'freebsd'
            && env.CI_EXTRA_PACKAGES != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ env.CI_CP_OS }}
        architecture: ${{ env.CI_CP_ARCH }}
        version: ${{ env.CI_CP_VERSION }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          #sudo pkg update -f
          sudo pkg install -y ${{ env.CI_EXTRA_PACKAGES }}

    - name: Install extra packages (NetBSD)
      if: >-
        ${{ env.CI_EXEC_TYPE == 'cross-platform-vms'
            && env.CI_CP_OS == 'netbsd'
            && env.CI_EXTRA_PACKAGES != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ env.CI_CP_OS }}
        architecture: ${{ env.CI_CP_ARCH }}
        version: ${{ env.CI_CP_VERSION }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          #sudo pkgin -y update
          sudo pkgin -y install ${{ env.CI_EXTRA_PACKAGES }}
          if [ -f /var/db/pkgin/pkg_install-err.log ]; then
            cp /var/db/pkgin/pkg_install-err.log "$GITHUB_WORKSPACE/pkg_install-err.log" || true
          fi

    - name: Install extra packages (OpenBSD)
      if: >-
        ${{ env.CI_EXEC_TYPE == 'cross-platform-vms'
            && env.CI_CP_OS == 'openbsd'
            && env.CI_EXTRA_PACKAGES != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ env.CI_CP_OS }}
        architecture: ${{ env.CI_CP_ARCH }}
        version: ${{ env.CI_CP_VERSION }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          sudo pkg_add ${{ env.CI_EXTRA_PACKAGES }}

    - name: Install extra packages (Haiku)
      if: >-
        ${{ env.CI_EXEC_TYPE == 'cross-platform-vms'
            && env.CI_CP_OS == 'haiku'
            && env.CI_EXTRA_PACKAGES != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ env.CI_CP_OS }}
        architecture: ${{ env.CI_CP_ARCH }}
        version: ${{ env.CI_CP_VERSION }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          pkgman refresh
          pkgman install -y ${{ env.CI_EXTRA_PACKAGES }}

    - name: Setup MSVC developer env (vcvars, x86_64 target)
      if: ${{ env.CI_RUNNER == 'windows-latest' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup MSVC developer env (vcvars, arm64 target)
      if: ${{ env.CI_RUNNER == 'windows-11-arm' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_arm64

    - name: Save MSVC env:Path
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      run: |
        "MSVC_PATH=$env:Path" >> $env:GITHUB_ENV

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ env.CI_VCPKG_PACKAGES != '' }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ env.CI_VCPKG_PACKAGES || 'none' }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, vcpkg deps)
      if: ${{ env.CI_VCPKG_PACKAGES != '' }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
          git init $vcpkgRoot
        }
        git -C $vcpkgRoot remote remove origin 2>$null
        git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

        git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
        git -C $vcpkgRoot reset --hard FETCH_HEAD

        Set-Location $vcpkgRoot

        cmd /c bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        $extra = '${{ env.CI_VCPKG_PACKAGES }}'.Trim()
        if ($extra -ne '') {
          $packages += $extra -split '\s+'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows)
      if: ${{ env.CI_MSYSTEM != '' }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ env.CI_MSYSTEM }}
        #update: true
        install: ${{ env.CI_EXTRA_PACKAGES || 'make' }}

    - name: Create junction to Git for Windows
      if: ${{ env.CI_EXEC_TYPE == 'gitbash' }}
      shell: pwsh
      run: |
        if (!(Test-Path 'C:\GitBash')) {
          New-Item -ItemType Junction -Path 'C:\GitBash' -Target 'C:\Program Files\Git' | Out-Null
        }
        'C:\GitBash\bin'     | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        'C:\GitBash\usr\bin' | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    - name: Setup Cygwin
      if: ${{ env.CI_EXEC_TYPE == 'cygwin' }}
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: ${{ env.CI_EXTRA_PACKAGES || 'make' }}

    - name: Cache Cosmopolitan toolchain
      if: ${{ contains(env.CI_SETUP_PREFIX, 'CC=cosmocc') }}
      uses: actions/cache@v4
      with:
        path: cosmopolitan/cosmocc.zip
        key: cosmocc-${{ hashFiles('cosmopolitan/cosmocc.zip') }}

    - name: Prepare Cosmopolitan toolchain
      if: ${{ contains(env.CI_SETUP_PREFIX, 'CC=cosmocc') }}
      shell: bash
      run: |
        set -exv
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -q cosmopolitan/cosmocc.zip
        chmod +x bin/cosmo*

    - name: Prepare Emscripten toolchain
      if: ${{ contains(env.CI_LABEL, 'emscripten') }}
      shell: bash
      run: |
        set -exv
        git clone --depth 1 https://github.com/emscripten-core/emsdk.git
        sh emsdk/emsdk install latest
        sh emsdk/emsdk activate latest
        echo "$PWD/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

    - name: Install pip packages
      if: ${{ env.CI_PIP_PACKAGES != '' }}
      shell: bash
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install -U pip ${{ env.CI_PIP_PACKAGES }}
        if command -v cygpath; then
          echo "$(cygpath -w "$PWD/.venv/bin")" >> "$GITHUB_PATH"
        else
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
        fi

    - name: Build and test (Autotools, bash)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'bash' }}
      shell: bash
      run: |
        set -exv
        export PATH="$PWD/build-aux:$PWD/bin:$PATH"
        ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
        ${{ env.CI_MAKE || 'make' }} V=1
        ${{ env.CI_MAKE || 'make' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Build and test (Meson, bash)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'bash' }}
      shell: bash
      run: |
        set -exv
        export PATH="$PWD/build-aux:$PWD/bin:$PATH"
        ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
        meson compile -C builddir -v
        meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Build and test (Autotools, msys2)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
        PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
        ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
        ${{ env.CI_MAKE || 'make' }} V=1
        ${{ env.CI_MAKE || 'make' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Build and test (Meson, msys2)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
        PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
        ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
        meson compile -C builddir -v
        meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Build and test (Autotools, Cygwin)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
        ${{ env.CI_MAKE || 'make' }} V=1
        ${{ env.CI_MAKE || 'make' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Build and test (Meson, Cygwin)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
        meson compile -C builddir -v
        if grep ^ac_cv_prog_ac_ct_CC=gcc$ config.log; then
          meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir
        else
          : # cross build: don't run test
        fi

    - name: Build and test (Meson, Command Prompt)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'cmd' }}
      shell: cmd
      run: |
        setlocal ENABLEDELAYEDEXPANSION
        python -m pip install --upgrade pip
        if errorlevel 1 exit /b !errorlevel!
        python -m pip install meson
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain setup builddir ${{ env.CI_SETUP_OPTIONS }}
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain compile -C builddir
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir
        if errorlevel 1 exit /b !errorlevel!
        endlocal

    - name: Build and test (Autotools, Alpine container)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'alpine' }}
      shell: bash
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          set -xve
          apk add --no-cache ${{ env.CI_GUEST_PACKAGES }}
          addgroup -g '"$(id -g)"' hostgrp 2>/dev/null || true
          adduser  -D -u '"$(id -u)"' -G hostgrp hostusr 2>/dev/null || true
          chown -R '"$(id -u):$(id -g)"' /src
          su hostusr -c "
            ./configure ${{ env.CI_SETUP_OPTIONS }}
            ${{ env.CI_MAKE || 'make' }} V=1
            ${{ env.CI_MAKE || 'make' }} ${{ env.CI_CHECK_TARGET || 'check' }}
          "
        '

    - name: Build and test (Meson, Alpine container)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'alpine' }}
      shell: bash
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          set -xve
          apk add --no-cache ${{ env.CI_GUEST_PACKAGES }}
          addgroup -g '"$(id -g)"' hostgrp 2>/dev/null || true
          adduser  -D -u '"$(id -u)"' -G hostgrp hostusr 2>/dev/null || true
          chown -R '"$(id -u):$(id -g)"' /src
          su hostusr -c "
            ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
            meson compile -C builddir -v
            meson test -C builddir
          "
        '

    - name: Build and test (Autotools, FreeBSD/OpenBSD/NetBSD/Haiku)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'cross-platform-vms' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ env.CI_CP_OS }}
        architecture: ${{ env.CI_CP_ARCH }}
        version: ${{ env.CI_CP_VERSION }}
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          set -xv
          ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
          ${{ env.CI_MAKE || 'make' }} V=1
          ${{ env.CI_MAKE || 'make' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Build and test (Meson, FreeBSD/OpenBSD/NetBSD/Haiku)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'cross-platform-vms' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ env.CI_CP_OS }}
        architecture: ${{ env.CI_CP_ARCH }}
        version: ${{ env.CI_CP_VERSION }}
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          set -xv
          ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
          meson compile -C builddir -v
          meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Build and test (Autotools, DragonFlyBSD)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'dragonflybsd-vm' }}
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        sync-time: true
        sync: nfs
        prepare: |
          #pkg update -f
          pkg install -y ${{ env.CI_EXTRA_PACKAGES || 'gmake' }}
        run: |
          ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
          gmake V=1
          gmake ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Configure, build, and test (Meson, DragonFlyBSD)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'dragonflybsd-vm' }}
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        sync-time: true
        sync: rsync
        prepare: |
          #pkg update -f
          pkg install -y ${{ env.CI_EXTRA_PACKAGES || 'meson' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
          meson compile -C builddir
          meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Build and test (Autotools, OpenIndiana)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'openindiana-vm' }}
      uses: vmactions/openindiana-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        usesh: true
        sync: rsync
        prepare: |
          pkg set-publisher -g http://pkg.openindiana.org/hipster/ openindiana.org
          #pkg update -f
          pkg install --accept --no-be ${{ env.CI_EXTRA_PACKAGES }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
          ${{ env.CI_MAKE || 'gmake' }} V=1
          ${{ env.CI_MAKE || 'gmake' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Configure, build, and test (Meson, OpenIndiana)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'openindiana-vm' }}
      uses: vmactions/openindiana-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        usesh: true
        sync: rsync
        prepare: |
          pkg set-publisher -g http://pkg.openindiana.org/hipster/ openindiana.org
          #pkg update -f
          pkg install --accept --no-be ${{ env.CI_EXTRA_PACKAGES }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
          meson compile -C builddir
          meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Build and test (Autotools, Solaris)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'solaris-vm' }}
      uses: vmactions/solaris-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        sync-time: true
        sync: nfs
        prepare: |
          #pkg update -f
          pkg install --accept ${{ env.CI_EXTRA_PACKAGES || 'gnu-make gcc' }}
        run: |
          ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
          ${{ env.CI_MAKE || 'gmake' }} V=1
          ${{ env.CI_MAKE || 'gmake' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Configure, build, and test (Meson, Solaris)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'solaris-vm' }}
      uses: vmactions/solaris-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        sync-time: true
        sync: nfs
        prepare: |
          #pkg update -f
          pkg install --accept ${{ env.CI_EXTRA_PACKAGES || 'gnu-make gcc meson ninja' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
          meson compile -C builddir
          meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Build and test (Autotools, OmniOS)
      if: ${{ env.CI_BUILDTOOL == 'autotools' && env.CI_EXEC_TYPE == 'omnios-vm' }}
      uses: vmactions/omnios-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        usesh: true
        sync: rsync
        prepare: |
          #pkg update -f
          pkg install --accept ${{ env.CI_EXTRA_PACKAGES || 'developer/gcc13 developer/build/gnu-make' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ env.CI_SETUP_PREFIX }} ./configure ${{ env.CI_SETUP_OPTIONS }}
          ${{ env.CI_MAKE || 'gmake' }} V=1
          ${{ env.CI_MAKE || 'gmake' }} ${{ env.CI_CHECK_TARGET || 'check' }}

    - name: Configure, build, and test (Meson, OmniOS)
      if: ${{ env.CI_BUILDTOOL == 'meson' && env.CI_EXEC_TYPE == 'omnios-vm' }}
      uses: vmactions/omnios-vm@v1
      with:
        release: ${{ env.CI_VERSION }}
        usesh: true
        sync: rsync
        prepare: |
          #pkg update -f
          pkg install --accept ${{ env.CI_EXTRA_PACKAGES || 'developer/build/gnu-make' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          export PATH="$HOME/.local/bin:$PATH"
          python3 -m pip install --user --upgrade pip meson ninja
          ${{ env.CI_SETUP_PREFIX }} meson setup builddir ${{ env.CI_SETUP_OPTIONS }}
          meson compile -C builddir
          meson ${{ env.CI_CHECK_TARGET || 'test' }} -C builddir

    - name: Capture coverage
      if: >-
        ${{ always()
            && (contains(env.CI_SETUP_OPTIONS, '--enable-gcov')
                || contains(env.CI_SETUP_OPTIONS, '-Db_coverage'))
            && env.CI_EXEC_TYPE == 'bash' }}
      shell: bash
      run: |
        if test -f coverage.info; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        if command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info \
            --gcov-executable gcov-14 || true
        elif command -v lcov >/dev/null 2>&1; then
          # Keep src for static builds; avoid duplicate gcda from src/.libs.
          lcov -c \
            -d "$PWD" \
            --rc branch_coverage=1 \
            -o coverage.info || true
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi
        # Normalize absolute paths so Coveralls can map files to the repo tree.
        # Meson may emit builddir paths, so strip builddir before the repo root.
        if test -f coverage.info; then
          sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:/#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        fi

    - name: Capture coverage (Windows)
      if: >-
        ${{ always()
            && (contains(env.CI_SETUP_OPTIONS, '--enable-gcov')
                || contains(env.CI_SETUP_OPTIONS, '-Db_coverage'))
            && env.CI_EXEC_TYPE == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        if [ -e coverage.info ]; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        if command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info
          cat coverage.info
        elif command -v lcov >/dev/null 2>&1; then
          lcov -c \
            -d "${PWD}" \
            --rc branch_coverage=1 \
            -o coverage.info
          sed "s#^SF:${PWD}\\\\builddir\\\\#SF:#; s#^SF:${PWD}\\\\#SF:#; s#^SF:\\\\#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi

    - name: Fetch BSD artifacts from VM
      if: ${{ always() && env.CI_EXEC_TYPE == 'cross-platform-vms' }}
      shell: bash
      run: |
        if [ "${{ env.CI_CP_OS }}" = "haiku" ]; then
          vm_workspace="/boot/home${GITHUB_WORKSPACE}"
          user=user
        else
          vm_workspace="${GITHUB_WORKSPACE}"
          user=runner
        fi
        ssh "${user}"@cross_platform_actions_host bash -c 'cd '"${vm_workspace}"' && find . -type f "(" -name "*.log" -o -name "*.trs" -o -name "*.info" ")" -exec tar cvzf /tmp/artifacts.tar.gz {} +' || true
        scp "${user}"@cross_platform_actions_host:/tmp/artifacts.tar.gz . || true
        tar xvzf artifacts.tar.gz || true

    - name: Upload artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.CI_LABEL }}
        path: |
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
          pkg_install-err.log
          **/artifacts.tar.gz
          builddir/meson-dist/**
          builddir/meson-logs/**
          builddir/**/_artifacts/**
          builddir/**/testlog.txt
          builddir/**/*.log
        if-no-files-found: warn
        overwrite: true

    - name: Upload to Coveralls (per-flag, parallel)
      id: coveralls_upload
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      if: ${{ hashFiles('coverage.info') != '' }}
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: coverage.info
        flag-name: ${{ env.CI_LABEL }}
        parallel: true

    - name: Wait before Coveralls retry (per-flag)
      if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
      shell: bash
      run: sleep 5

    - name: Upload to Coveralls (per-flag, retry)
      if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: coverage.info
        flag-name: ${{ env.CI_LABEL }}
        parallel: true
