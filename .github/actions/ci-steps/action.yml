name: libsixel CI steps

description: >-
  Composite action that runs the build and test steps for the CI matrix.

inputs:
  matrix_json:
    description: JSON-encoded matrix entry for CI configuration.
    required: true
  github_token:
    description: Token used for Coveralls uploads.
    required: true
  codecov_token:
    description: Token used for Codecov uploads.
    required: false

runs:
  using: composite
  steps:
    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Install extra packages (Linux)
      if: >-
        ${{ runner.os == 'Linux'
            && fromJSON(inputs.matrix_json).exec_type == 'bash'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (macOS)
      if: ${{ runner.os == 'macOS' && fromJSON(inputs.matrix_json).extra_packages != '' }}
      shell: bash
      run: |
        #brew update
        brew install ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (FreeBSD)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'freebsd'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          #sudo pkg update -f
          sudo pkg install -y ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (NetBSD)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'netbsd'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          #sudo pkgin -y update
          sudo pkgin -y install ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}
          if [ -f /var/db/pkgin/pkg_install-err.log ]; then
            cp /var/db/pkgin/pkg_install-err.log "$GITHUB_WORKSPACE/pkg_install-err.log" || true
          fi

    - name: Install extra packages (OpenBSD)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'openbsd'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          sudo pkg_add ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (Haiku)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'haiku'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          pkgman refresh
          for attempt in 1 2 3; do
            if pkgman install -y ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "pkgman install failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

    - name: Setup MSVC developer env (vcvars, x86_64 target)
      if: ${{ fromJSON(inputs.matrix_json).runner == 'windows-latest' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup MSVC developer env (vcvars, arm64 target)
      if: ${{ fromJSON(inputs.matrix_json).runner == 'windows-11-arm' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_arm64

    - name: Save MSVC env:Path
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      run: |
        "MSVC_PATH=$env:Path" >> $env:GITHUB_ENV

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ fromJSON(inputs.matrix_json).vcpkg_packages != '' }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ fromJSON(inputs.matrix_json).vcpkg_packages || 'none' }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, vcpkg deps)
      if: ${{ fromJSON(inputs.matrix_json).vcpkg_packages != '' }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
          git init $vcpkgRoot
        }
        git -C $vcpkgRoot remote remove origin 2>$null
        git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

        git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
        git -C $vcpkgRoot reset --hard FETCH_HEAD

        Set-Location $vcpkgRoot

        cmd /c bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        $extra = '${{ fromJSON(inputs.matrix_json).vcpkg_packages || '' }}'.Trim()
        if ($extra -ne '') {
          $packages += $extra -split '\s+'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "VCPKG_DEFAULT_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows) (attempt 1)
      id: setup_msys2_1
      if: ${{ fromJSON(inputs.matrix_json).msystem != '' }}
      continue-on-error: true
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ fromJSON(inputs.matrix_json).msystem || '' }}
        #update: true
        install: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Setup MSYS2 (Windows) (attempt 2)
      id: setup_msys2_2
      if: >-
        ${{ fromJSON(inputs.matrix_json).msystem != ''
            && steps.setup_msys2_1.outcome != 'success' }}
      continue-on-error: true
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ fromJSON(inputs.matrix_json).msystem || '' }}
        #update: true
        install: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Setup MSYS2 (Windows) (attempt 3)
      if: >-
        ${{ fromJSON(inputs.matrix_json).msystem != ''
            && steps.setup_msys2_1.outcome != 'success'
            && steps.setup_msys2_2.outcome != 'success' }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ fromJSON(inputs.matrix_json).msystem || '' }}
        #update: true
        install: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Create junction to Git for Windows
      if: ${{ fromJSON(inputs.matrix_json).exec_type == 'gitbash' }}
      shell: pwsh
      run: |
        if (!(Test-Path 'C:\GitBash')) {
          New-Item -ItemType Junction -Path 'C:\GitBash' -Target 'C:\Program Files\Git' | Out-Null
        }
        'C:\GitBash\bin'     | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        'C:\GitBash\usr\bin' | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    - name: Resolve Cygwin package list
      id: cygwin_packages
      if: ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin') }}
      shell: pwsh
      run: |
        $raw = "${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}"
        $packages = $raw -split '[,\s]+' | Where-Object { $_ -ne '' }
        if ($packages.Count -eq 0) {
          $packages = @('make')
        }
        $csv = [string]::Join(',', $packages)
        "packages=$csv" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    - name: Setup Cygwin (primary mirror)
      id: cygwin_setup_primary
      if: ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin') }}
      continue-on-error: true
      uses: cygwin/cygwin-install-action@v6
      with:
        check-hash: 'false'
        check-installer-sig: 'false'
        site: https://mirrors.sonic.net/cygwin/
        packages: ${{ steps.cygwin_packages.outputs.packages }}

    - name: Wait before Cygwin mirror fallback
      if: >-
        ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin')
            && steps.cygwin_setup_primary.outcome == 'failure' }}
      shell: pwsh
      run: |
        Start-Sleep -Seconds 10

    - name: Setup Cygwin (mirror fallback #1)
      id: cygwin_setup_fallback_1
      if: >-
        ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin')
            && steps.cygwin_setup_primary.outcome == 'failure' }}
      continue-on-error: true
      uses: cygwin/cygwin-install-action@v6
      with:
        check-hash: 'false'
        check-installer-sig: 'false'
        site: https://ftp.iij.ad.jp/pub/cygwin/
        packages: ${{ steps.cygwin_packages.outputs.packages }}

    - name: Wait before Cygwin mirror fallback #2
      if: >-
        ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin')
            && steps.cygwin_setup_primary.outcome == 'failure'
            && steps.cygwin_setup_fallback_1.outcome == 'failure' }}
      shell: pwsh
      run: |
        Start-Sleep -Seconds 180

    - name: Setup Cygwin (mirror fallback #2)
      id: cygwin_setup_fallback_2
      if: >-
        ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin')
            && steps.cygwin_setup_primary.outcome == 'failure'
            && steps.cygwin_setup_fallback_1.outcome == 'failure' }}
      continue-on-error: true
      uses: cygwin/cygwin-install-action@v6
      with:
        check-hash: 'false'
        check-installer-sig: 'false'
        site: https://mirrors.kernel.org/sourceware/cygwin/
        packages: ${{ steps.cygwin_packages.outputs.packages }}

    - name: Validate Cygwin setup result
      if: >-
        ${{ startsWith(fromJSON(inputs.matrix_json).exec_type || '', 'cygwin')
            && steps.cygwin_setup_primary.outcome == 'failure'
            && steps.cygwin_setup_fallback_1.outcome == 'failure'
            && steps.cygwin_setup_fallback_2.outcome == 'failure' }}
      shell: pwsh
      run: |
        Write-Error 'Cygwin setup failed on all configured mirrors.'

    - name: Cache Cosmopolitan toolchain
      if: ${{ contains(fromJSON(inputs.matrix_json).setup_prefix, 'CC=cosmocc') }}
      uses: actions/cache@v4
      with:
        path: cosmopolitan/cosmocc.zip
        key: cosmocc-${{ hashFiles('cosmopolitan/cosmocc.zip') }}

    - name: Prepare Cosmopolitan toolchain
      if: ${{ contains(fromJSON(inputs.matrix_json).setup_prefix, 'CC=cosmocc') }}
      shell: bash
      run: |
        set -exv
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -q cosmopolitan/cosmocc.zip
        chmod +x bin/cosmo*

    - name: Prepare Emscripten toolchain
      if: ${{ contains(fromJSON(inputs.matrix_json).label, 'emscripten') }}
      shell: bash
      run: |
        set -exv
        git clone --depth 1 https://github.com/emscripten-core/emsdk.git
        sh emsdk/emsdk install latest
        sh emsdk/emsdk activate latest
        # Add both emscripten frontend tools and bundled LLVM utilities.
        echo "$PWD/emsdk/upstream/emscripten" >> "$GITHUB_PATH"
        echo "$PWD/emsdk/upstream/bin" >> "$GITHUB_PATH"

    - name: Install pip packages
      if: ${{ fromJSON(inputs.matrix_json).pip_packages != '' }}
      shell: bash
      run: |
        set -exv
        VENV_PYTHON=".venv/bin/python"
        VENV_BIN_DIR="$PWD/.venv/bin"
        python3 -m venv .venv
        if [ -x .venv/Scripts/python.exe ]; then
          VENV_PYTHON=".venv/Scripts/python.exe"
          VENV_BIN_DIR="$PWD/.venv/Scripts"
        fi
        "$VENV_PYTHON" -m pip install -U pip \
          ${{ fromJSON(inputs.matrix_json).pip_packages || '' }}
        if command -v cygpath >/dev/null 2>&1; then
          echo "$(cygpath -w "$VENV_BIN_DIR")" >> "$GITHUB_PATH"
        else
          echo "$VENV_BIN_DIR" >> "$GITHUB_PATH"
        fi

    - name: Install Perl modules (Perl matrices)
      if: ${{ contains(fromJSON(inputs.matrix_json).label, '-perl') }}
      shell: bash
      run: |
        set -exv
        cpanm_bin="$(command -v cpanm || true)"
        perl_bin="$(command -v perl || true)"
        use_sudo=0
        if test -n "$cpanm_bin" && command -v sudo >/dev/null 2>&1; then
          use_sudo=1
        fi
        if test -z "$cpanm_bin"; then
          cpanm_bin="$PWD/.ci-tools/cpanm"
          mkdir -p "$(dirname "$cpanm_bin")"
          curl -fsSL https://cpanmin.us -o "$cpanm_bin"
          chmod +x "$cpanm_bin" || true
        fi

        # In Git Bash on Windows, `perl` can resolve to /usr/bin/perl even when
        # Strawberry Perl is available and selected by `cpanm`. Prefer a Perl
        # executable colocated with the chosen cpanm to keep @INC consistent.
        cpanm_dir="$(dirname "$cpanm_bin")"
        if test -x "$cpanm_dir/perl"; then
          perl_bin="$cpanm_dir/perl"
        elif test -x "$cpanm_dir/perl.exe"; then
          perl_bin="$cpanm_dir/perl.exe"
        fi

        if test -z "$perl_bin"; then
          echo "::error::perl executable was not found for CPAN installation"
          exit 1
        fi

        cpan_install() {
          module_name=$1
          for attempt in 1 2 3; do
            if test "$use_sudo" -eq 1; then
              if sudo "$perl_bin" "$cpanm_bin" --quiet --notest --skip-satisfied "$module_name"; then
                return 0
              fi
            else
              if "$perl_bin" "$cpanm_bin" --quiet --notest --skip-satisfied "$module_name"; then
                return 0
              fi
            fi
            if test "$attempt" -eq 3; then
              return 1
            fi
            sleep $((attempt * 5))
          done
        }

        cpan_install FFI::Platypus
        cpan_install FFI::Platypus::Buffer
        cpan_install FFI::Platypus::Closure
        if [[ "${{ fromJSON(inputs.matrix_json).label || '' }}" == *"-perl-coverage"* ]]; then
          cpan_install Devel::Cover
        fi

        if ! "$perl_bin" -MFFI::Platypus -MFFI::Platypus::Buffer -MFFI::Platypus::Closure -e 'exit 0'; then
          if test -d "$HOME/perl5/lib/perl5"; then
            archname="$("$perl_bin" -MConfig -e 'print $Config{archname}')"
            path_sep="$("$perl_bin" -MConfig -e 'print $Config{path_sep}')"
            if test -z "$path_sep"; then
              path_sep=':'
            fi
            perl5lib="$HOME/perl5/lib/perl5"
            if test -n "$archname" && test -d "$HOME/perl5/lib/perl5/$archname"; then
              perl5lib="$HOME/perl5/lib/perl5/$archname${path_sep}$perl5lib"
            fi
            export PERL5LIB="$perl5lib"
            export PERL_LOCAL_LIB_ROOT="$HOME/perl5"
            export PERL_MB_OPT="--install_base $HOME/perl5"
            export PERL_MM_OPT="INSTALL_BASE=$HOME/perl5"
            {
              echo "PERL5LIB=$perl5lib"
              echo "PERL_LOCAL_LIB_ROOT=$HOME/perl5"
              echo "PERL_MB_OPT=--install_base $HOME/perl5"
              echo "PERL_MM_OPT=INSTALL_BASE=$HOME/perl5"
            } >> "$GITHUB_ENV"
            if test -d "$HOME/perl5/bin"; then
              echo "$HOME/perl5/bin" >> "$GITHUB_PATH"
            fi
          fi
        fi

        "$perl_bin" -MFFI::Platypus -MFFI::Platypus::Buffer -MFFI::Platypus::Closure -e 'exit 0'
        if [[ "${{ fromJSON(inputs.matrix_json).label || '' }}" == *"-perl-coverage"* ]]; then
          "$perl_bin" -MDevel::Cover -e 'exit 0'
        fi
    - name: Setup PHP runtime (Windows, PHP matrices)
      if: >-
        ${{ runner.os == 'Windows'
            && contains(fromJSON(inputs.matrix_json).label, '-php') }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: ffi
        ini-values: ffi.enable=1
        coverage: none

    - name: Build and test (Autotools, bash)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'bash' }}
      shell: bash
      run: |
        set -exv
        export PATH="$PWD/build-aux:$PWD/bin:$PATH"
        mkdir -p "$PWD/pgo"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} \
          ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build and test (Meson, bash)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'bash' }}
      shell: bash
      run: |
        set -exv
        export PATH="$PWD/build-aux:$PWD/bin:$PATH"
        mkdir -p "$PWD/pgo"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        meson compile -C builddir -v
        meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, msys2)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
        PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"

        # Pin pkg-config to the vcpkg instance so MSYS2 .pc files cannot leak
        # into MSVC jobs.
        if test -n "${VCPKG_ROOT:-}" -a -n "${{ fromJSON(inputs.matrix_json).vcpkg_packages || '' }}"; then
          VCPKG_TRIPLET="${VCPKG_DEFAULT_TRIPLET:-x64-windows}"
          VCPKG_ROOT_UNIX="$(cygpath -u "$VCPKG_ROOT")"
          VCPKG_PREFIX="$VCPKG_ROOT_UNIX/installed/$VCPKG_TRIPLET"
          PKG_CONFIG="$VCPKG_PREFIX/tools/pkgconf/pkgconf"
          test -x "$PKG_CONFIG" || PKG_CONFIG="$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe"
          export PKG_CONFIG
          export PKG_CONFIG_LIBDIR="$VCPKG_PREFIX/lib/pkgconfig:$VCPKG_PREFIX/share/pkgconfig"
          export PKG_CONFIG_PATH=
          CPPFLAGS="${CPPFLAGS:+$CPPFLAGS }-I$VCPKG_PREFIX/include"
          LDFLAGS="${LDFLAGS:+$LDFLAGS }-L$VCPKG_PREFIX/lib"
          SIXEL_TEST_ADDITIOANL_PATH="$VCPKG_PREFIX/bin"
          export CPPFLAGS LDFLAGS SIXEL_TEST_ADDITIOANL_PATH
        fi

        PKG_CONFIG="$PKG_CONFIG" PKG_CONFIG_LIBDIR="$PKG_CONFIG_LIBDIR" PKG_CONFIG_PATH="$PKG_CONFIG_PATH" CPPFLAGS="$CPPFLAGS" LDFLAGS="$LDFLAGS" SIXEL_TEST_ADDITIOANL_PATH="$SIXEL_TEST_ADDITIOANL_PATH" ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build and test (Meson, msys2)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
        PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        meson compile -C builddir -v
        meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, Cygwin)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
        if test "${{ fromJSON(inputs.matrix_json).debug_temp || '' }}" = "1"; then
          export _SIXEL_DEBUG_TEMP=1
        fi
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build only (Autotools, Cygwin, MSVC CodeCoverage)
      if: >-
        ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools'
            && fromJSON(inputs.matrix_json).exec_type == 'cygwin-msvc-codecoverage' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1

    - name: Run tests with Microsoft CodeCoverage (Autotools, Cygwin)
      if: >-
        ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools'
            && fromJSON(inputs.matrix_json).exec_type == 'cygwin-msvc-codecoverage' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $workspace = (Resolve-Path $env:GITHUB_WORKSPACE).Path
        Set-Location $workspace

        $coverageTool = $null
        $coverageCommand = Get-Command 'Microsoft.CodeCoverage.Console.exe' -ErrorAction SilentlyContinue
        if ($coverageCommand) {
          $coverageTool = $coverageCommand.Source
        } else {
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (Test-Path $vswhere) {
            $vsInstallPathRaw = & $vswhere -latest -products '*' -property installationPath | Select-Object -First 1
            $vsInstallPath = ''
            if ($vsInstallPathRaw) {
              $vsInstallPath = $vsInstallPathRaw.ToString().Trim()
            }
            if (-not [string]::IsNullOrWhiteSpace($vsInstallPath)) {
              $coverageCandidates = @(
                (Join-Path $vsInstallPath 'Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe'),
                (Join-Path $vsInstallPath 'Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.dll')
              )
              foreach ($candidate in $coverageCandidates) {
                if (Test-Path $candidate) {
                  $coverageTool = $candidate
                  break
                }
              }
              if (-not $coverageTool) {
                $found = Get-ChildItem -Path $vsInstallPath -Filter 'Microsoft.CodeCoverage.Console.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) {
                  $coverageTool = $found.FullName
                }
              }
            }
          }
        }
        if (-not $coverageTool) {
          throw 'Microsoft.CodeCoverage.Console tool was not found in PATH or Visual Studio installation.'
        }

        $dotnetTools = Join-Path $env:USERPROFILE '.dotnet\tools'
        $env:PATH = "$dotnetTools;$env:PATH"
        if (-not (Get-Command dotnet-coverage -ErrorAction SilentlyContinue)) {
          & dotnet tool install --global dotnet-coverage
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to install dotnet-coverage.'
          }
        }

        $cygwinBash = 'C:\cygwin\bin\bash.exe'
        if (-not (Test-Path $cygwinBash)) {
          throw "Cygwin bash not found: $cygwinBash"
        }

        Get-ChildItem -Path $workspace -Filter *.coverage -Recurse -ErrorAction SilentlyContinue | Remove-Item -Force

        $drive = $workspace.Substring(0, 1).ToLowerInvariant()
        $rest = $workspace.Substring(2).Replace('\', '/')
        $workspaceCygwin = "/cygdrive/$drive$rest"

        $makeCmd = "${{ fromJSON(inputs.matrix_json).make || 'make' }}"
        $checkTarget = "${{ fromJSON(inputs.matrix_json).check_target || 'check' }}"
        $debugTemp = "${{ fromJSON(inputs.matrix_json).debug_temp || '' }}"
        $bashScript = "unset MSVC_PATH __VSCMD_PREINIT_PATH; cd '$workspaceCygwin'; export LDFLAGS='-Xlinker /PROFILE'; if test '$debugTemp' = '1'; then export _SIXEL_DEBUG_TEMP=1; fi; $makeCmd $checkTarget"

        if ($coverageTool.ToLower().EndsWith('.dll')) {
          & dotnet $coverageTool collect -- $cygwinBash '-o' 'igncr' '-lc' $bashScript
        } else {
          & $coverageTool collect -- $cygwinBash '-o' 'igncr' '-lc' $bashScript
        }
        if ($LASTEXITCODE -ne 0) {
          throw "Microsoft.CodeCoverage collect failed with exit code $LASTEXITCODE"
        }

        $coverageFiles = @(Get-ChildItem -Path $workspace -Filter *.coverage -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName)
        if (-not $coverageFiles) {
          throw 'No .coverage file was produced by Microsoft.CodeCoverage collect.'
        }

        $coberturaPath = Join-Path $workspace 'coverage.cobertura.xml'
        if (Test-Path $coberturaPath) {
          Remove-Item $coberturaPath -Force
        }
        & dotnet-coverage merge -f cobertura -o $coberturaPath @coverageFiles
        if ($LASTEXITCODE -ne 0) {
          throw "dotnet-coverage merge failed with exit code $LASTEXITCODE"
        }
        if (-not (Test-Path $coberturaPath) -or (Get-Item $coberturaPath).Length -eq 0) {
          throw 'coverage.cobertura.xml was not generated or is empty.'
        }

    - name: Build and test (Meson, Cygwin)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        meson compile -C builddir -v
        if grep ^ac_cv_prog_ac_ct_CC=gcc$ config.log; then
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir
        else
          : # cross build: don't run test
        fi

    - name: Build and test (Meson, Command Prompt)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'cmd' }}
      shell: cmd
      run: |
        setlocal ENABLEDELAYEDEXPANSION
        python -m pip install --upgrade pip
        if errorlevel 1 exit /b !errorlevel!
        python -m pip install meson
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain compile -C builddir
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir
        if errorlevel 1 exit /b !errorlevel!
        endlocal


    - name: Merge Clang PGO raw profiles
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'bash'
            && endsWith(fromJSON(inputs.matrix_json).label, '-pgo')
            && contains(fromJSON(inputs.matrix_json).label, 'clang') }}
      shell: bash
      run: |
        set -exv
        LLVM_PROFDATA="$(command -v llvm-profdata || true)"
        if test -z "$LLVM_PROFDATA"; then
          LLVM_PROFDATA="$(clang --print-prog-name=llvm-profdata 2>/dev/null || true)"
          if test "x$LLVM_PROFDATA" = "xllvm-profdata"; then
            LLVM_PROFDATA=""
          fi
        fi
        if test -z "$LLVM_PROFDATA"; then
          LLVM_PROFDATA="$(command -v llvm-profdata-19 || true)"
        fi
        if test -z "$LLVM_PROFDATA"; then
          LLVM_PROFDATA="$(command -v llvm-profdata-18 || true)"
        fi
        if test -z "$LLVM_PROFDATA"; then
          LLVM_PROFDATA="$(command -v llvm-profdata-17 || true)"
        fi
        if test -z "$LLVM_PROFDATA"; then
          LLVM_PROFDATA="$(command -v llvm-profdata-16 || true)"
        fi
        if test -z "$LLVM_PROFDATA"; then
          if test "$(uname -s)" = "Darwin"; then
            LLVM_PROFDATA="$(xcrun --find llvm-profdata 2>/dev/null || true)"
          fi
        fi
        echo "Resolved llvm-profdata: ${LLVM_PROFDATA:-<not found>}"
        test -n "$LLVM_PROFDATA"
        mapfile -t profraw_files < <(find "$PWD/pgo" -type f -name '*.profraw')
        test "${#profraw_files[@]}" -gt 0
        "$LLVM_PROFDATA" merge -output="$PWD/pgo/default.profdata" "${profraw_files[@]}"
        if test -d "$PWD/builddir"; then
          cp "$PWD/pgo/default.profdata" "$PWD/builddir/default.profdata"
        fi
