    - name: Capture coverage
      if: >-
        ${{ always()
            && (contains(fromJSON(inputs.matrix_json).setup_options, '--enable-gcov')
                || contains(fromJSON(inputs.matrix_json).setup_options, '-Db_coverage')
                || contains(fromJSON(inputs.matrix_json).label, 'emscripten-coverage'))
            && fromJSON(inputs.matrix_json).exec_type == 'bash' }}
      shell: bash
      run: |
        if test -f coverage.info; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        coverage_captured=0
        if [[ "${{ fromJSON(inputs.matrix_json).label || '' }}" == *"emscripten-coverage"* ]]; then
          LLVM_PROFDATA=""
          LLVM_COV=""
          for tool_dir in "" "$PWD/emsdk/upstream/bin" "$HOME/emsdk/upstream/bin"; do
            [ -n "$LLVM_PROFDATA" ] || LLVM_PROFDATA="${tool_dir:+$tool_dir/}llvm-profdata"
            [ -x "$LLVM_PROFDATA" ] || LLVM_PROFDATA=""
            [ -n "$LLVM_COV" ] || LLVM_COV="${tool_dir:+$tool_dir/}llvm-cov"
            [ -x "$LLVM_COV" ] || LLVM_COV=""
          done
          [ -n "$LLVM_PROFDATA" ] || LLVM_PROFDATA="$(command -v llvm-profdata || true)"
          [ -n "$LLVM_COV" ] || LLVM_COV="$(command -v llvm-cov || true)"
          [ -n "$LLVM_PROFDATA" ] || LLVM_PROFDATA="$(xcrun --find llvm-profdata 2>/dev/null || true)"
          [ -n "$LLVM_COV" ] || LLVM_COV="$(xcrun --find llvm-cov 2>/dev/null || true)"
          profraw_count=$(find . -type f -name '*.profraw' | wc -l | tr -d '[:space:]')
          profraw_nonempty_count=$(find . -type f -name '*.profraw' -size +0c | wc -l | tr -d '[:space:]')
          gcda_count=$(find . -type f -name '*.gcda' | wc -l | tr -d '[:space:]')
          echo "Coverage probe (emscripten): profraw=$profraw_count profraw_nonempty=$profraw_nonempty_count gcda=$gcda_count"
          if [ -n "$LLVM_PROFDATA" ] && [ -n "$LLVM_COV" ]; then
            echo "Using llvm-profdata: $LLVM_PROFDATA"
            echo "Using llvm-cov: $LLVM_COV"
            PROFRAW_FILES=()
            while IFS= read -r profraw_file; do
              PROFRAW_FILES+=("$profraw_file")
            done < <(find . -type f -name '*.profraw' -size +0c)
            if [ "${#PROFRAW_FILES[@]}" -eq 0 ]; then
              echo "No non-empty .profraw files found for llvm-cov; trying gcovr/lcov fallback"
            else
              rm -f coverage.profdata
              if ! "$LLVM_PROFDATA" merge -sparse "${PROFRAW_FILES[@]}" -o coverage.profdata; then
                echo "llvm-profdata merge failed; trying gcovr/lcov fallback"
              else
                COV_OBJECTS=()
                # Prefer instrumented local .wasm artifacts and skip external
                # toolchain trees (for example emsdk) that flood logs with
                # non-instrumented files.
                while IFS= read -r cov_object; do
                  COV_OBJECTS+=("$cov_object")
                done < <(
                  find . \
                    \( -path './emsdk' -o -path './.venv' \) -prune -o \
                    -type f -name '*.wasm' -print
                )
                if [ "${#COV_OBJECTS[@]}" -eq 0 ]; then
                  while IFS= read -r cov_object; do
                    COV_OBJECTS+=("$cov_object")
                  done < <(
                    find . \
                      \( -path './emsdk' -o -path './.venv' \) -prune -o \
                      -type f \( -name '*.o' -o -name '*.so' -o -name '*.a' \) -print
                  )
                fi
                if [ "${#COV_OBJECTS[@]}" -eq 0 ]; then
                  echo "No coverage objects found for llvm-cov; trying gcovr/lcov fallback"
                else
                  rm -f coverage.info coverage.info.tmp
                  : > coverage.info.tmp
                  COVERAGE_OBJECTS_EXPORTED=0
                  for cov_object in "${COV_OBJECTS[@]}"; do
                    if "$LLVM_COV" export -format=lcov \
                      -instr-profile=coverage.profdata \
                      "$cov_object" >> coverage.info.tmp 2>/dev/null; then
                      COVERAGE_OBJECTS_EXPORTED=$((COVERAGE_OBJECTS_EXPORTED + 1))
                    else
                      echo "Skipping non-instrumented coverage object: $cov_object"
                    fi
                  done
                  if [ "$COVERAGE_OBJECTS_EXPORTED" -eq 0 ]; then
                    echo "No instrumented coverage objects found for llvm-cov; trying gcovr/lcov fallback"
                    rm -f coverage.info.tmp
                  else
                    mv coverage.info.tmp coverage.info
                    coverage_captured=1
                    echo "Captured coverage via llvm-cov from $COVERAGE_OBJECTS_EXPORTED object(s)"
                  fi
                fi
              fi
            fi
          else
            echo "llvm-profdata/llvm-cov are missing; trying gcovr/lcov fallback"
          fi
        fi
        if [ "$coverage_captured" -ne 1 ] && command -v gcovr >/dev/null 2>&1; then
          # Generated rgblookup.h maps lines to rgblookup.gperf via #line.
          # In some out-of-tree builds the virtual builddir path does not
          # exist, so exclude that source to prevent gcovr report failures.
          GCOVR_GPERF_EXCLUDE='.*rgblookup\.gperf$'
          GCOV_TOOL=""
          # Prefer llvm-cov for clang coverage so gcovr can read
          # llvm-generated profiling data correctly.
          if command -v llvm-cov >/dev/null 2>&1; then
            GCOV_TOOL="llvm-cov gcov"
          elif command -v gcov-14 >/dev/null 2>&1; then
            # Keep gcc-14 compatibility where gcov-14 is available.
            GCOV_TOOL="gcov-14"
          fi

          if [ -n "$GCOV_TOOL" ]; then
            # gcovr may fail to resolve working dirs for a subset of *.gcda.
            # Ignore those errors and fall back to auto gcov selection.
            if ! gcovr -r . --lcov -o coverage.info \
              --exclude "$GCOVR_GPERF_EXCLUDE" \
              --gcov-executable "$GCOV_TOOL" \
              --gcov-ignore-errors=no_working_dir_found; then
              echo "gcovr with explicit gcov tool failed; retrying with auto gcov selection"
              gcovr -r . --lcov -o coverage.info \
                --exclude "$GCOVR_GPERF_EXCLUDE" \
                --gcov-ignore-errors=no_working_dir_found || true
            fi
          else
            gcovr -r . --lcov -o coverage.info \
              --exclude "$GCOVR_GPERF_EXCLUDE" \
              --gcov-ignore-errors=no_working_dir_found || true
          fi
        elif [ "$coverage_captured" -ne 1 ] && command -v lcov >/dev/null 2>&1; then
          # Keep src for static builds; avoid duplicate gcda from src/.libs.
          lcov -c \
            -d "$PWD" \
            --rc branch_coverage=1 \
            -o coverage.info || true
        elif [ "$coverage_captured" -ne 1 ]; then
          echo "No gcovr, lcov, or llvm-cov found; skipping coverage capture"
        fi
        if [[ "${{ fromJSON(inputs.matrix_json).label || '' }}" == *"emscripten-coverage"* ]]; then
          if ! test -s coverage.info || ! grep -q '^SF:' coverage.info 2>/dev/null; then
            if command -v lcov >/dev/null 2>&1; then
              echo "coverage.info is empty for emscripten; retrying lcov initial capture"
              lcov -c -i \
                -d "$PWD" \
                --rc branch_coverage=1 \
                -o coverage.info || true
            fi
          fi
        fi
        # Normalize absolute paths so Coveralls can map files to the repo tree.
        # Meson may emit builddir paths, so strip builddir before the repo root.
        if test -f coverage.info; then
          sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:/#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        fi

    - name: Capture coverage (Windows)
      if: >-
        ${{ always()
            && (contains(fromJSON(inputs.matrix_json).setup_options, '--enable-gcov')
                || contains(fromJSON(inputs.matrix_json).setup_options, '-Db_coverage'))
            && fromJSON(inputs.matrix_json).exec_type == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        if [ -e coverage.info ]; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        GCOVR_GPERF_EXCLUDE='.*rgblookup\.gperf$'
        if command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info \
            --exclude "$GCOVR_GPERF_EXCLUDE"
          cat coverage.info
        elif command -v lcov >/dev/null 2>&1; then
          lcov -c \
            -d "${PWD}" \
            --rc branch_coverage=1 \
            -o coverage.info
          sed "s#^SF:${PWD}\\\\builddir\\\\#SF:#; s#^SF:${PWD}\\\\#SF:#; s#^SF:\\\\#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi
        if [ -f coverage.info ]; then
          # Normalize both POSIX/MSYS and Windows path styles for Coveralls.
          sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:${PWD}\\\\builddir\\\\#SF:#; s#^SF:${PWD}\\\\#SF:#; s#^SF:[A-Za-z]:/#SF:#; s#^SF:/#SF:#; s#^SF:\\\\#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        fi

    - name: Capture coverage (Cygwin)
      if: >-
        ${{ always()
            && (contains(fromJSON(inputs.matrix_json).setup_options, '--enable-gcov')
                || contains(fromJSON(inputs.matrix_json).setup_options, '-Db_coverage')
                || contains(fromJSON(inputs.matrix_json).label, '-coverage'))
            && fromJSON(inputs.matrix_json).exec_type == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        if [ -e coverage.info ]; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        GCOVR_GPERF_EXCLUDE='.*rgblookup\.gperf$'
        if command -v gcovr >/dev/null 2>&1; then
          GCOV_TOOL=""
          # clang-cl generated coverage needs llvm-cov gcov for format compatibility.
          if command -v llvm-cov >/dev/null 2>&1; then
            GCOV_TOOL="llvm-cov gcov"
          elif command -v gcov-14 >/dev/null 2>&1; then
            GCOV_TOOL="gcov-14"
          fi

          if [ -n "$GCOV_TOOL" ]; then
            if ! gcovr -r . --lcov -o coverage.info -j 1 \
              --exclude "$GCOVR_GPERF_EXCLUDE" \
              --gcov-executable "$GCOV_TOOL" \
              --gcov-ignore-errors=no_working_dir_found; then
              echo "gcovr with explicit gcov tool failed; retrying with auto gcov selection"
              gcovr -r . --lcov -o coverage.info -j 1 \
                --exclude "$GCOVR_GPERF_EXCLUDE" \
                --gcov-ignore-errors=no_working_dir_found || true
            fi
          else
            gcovr -r . --lcov -o coverage.info -j 1 \
              --exclude "$GCOVR_GPERF_EXCLUDE" \
              --gcov-ignore-errors=no_working_dir_found || true
          fi
          if [ -f coverage.info ]; then
            cat coverage.info
          else
            echo "gcovr did not produce coverage.info"
          fi
        elif command -v python3 >/dev/null 2>&1; then
          if ! python3 -c "import gcovr" >/dev/null 2>&1; then
            python3 -m pip install --user gcovr || true
          fi
          if python3 -c "import gcovr" >/dev/null 2>&1; then
            GCOV_TOOL=""
            # clang-cl generated coverage needs llvm-cov gcov for format compatibility.
            if command -v llvm-cov >/dev/null 2>&1; then
              GCOV_TOOL="llvm-cov gcov"
            elif command -v gcov-14 >/dev/null 2>&1; then
              GCOV_TOOL="gcov-14"
            fi

            if [ -n "$GCOV_TOOL" ]; then
              if ! python3 -m gcovr -r . --lcov -o coverage.info -j 1 \
                --exclude "$GCOVR_GPERF_EXCLUDE" \
                --gcov-executable "$GCOV_TOOL" \
                --gcov-ignore-errors=no_working_dir_found; then
                echo "python3 -m gcovr with explicit gcov tool failed; retrying with auto gcov selection"
                python3 -m gcovr -r . --lcov -o coverage.info -j 1 \
                  --exclude "$GCOVR_GPERF_EXCLUDE" \
                  --gcov-ignore-errors=no_working_dir_found || true
              fi
            else
              python3 -m gcovr -r . --lcov -o coverage.info -j 1 \
                --exclude "$GCOVR_GPERF_EXCLUDE" \
                --gcov-ignore-errors=no_working_dir_found || true
            fi
            if [ -f coverage.info ]; then
              cat coverage.info
            else
              echo "python3 -m gcovr did not produce coverage.info"
            fi
          elif command -v lcov >/dev/null 2>&1; then
            lcov -c \
              -d "${PWD}" \
              --rc branch_coverage=1 \
              -o coverage.info || true
            if [ -f coverage.info ]; then
              sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:/#SF:#" \
                coverage.info > coverage.info.tmp
              mv coverage.info.tmp coverage.info
              head -n40 coverage.info
            else
              echo "lcov did not produce coverage.info"
            fi
          else
            echo "No gcovr or lcov found after python3 gcovr bootstrap; skipping coverage capture"
          fi
        elif command -v lcov >/dev/null 2>&1; then
          lcov -c \
            -d "${PWD}" \
            --rc branch_coverage=1 \
            -o coverage.info || true
          if [ -f coverage.info ]; then
            sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:/#SF:#" \
              coverage.info > coverage.info.tmp
            mv coverage.info.tmp coverage.info
            head -n40 coverage.info
          else
            echo "lcov did not produce coverage.info"
          fi
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi
        if [ -f coverage.info ]; then
          # Normalize both POSIX/Cygwin and Windows path styles for Coveralls.
          sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:${PWD}\\\\builddir\\\\#SF:#; s#^SF:${PWD}\\\\#SF:#; s#^SF:[A-Za-z]:/#SF:#; s#^SF:/#SF:#; s#^SF:\\\\#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        fi

    - name: Fetch BSD artifacts from VM
      if: ${{ always() && fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms' }}
      shell: bash
      run: |
        if [ "${{ fromJSON(inputs.matrix_json).cp_os || '' }}" = "haiku" ]; then
          vm_workspace="/boot/home${GITHUB_WORKSPACE}"
          user=user
        else
          vm_workspace="${GITHUB_WORKSPACE}"
          user=runner
        fi
        ssh "${user}"@cross_platform_actions_host bash -c 'cd '"${vm_workspace}"' && find . -type f "(" -name "*.log" -o -name "*.trs" -o -name "*.info" ")" -exec tar cvzf /tmp/artifacts.tar.gz {} +' || true
        scp "${user}"@cross_platform_actions_host:/tmp/artifacts.tar.gz . || true
        tar xvzf artifacts.tar.gz || true

    - name: Upload artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        path: |
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
          coverage.cobertura.xml
          output.coverage
          python-coverage.info
          ruby-coverage.info
          perl-coverage.info
          php-coverage.info
          builddir/python-coverage.info
          builddir/ruby-coverage.info
          builddir/perl-coverage.info
          builddir/php-coverage.info
          pkg_install-err.log
          builddir/meson-dist/**
          builddir/meson-logs/**
          builddir/**/_artifacts/**
          builddir/**/testlog.txt
          builddir/**/*.log
          libsixel-*/_build/sub/**/*.log
          libsixel-*/_build/sub/**/*.trs
          libsixel-*/_build/sub/**/_artifacts/**
        if-no-files-found: warn
        overwrite: true

    - name: Validate coverage.info
      id: coverage_info_check
      if: ${{ hashFiles('coverage.info') != '' }}
      shell: bash
      run: |
        set -o igncr 2>/dev/null || true
        if ! test -s coverage.info; then
          echo "coverage.info is empty; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! grep -q '^SF:' coverage.info; then
          echo "coverage.info does not contain SF records; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "upload_ready=true" >> "$GITHUB_OUTPUT"

    - name: Validate coverage.cobertura.xml
      id: cobertura_coverage_check
      if: ${{ hashFiles('coverage.cobertura.xml') != '' }}
      shell: bash
      run: |
        set -o igncr 2>/dev/null || true
        if ! test -s coverage.cobertura.xml; then
          echo "coverage.cobertura.xml is empty; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! grep -q '<coverage' coverage.cobertura.xml; then
          echo "coverage.cobertura.xml does not include a <coverage> root; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! grep -q '<class ' coverage.cobertura.xml; then
          echo "coverage.cobertura.xml does not contain class entries; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "upload_ready=true" >> "$GITHUB_OUTPUT"

    - name: Validate python-coverage.info
      id: python_coverage_info_check
      if: ${{ hashFiles('python-coverage.info', 'builddir/python-coverage.info') != '' }}
      shell: bash
      run: |
        set -o igncr 2>/dev/null || true
        COVERAGE_FILE=""
        if test -f python-coverage.info; then
          COVERAGE_FILE="python-coverage.info"
        elif test -f builddir/python-coverage.info; then
          COVERAGE_FILE="builddir/python-coverage.info"
        fi

        if ! test -n "$COVERAGE_FILE"; then
          echo "python coverage info file was not found"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! test -s "$COVERAGE_FILE"; then
          echo "$COVERAGE_FILE is empty; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! grep -q '^SF:' "$COVERAGE_FILE"; then
          echo "$COVERAGE_FILE does not contain SF records; skip Coveralls upload"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "coverage_file=$COVERAGE_FILE" >> "$GITHUB_OUTPUT"
        echo "upload_ready=true" >> "$GITHUB_OUTPUT"

