name: libsixel CI steps

description: >-
  Composite action that runs the build and test steps for the CI matrix.

inputs:
  matrix_json:
    description: JSON-encoded matrix entry for CI configuration.
    required: true
  github_token:
    description: Token used for Coveralls uploads.
    required: true

runs:
  using: composite
  steps:
    - name: Set Windows Defender ExclusionPath (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Add-MpPreference -ExclusionPath "C:\a"

    - name: Disable Windows Search Indexer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Stop-Service WSearch

    - name: Disable Spotlight (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        sudo mdutil -a -i off

    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Install extra packages (Linux)
      if: >-
        ${{ runner.os == 'Linux'
            && fromJSON(inputs.matrix_json).exec_type == 'bash'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (macOS)
      if: ${{ runner.os == 'macOS' && fromJSON(inputs.matrix_json).extra_packages != '' }}
      shell: bash
      run: |
        #brew update
        brew install ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (FreeBSD)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'freebsd'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          #sudo pkg update -f
          sudo pkg install -y ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (NetBSD)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'netbsd'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          #sudo pkgin -y update
          sudo pkgin -y install ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}
          if [ -f /var/db/pkgin/pkg_install-err.log ]; then
            cp /var/db/pkgin/pkg_install-err.log "$GITHUB_WORKSPACE/pkg_install-err.log" || true
          fi

    - name: Install extra packages (OpenBSD)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'openbsd'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          sudo pkg_add ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Install extra packages (Haiku)
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms'
            && fromJSON(inputs.matrix_json).cp_os == 'haiku'
            && fromJSON(inputs.matrix_json).extra_packages != '' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          pkgman refresh
          pkgman install -y ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}

    - name: Setup MSVC developer env (vcvars, x86_64 target)
      if: ${{ fromJSON(inputs.matrix_json).runner == 'windows-latest' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup MSVC developer env (vcvars, arm64 target)
      if: ${{ fromJSON(inputs.matrix_json).runner == 'windows-11-arm' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_arm64

    - name: Save MSVC env:Path
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      run: |
        "MSVC_PATH=$env:Path" >> $env:GITHUB_ENV

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ fromJSON(inputs.matrix_json).vcpkg_packages != '' }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ fromJSON(inputs.matrix_json).vcpkg_packages || 'none' }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, vcpkg deps)
      if: ${{ fromJSON(inputs.matrix_json).vcpkg_packages != '' }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
          git init $vcpkgRoot
        }
        git -C $vcpkgRoot remote remove origin 2>$null
        git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

        git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
        git -C $vcpkgRoot reset --hard FETCH_HEAD

        Set-Location $vcpkgRoot

        cmd /c bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        $extra = '${{ fromJSON(inputs.matrix_json).vcpkg_packages || '' }}'.Trim()
        if ($extra -ne '') {
          $packages += $extra -split '\s+'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows)
      if: ${{ fromJSON(inputs.matrix_json).msystem != '' }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ fromJSON(inputs.matrix_json).msystem || '' }}
        #update: true
        install: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Create junction to Git for Windows
      if: ${{ fromJSON(inputs.matrix_json).exec_type == 'gitbash' }}
      shell: pwsh
      run: |
        if (!(Test-Path 'C:\GitBash')) {
          New-Item -ItemType Junction -Path 'C:\GitBash' -Target 'C:\Program Files\Git' | Out-Null
        }
        'C:\GitBash\bin'     | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        'C:\GitBash\usr\bin' | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    - name: Setup Cygwin (primary mirror)
      id: cygwin_setup_primary
      if: ${{ fromJSON(inputs.matrix_json).exec_type == 'cygwin' }}
      continue-on-error: true
      uses: cygwin/cygwin-install-action@v6
      with:
        check-hash: 'false'
        check-installer-sig: 'false'
        site: https://mirror.fcix.net/cygwin/
        packages: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Wait before Cygwin mirror fallback
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cygwin'
            && steps.cygwin_setup_primary.outcome == 'failure' }}
      shell: pwsh
      run: |
        Start-Sleep -Seconds 180

    - name: Setup Cygwin (mirror fallback #1)
      id: cygwin_setup_fallback_1
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cygwin'
            && steps.cygwin_setup_primary.outcome == 'failure' }}
      continue-on-error: true
      uses: cygwin/cygwin-install-action@v6
      with:
        check-hash: 'false'
        check-installer-sig: 'false'
        site: https://ftp.iij.ad.jp/pub/cygwin/
        packages: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Wait before Cygwin mirror fallback #2
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cygwin'
            && steps.cygwin_setup_primary.outcome == 'failure'
            && steps.cygwin_setup_fallback_1.outcome == 'failure' }}
      shell: pwsh
      run: |
        Start-Sleep -Seconds 180

    - name: Setup Cygwin (mirror fallback #2)
      id: cygwin_setup_fallback_2
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cygwin'
            && steps.cygwin_setup_primary.outcome == 'failure'
            && steps.cygwin_setup_fallback_1.outcome == 'failure' }}
      continue-on-error: true
      uses: cygwin/cygwin-install-action@v6
      with:
        check-hash: 'false'
        check-installer-sig: 'false'
        site: https://mirrors.kernel.org/sourceware/cygwin/
        packages: ${{ fromJSON(inputs.matrix_json).extra_packages || 'make' }}

    - name: Validate Cygwin setup result
      if: >-
        ${{ fromJSON(inputs.matrix_json).exec_type == 'cygwin'
            && steps.cygwin_setup_primary.outcome == 'failure'
            && steps.cygwin_setup_fallback_1.outcome == 'failure'
            && steps.cygwin_setup_fallback_2.outcome == 'failure' }}
      shell: pwsh
      run: |
        Write-Error 'Cygwin setup failed on all configured mirrors.'

    - name: Cache Cosmopolitan toolchain
      if: ${{ contains(fromJSON(inputs.matrix_json).setup_prefix, 'CC=cosmocc') }}
      uses: actions/cache@v4
      with:
        path: cosmopolitan/cosmocc.zip
        key: cosmocc-${{ hashFiles('cosmopolitan/cosmocc.zip') }}

    - name: Prepare Cosmopolitan toolchain
      if: ${{ contains(fromJSON(inputs.matrix_json).setup_prefix, 'CC=cosmocc') }}
      shell: bash
      run: |
        set -exv
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -q cosmopolitan/cosmocc.zip
        chmod +x bin/cosmo*

    - name: Prepare Emscripten toolchain
      if: ${{ contains(fromJSON(inputs.matrix_json).label, 'emscripten') }}
      shell: bash
      run: |
        set -exv
        git clone --depth 1 https://github.com/emscripten-core/emsdk.git
        sh emsdk/emsdk install latest
        sh emsdk/emsdk activate latest
        # Add both emscripten frontend tools and bundled LLVM utilities.
        echo "$PWD/emsdk/upstream/emscripten" >> "$GITHUB_PATH"
        echo "$PWD/emsdk/upstream/bin" >> "$GITHUB_PATH"

    - name: Install pip packages
      if: ${{ fromJSON(inputs.matrix_json).pip_packages != '' }}
      shell: bash
      run: |
        set -exv
        VENV_PYTHON=".venv/bin/python"
        VENV_BIN_DIR="$PWD/.venv/bin"
        python3 -m venv .venv
        if [ -x .venv/Scripts/python.exe ]; then
          VENV_PYTHON=".venv/Scripts/python.exe"
          VENV_BIN_DIR="$PWD/.venv/Scripts"
        fi
        "$VENV_PYTHON" -m pip install -U pip \
          ${{ fromJSON(inputs.matrix_json).pip_packages || '' }}
        if command -v cygpath >/dev/null 2>&1; then
          echo "$(cygpath -w "$VENV_BIN_DIR")" >> "$GITHUB_PATH"
        else
          echo "$VENV_BIN_DIR" >> "$GITHUB_PATH"
        fi

    - name: Build and test (Autotools, bash)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'bash' }}
      shell: bash
      run: |
        set -exv
        export PATH="$PWD/build-aux:$PWD/bin:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build and test (Meson, bash)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'bash' }}
      shell: bash
      run: |
        set -exv
        export PATH="$PWD/build-aux:$PWD/bin:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        meson compile -C builddir -v
        LLVM_PROFILE_FILE="$PWD/coverage-%p-%m.profraw" meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, msys2)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
        PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build and test (Meson, msys2)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
        PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        meson compile -C builddir -v
        meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, Cygwin)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
        ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build and test (Meson, Cygwin)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -exv
        PATH="$PWD/build-aux:$PATH"
        ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        meson compile -C builddir -v
        if grep ^ac_cv_prog_ac_ct_CC=gcc$ config.log; then
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir
        else
          : # cross build: don't run test
        fi

    - name: Build and test (Meson, Command Prompt)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'cmd' }}
      shell: cmd
      run: |
        setlocal ENABLEDELAYEDEXPANSION
        python -m pip install --upgrade pip
        if errorlevel 1 exit /b !errorlevel!
        python -m pip install meson
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain compile -C builddir
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir
        if errorlevel 1 exit /b !errorlevel!
        endlocal

    - name: Build and test (Autotools, Alpine container)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'alpine' }}
      shell: bash
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          set -xve
          apk add --no-cache ${{ fromJSON(inputs.matrix_json).guest_packages || '' }}
          addgroup -g '"$(id -g)"' hostgrp 2>/dev/null || true
          adduser  -D -u '"$(id -u)"' -G hostgrp hostusr 2>/dev/null || true
          chown -R '"$(id -u):$(id -g)"' /src
          su hostusr -c "
            ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
            ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
            ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}
          "
        '

    - name: Build and test (Meson, Alpine container)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'alpine' }}
      shell: bash
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          set -xve
          apk add --no-cache ${{ fromJSON(inputs.matrix_json).guest_packages || '' }}
          addgroup -g '"$(id -g)"' hostgrp 2>/dev/null || true
          adduser  -D -u '"$(id -u)"' -G hostgrp hostusr 2>/dev/null || true
          chown -R '"$(id -u):$(id -g)"' /src
          su hostusr -c "
            ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
            meson compile -C builddir -v
            meson test -C builddir
          "
        '

    - name: Build and test (Autotools, FreeBSD/OpenBSD/NetBSD/Haiku)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          set -xv
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          ${{ fromJSON(inputs.matrix_json).make || 'make' }} V=1
          ${{ fromJSON(inputs.matrix_json).make || 'make' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Build and test (Meson, FreeBSD/OpenBSD/NetBSD/Haiku)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms' }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ fromJSON(inputs.matrix_json).cp_os || '' }}
        architecture: ${{ fromJSON(inputs.matrix_json).cp_arch || '' }}
        version: ${{ fromJSON(inputs.matrix_json).cp_version || '' }}
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          set -xv
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          meson compile -C builddir -v
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, DragonFlyBSD)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'dragonflybsd-vm' }}
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        sync-time: true
        sync: nfs
        prepare: |
          #pkg update -f
          pkg install -y ${{ fromJSON(inputs.matrix_json).extra_packages || 'gmake' }}
        run: |
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          gmake V=1
          gmake ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Configure, build, and test (Meson, DragonFlyBSD)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'dragonflybsd-vm' }}
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        sync-time: true
        sync: rsync
        prepare: |
          #pkg update -f
          pkg install -y ${{ fromJSON(inputs.matrix_json).extra_packages || 'meson' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          meson compile -C builddir
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, OpenIndiana)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'openindiana-vm' }}
      uses: vmactions/openindiana-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        usesh: true
        sync: rsync
        prepare: |
          pkg set-publisher -g http://pkg.openindiana.org/hipster/ openindiana.org
          #pkg update -f
          pkg install --accept --no-be ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          ${{ fromJSON(inputs.matrix_json).make || 'gmake' }} V=1
          ${{ fromJSON(inputs.matrix_json).make || 'gmake' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Configure, build, and test (Meson, OpenIndiana)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'openindiana-vm' }}
      uses: vmactions/openindiana-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        usesh: true
        sync: rsync
        prepare: |
          pkg set-publisher -g http://pkg.openindiana.org/hipster/ openindiana.org
          #pkg update -f
          pkg install --accept --no-be ${{ fromJSON(inputs.matrix_json).extra_packages || '' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          meson compile -C builddir
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, Solaris)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'solaris-vm' }}
      uses: vmactions/solaris-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        sync-time: true
        sync: nfs
        prepare: |
          #pkg update -f
          pkg install --accept ${{ fromJSON(inputs.matrix_json).extra_packages || 'gnu-make gcc' }}
        run: |
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          ${{ fromJSON(inputs.matrix_json).make || 'gmake' }} V=1
          ${{ fromJSON(inputs.matrix_json).make || 'gmake' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Configure, build, and test (Meson, Solaris)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'solaris-vm' }}
      uses: vmactions/solaris-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        sync-time: true
        sync: nfs
        prepare: |
          #pkg update -f
          pkg install --accept ${{ fromJSON(inputs.matrix_json).extra_packages || 'gnu-make gcc meson ninja' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          meson compile -C builddir
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Build and test (Autotools, OmniOS)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'autotools' && fromJSON(inputs.matrix_json).exec_type == 'omnios-vm' }}
      uses: vmactions/omnios-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        usesh: true
        sync: rsync
        prepare: |
          pkg update -f
          pkg install --accept ${{ fromJSON(inputs.matrix_json).extra_packages || 'developer/gcc13 developer/build/gnu-make' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} ${rel-.}/configure ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          ${{ fromJSON(inputs.matrix_json).make || 'gmake' }} V=1
          ${{ fromJSON(inputs.matrix_json).make || 'gmake' }} ${{ fromJSON(inputs.matrix_json).check_target || 'check' }}

    - name: Configure, build, and test (Meson, OmniOS)
      if: ${{ fromJSON(inputs.matrix_json).buildtool == 'meson' && fromJSON(inputs.matrix_json).exec_type == 'omnios-vm' }}
      uses: vmactions/omnios-vm@v1
      with:
        release: ${{ fromJSON(inputs.matrix_json).version || '' }}
        usesh: true
        sync: rsync
        prepare: |
          #pkg update -f
          pkg install --accept ${{ fromJSON(inputs.matrix_json).extra_packages || 'developer/build/gnu-make' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          export PATH="$HOME/.local/bin:$PATH"
          python3 -m pip install --user --upgrade pip meson ninja
          ${{ fromJSON(inputs.matrix_json).setup_prefix || '' }} meson setup builddir ${{ fromJSON(inputs.matrix_json).setup_options || '' }}
          meson compile -C builddir
          meson ${{ fromJSON(inputs.matrix_json).check_target || 'test' }} -C builddir

    - name: Capture coverage
      if: >-
        ${{ always()
            && (contains(fromJSON(inputs.matrix_json).setup_options, '--enable-gcov')
                || contains(fromJSON(inputs.matrix_json).setup_options, '-Db_coverage')
                || contains(fromJSON(inputs.matrix_json).label, 'emscripten-coverage'))
            && fromJSON(inputs.matrix_json).exec_type == 'bash' }}
      shell: bash
      run: |
        if test -f coverage.info; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        if [[ "${{ fromJSON(inputs.matrix_json).label || '' }}" == *"emscripten-coverage"* ]]; then
          LLVM_PROFDATA=""
          LLVM_COV=""
          for tool_dir in "" "$PWD/emsdk/upstream/bin" "$HOME/emsdk/upstream/bin"; do
            [ -n "$LLVM_PROFDATA" ] || LLVM_PROFDATA="${tool_dir:+$tool_dir/}llvm-profdata"
            [ -x "$LLVM_PROFDATA" ] || LLVM_PROFDATA=""
            [ -n "$LLVM_COV" ] || LLVM_COV="${tool_dir:+$tool_dir/}llvm-cov"
            [ -x "$LLVM_COV" ] || LLVM_COV=""
          done
          [ -n "$LLVM_PROFDATA" ] || LLVM_PROFDATA="$(command -v llvm-profdata || true)"
          [ -n "$LLVM_COV" ] || LLVM_COV="$(command -v llvm-cov || true)"
          [ -n "$LLVM_PROFDATA" ] || LLVM_PROFDATA="$(xcrun --find llvm-profdata 2>/dev/null || true)"
          [ -n "$LLVM_COV" ] || LLVM_COV="$(xcrun --find llvm-cov 2>/dev/null || true)"
          if [ -z "$LLVM_PROFDATA" ] || [ -z "$LLVM_COV" ]; then
            echo "llvm-profdata/llvm-cov are missing; skipping coverage capture"
            exit 0
          fi
          echo "Using llvm-profdata: $LLVM_PROFDATA"
          echo "Using llvm-cov: $LLVM_COV"
          mapfile -t PROFRAW_FILES < <(find . -type f -name '*.profraw')
          if [ "${#PROFRAW_FILES[@]}" -eq 0 ]; then
            echo "No .profraw files found; skipping coverage capture"
            exit 0
          fi
          rm -f coverage.profdata
          "$LLVM_PROFDATA" merge -sparse "${PROFRAW_FILES[@]}" -o coverage.profdata || true
          mapfile -t COV_OBJECTS < <(find . -type f \
            \( -name '*.wasm' -o -name '*.so' -o -name '*.a' \))
          if [ "${#COV_OBJECTS[@]}" -eq 0 ]; then
            echo "No coverage objects found for llvm-cov; skipping coverage capture"
            exit 0
          fi
          "$LLVM_COV" export -format=lcov \
            -instr-profile=coverage.profdata \
            "${COV_OBJECTS[@]}" > coverage.info || true
        elif command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info \
            --gcov-executable gcov-14 || true
        elif command -v lcov >/dev/null 2>&1; then
          # Keep src for static builds; avoid duplicate gcda from src/.libs.
          lcov -c \
            -d "$PWD" \
            --rc branch_coverage=1 \
            -o coverage.info || true
        else
          echo "No gcovr, lcov, or llvm-cov found; skipping coverage capture"
        fi
        # Normalize absolute paths so Coveralls can map files to the repo tree.
        # Meson may emit builddir paths, so strip builddir before the repo root.
        if test -f coverage.info; then
          sed "s#^SF:${PWD}/builddir/#SF:#; s#^SF:${PWD}/#SF:#; s#^SF:/#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        fi

    - name: Capture coverage (Windows)
      if: >-
        ${{ always()
            && (contains(fromJSON(inputs.matrix_json).setup_options, '--enable-gcov')
                || contains(fromJSON(inputs.matrix_json).setup_options, '-Db_coverage'))
            && fromJSON(inputs.matrix_json).exec_type == 'msys2' }}
      shell: msys2 {0}
      run: |
        set -exv
        if [ -e coverage.info ]; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        if command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info
          cat coverage.info
        elif command -v lcov >/dev/null 2>&1; then
          lcov -c \
            -d "${PWD}" \
            --rc branch_coverage=1 \
            -o coverage.info
          sed "s#^SF:${PWD}\\\\builddir\\\\#SF:#; s#^SF:${PWD}\\\\#SF:#; s#^SF:\\\\#SF:#" \
            coverage.info > coverage.info.tmp
          mv coverage.info.tmp coverage.info
          head -n40 coverage.info
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi

    - name: Fetch BSD artifacts from VM
      if: ${{ always() && fromJSON(inputs.matrix_json).exec_type == 'cross-platform-vms' }}
      shell: bash
      run: |
        if [ "${{ fromJSON(inputs.matrix_json).cp_os || '' }}" = "haiku" ]; then
          vm_workspace="/boot/home${GITHUB_WORKSPACE}"
          user=user
        else
          vm_workspace="${GITHUB_WORKSPACE}"
          user=runner
        fi
        ssh "${user}"@cross_platform_actions_host bash -c 'cd '"${vm_workspace}"' && find . -type f "(" -name "*.log" -o -name "*.trs" -o -name "*.info" ")" -exec tar cvzf /tmp/artifacts.tar.gz {} +' || true
        scp "${user}"@cross_platform_actions_host:/tmp/artifacts.tar.gz . || true
        tar xvzf artifacts.tar.gz || true

    - name: Upload artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        path: |
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
          pkg_install-err.log
          builddir/meson-dist/**
          builddir/meson-logs/**
          builddir/**/_artifacts/**
          builddir/**/testlog.txt
          builddir/**/*.log
          libsixel-*/_build/sub/**/*.log
          libsixel-*/_build/sub/**/*.trs
          libsixel-*/_build/sub/**/_artifacts/**
        if-no-files-found: warn
        overwrite: true

    - name: Upload to Coveralls (per-flag, parallel)
      id: coveralls_upload
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      if: ${{ hashFiles('coverage.info') != '' }}
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: coverage.info
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Wait before Coveralls retry (per-flag)
      if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
      shell: bash
      run: sleep 5

    - name: Upload to Coveralls (per-flag, retry)
      if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: coverage.info
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true
