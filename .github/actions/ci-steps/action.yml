    - name: Upload Ruby coverage to Coveralls (per-flag, retry)
      if: >-
        ${{ hashFiles('ruby-coverage.info', 'builddir/ruby-coverage.info') != ''
            && steps.ruby_coverage_info_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload_ruby.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
