    - name: Upload to Coveralls (per-flag, parallel)
      id: coveralls_upload
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      if: >-
        ${{ hashFiles('coverage.info') != ''
            && steps.coverage_info_check.outputs.upload_ready == 'true' }}
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: coverage.info
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Wait before Coveralls retry (per-flag)
      if: >-
        ${{ hashFiles('coverage.info') != ''
            && steps.coverage_info_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload.outcome == 'failure' }}
      shell: bash
      run: |
        set -o igncr 2>/dev/null || true
        sleep 5

    - name: Upload to Coveralls (per-flag, retry)
      if: >-
        ${{ hashFiles('coverage.info') != ''
            && steps.coverage_info_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: coverage.info
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Upload Cobertura to Coveralls (per-flag, parallel)
      id: coveralls_upload_cobertura
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      if: >-
        ${{ hashFiles('coverage.cobertura.xml') != ''
            && steps.cobertura_coverage_check.outputs.upload_ready == 'true' }}
      with:
        github-token: ${{ inputs.github_token }}
        file: coverage.cobertura.xml
        format: cobertura
        base-path: ${{ github.workspace }}
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Wait before Coveralls retry (cobertura per-flag)
      if: >-
        ${{ hashFiles('coverage.cobertura.xml') != ''
            && steps.cobertura_coverage_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload_cobertura.outcome == 'failure' }}
      shell: bash
      run: |
        set -o igncr 2>/dev/null || true
        sleep 5

    - name: Upload Cobertura to Coveralls (per-flag, retry)
      if: >-
        ${{ hashFiles('coverage.cobertura.xml') != ''
            && steps.cobertura_coverage_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload_cobertura.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ inputs.github_token }}
        file: coverage.cobertura.xml
        format: cobertura
        base-path: ${{ github.workspace }}
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Upload to Codecov (per-flag)
      continue-on-error: true
      uses: codecov/codecov-action@v5
      if: >-
        ${{ inputs.codecov_token != ''
            && hashFiles('coverage.info') != ''
            && steps.coverage_info_check.outputs.upload_ready == 'true' }}
      with:
        token: ${{ inputs.codecov_token }}
        files: coverage.info
        flags: ${{ fromJSON(inputs.matrix_json).label || '' }}
        fail_ci_if_error: false
        verbose: true

    - name: Upload Python coverage to Coveralls (per-flag, parallel)
      id: coveralls_upload_python
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      if: >-
        ${{ hashFiles('python-coverage.info', 'builddir/python-coverage.info') != ''
            && steps.python_coverage_info_check.outputs.upload_ready == 'true' }}
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: ${{ steps.python_coverage_info_check.outputs.coverage_file }}
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Wait before Coveralls retry (python per-flag)
      if: >-
        ${{ hashFiles('python-coverage.info', 'builddir/python-coverage.info') != ''
            && steps.python_coverage_info_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload_python.outcome == 'failure' }}
      shell: bash
      run: |
        set -o igncr 2>/dev/null || true
        sleep 5

    - name: Upload Python coverage to Coveralls (per-flag, retry)
      if: >-
        ${{ hashFiles('python-coverage.info', 'builddir/python-coverage.info') != ''
            && steps.python_coverage_info_check.outputs.upload_ready == 'true'
            && steps.coveralls_upload_python.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ inputs.github_token }}
        path-to-lcov: ${{ steps.python_coverage_info_check.outputs.coverage_file }}
        flag-name: ${{ fromJSON(inputs.matrix_json).label || '' }}
        parallel: true

    - name: Upload Python coverage to Codecov (per-flag)
      continue-on-error: true
      uses: codecov/codecov-action@v5
      if: >-
        ${{ inputs.codecov_token != ''
            && hashFiles('python-coverage.info', 'builddir/python-coverage.info') != ''
