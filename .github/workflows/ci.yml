name: libsixel CI (build & test)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16

jobs:
  smoke:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc
            buildtool: autotools
            runner: ubuntu-latest
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc
            buildtool: meson
            runner: ubuntu-latest
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc
            buildtool: autotools
            runner: macos-latest
            exec_type: bash

          - label: Meson-macos-aarch64-gcc
            buildtool: meson
            runner: macos-latest
            extra_packages: >-
              meson
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-x86_64
            buildtool: meson
            runner: windows-latest
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  pgo:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-clang-pgo
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-pgo=generate --with-pgo-data=$PWD/pgo
            pgo_use_options: >-
              --enable-pgo=use --with-pgo-profdata=$PWD/pgo/default.profdata
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-clang-pgo
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              -Db_pgo=generate
            pgo_use_options: >-
              -Db_pgo=use
            extra_packages: >-
              meson
              clang
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-gcc-pgo
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-pgo=generate
            pgo_use_options: >-
              --enable-pgo=use
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-pgo
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Db_pgo=generate
            pgo_use_options: >-
              -Db_pgo=use
            extra_packages: >-
              meson
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-pgo
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Dmsvc_pgo=generate -Dmsvc_pgo_data=builddir/pgo/libsixel.pgd
            pgo_use_options: >-
              -Dmsvc_pgo=use -Dmsvc_pgo_data=builddir/pgo/libsixel.pgd
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  python:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-python
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-python
            extra_packages: >-
              clang
            pip_packages: >-
              build
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-python
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-python
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-python
            pip_packages: >-
              build
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-python
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-x86_64-python
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Dpython=enabled
            pip_packages: >-
              build
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  python-coverage:
    needs: [python]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-python-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-python
            extra_packages: >-
              clang
            pip_packages: >-
              build
              pytest
              coverage
            check_target: check-python
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-python-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
              pytest
              coverage
            check_target: compile test-python
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-python-coverage
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-python
            pip_packages: >-
              build
              pytest
              coverage
            check_target: check-python
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-python-coverage
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
              pytest
              coverage
            check_target: compile test-python
            exec_type: bash

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  ruby:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-ruby
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-ruby
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-ruby
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Druby=enabled
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-ruby
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-ruby
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-ruby
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Druby=enabled
            extra_packages: >-
              meson
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-x86_64-ruby
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Druby=enabled
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  autotools-out_of_tree:
    needs: [smoke]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-vpath_build
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              mkdir build;
              cd build;
              rel=..;
            extra_packages: >-
              clang
            exec_type: bash

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  lto:
    needs: [smoke]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-clang-lto-no
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-lto=no
            extra_packages: >-
              clang
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-clang-lto-full
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-lto=full
            extra_packages: >-
              clang
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-clang-lto-thin
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-lto=thin
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-lto-full
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Db_lto=true
              -Db_lto_mode=default
            exec_type: cmd

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}


  coverage-autotools:
    needs: [smoke]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-static-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-gcov
              --disable-shared
              --enable-static
            extra_packages: >-
              gcc-14
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-no-simd-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-gcov
              --disable-simd
            extra_packages: >-
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-no-threads-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-gcov
              --disable-threads
            extra_packages: >-
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-clang-png-jpeg-tiff-webp-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
              --with-png
              --with-jpeg
              --with-tiff
              --with-webp
            extra_packages: >-
              meson
              clang
              libpng-dev
              libjpeg-dev
              libtiff-dev
              libwebp-dev
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-gdk-pixbuf2-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
              --without-png
              --without-jpeg
              --without-tiff
              --with-gdk-pixbuf2
            extra_packages: >-
              clang
              libgdk-pixbuf2.0-dev
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-GD-no-aborttrace-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
              --without-png
              --without-jpeg
              --without-tiff
              --with-gd
              --disable-abort-trace
            extra_packages: >-
              clang
              libgd-dev
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Autotools-macos-x86_64-coverage
            buildtool: autotools
            runner: macos-13
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              lcov
            exec_type: bash

          - label: Autotools-macos-aarch64-png-jpegturbo-tiff-webp-coverage
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-gcov
              --with-png
              --with-jpeg
              --with-tiff
              --with-webp
            extra_packages: >-
              libpng
              jpeg-turbo
              libtiff
              webp
              lcov
            exec_type: bash

          - label: Autotools-macos-aarch64-gdk-pixbuf2-coverage
            buildtool: autotools
            runner: macos-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
              --without-png
              --without-jpeg
              --without-tiff
              --with-gdk-pixbuf2
            extra_packages: >-
              gdk-pixbuf
              lcov
            exec_type: bash

          - label: Autotools-macos-aarch64-GD-coverage
            buildtool: autotools
            runner: macos-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
              --without-png
              --without-jpeg
              --without-tiff
              --with-gd
            extra_packages: >-
              gd
              lcov
            exec_type: bash

          - label: Autotools-msys2-mingw64-static-coverage
            buildtool: autotools
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --disable-shared
              --enable-static
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-mingw64-no-simd-coverage
            buildtool: autotools
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --enable-gcov
              --disable-simd
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-mingw64-no-threads-coverage
            buildtool: autotools
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --disable-threads
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-ucrt64-coverage
            buildtool: autotools
            runner: windows-latest
            msystem: UCRT64
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-clang64-coverage
            buildtool: autotools
            runner: windows-latest
            msystem: CLANG64
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-clang-x86_64-toolchain
              mingw-w64-clang-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-msys-gcc-coverage
            buildtool: autotools
            runner: windows-latest
            msystem: MSYS
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              make
              gcc
              lcov
            exec_type: msys2

          - label: Autotools-cygwin64-clangcl-msvc_abi-coverage
            buildtool: autotools
            runner: windows-latest
            setup_prefix: >-
              CC=clang-cl
              LD=link
              AR="sh ar-lib lib"
              ARFLAGS=cr
              NM="dumpbin -symbols"
              STRIP=:
              RANLIB=:
            setup_options: >-
              --host=x86_64-pc-windows-msvc
              --enable-gcov
            extra_packages: >-
              make
              python3-gcovr
            exec_type: cygwin

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\a"

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}


  coverage-meson:
    needs: [smoke]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Meson-ubuntu-x86_64-static-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Db_coverage=true
              -Db_staticpic=true
              -Ddefault_library=static
            extra_packages: >-
              meson
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Meson-ubuntu-x86_64-no-simd-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Db_coverage=true
              -Dsimd=disabled
            extra_packages: >-
              meson
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Meson-ubuntu-x86_64-no-threads-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Db_coverage=true
              -Dthreads=disabled
            extra_packages: >-
              gcc-14
            pip_packages: >-
              meson
              gcovr
            exec_type: bash

          - label: Meson-ubuntu-x86_64-clang-png-jpeg-tiff-webp-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              -Db_coverage=true
              -Dpng=enabled
              -Djpeg=enabled
              -Dtiff=enabled
