    - name: Upload meson artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: meson-${{ matrix.os }}-${{ matrix.sys || 'native' }}-${{ matrix.compiler || 'default' }}-${{ matrix.variant || 'default' }}
        path: |
          builddir/meson-logs/**
          builddir/**/_artifacts/**
          builddir/**/testlog.txt
          builddir/**/*.log
        if-no-files-found: warn
        overwrite: true

