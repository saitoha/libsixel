            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            variant: unity
            unity: true
            extra_packages: >-
              python
              ninja
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-ninja
          - label: mingw32
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW32
            variant: default
            extra_packages: >-
              python
              ninja
              mingw-w64-i686-toolchain
              mingw-w64-i686-meson
              mingw-w64-i686-ninja
          - label: msys
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MSYS
            variant: default
            extra_packages: >-
              python
              ninja
              meson
              gcc
              pkgconf
          - label: cygwin
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: CYGWIN
            variant: default
          - label: cygwin unity
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: CYGWIN
            variant: unity
            unity: true
          - label: cygwin amalgamated_lib
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: CYGWIN
            variant: amalgamated_lib
            amalgamated_lib: true

    steps:
    - name: Configure git EOL
      if: matrix.sys == 'CYGWIN'
      run: git config --global core.autocrlf false

    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Install extra packages (Linux)
      if: runner.os == 'Linux' && (matrix.extra_packages || '') != ''
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.extra_packages }}

    - name: Setup MSVC developer env (vcvars)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_libpng == true || matrix.vcpkg_libjpeg == true) }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ matrix.vcpkg_libpng || false }}-${{ matrix.vcpkg_libjpeg || false }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, libpng/libjpeg)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_libpng == true || matrix.vcpkg_libjpeg == true) }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path $vcpkgRoot)) {
          git clone --depth 1 --branch "${{ env.VCPKG_REF }}" https://github.com/microsoft/vcpkg $vcpkgRoot
        } else {
          git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
          git -C $vcpkgRoot reset --hard FETCH_HEAD
        }
        cd $vcpkgRoot
        .\\bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        if ('${{ matrix.vcpkg_libpng || false }}' -eq 'true') {
          $packages += 'libpng'
        }
        if ('${{ matrix.vcpkg_libjpeg || false }}' -eq 'true') {
          $packages += 'libjpeg-turbo'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows' && matrix.sys != 'CYGWIN' && matrix.sys != 'MSVC'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys == 'MSYS' && 'MSYS' || matrix.sys }}
        update: true
        install: ${{ matrix.extra_packages || 'python ninja' }}

    - name: Setup Cygwin
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: gcc-core,make,pkg-config,python3,python3-pip,ninja

    - name: Install Meson (non-Windows)
      if: runner.os != 'Windows' && matrix.variant != 'alpine' && !contains(fromJson('["freebsd","openbsd","netbsd","haiku","dragonflybsd"]'), matrix.platform || '')
      run: |
        python3 -m venv .meson-venv
        . .meson-venv/bin/activate
        pip install --upgrade pip
        pip install meson ninja
        echo "$PWD/.meson-venv/bin" >> "$GITHUB_PATH"

    - name: Install Meson (Cygwin)
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\cygwin'
        if (-not (Test-Path $cygwinRoot)) { $cygwinRoot = 'C:\cygwin64' }
        $scriptLines = @(
          'set -eu',
          'set -o pipefail 2>/dev/null || true',
          'python3 -m pip install --upgrade pip',
          'python3 -m pip install meson',
          'gp_posix=$(cygpath -u "$GITHUB_PATH")',
          'echo "$HOME/.local/bin" >> "$gp_posix"'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure, build, and test (Meson, FreeBSD/OpenBSD/NetBSD/Haiku)
      if: matrix.platform == 'freebsd' || matrix.platform == 'openbsd' || matrix.platform == 'netbsd' || matrix.platform == 'haiku'
      timeout-minutes: 30
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: &meson_non_windows |
          set -eux

          : "${GITHUB_WORKSPACE:=$PWD}"
          artifact_dir="${GITHUB_WORKSPACE}/_artifacts/${{ matrix.platform }}"
          artifact_tar="${GITHUB_WORKSPACE}/_artifacts/${{ matrix.platform }}.tar.gz"
          collect_logs() {
            status=$?
            cd "$GITHUB_WORKSPACE"
            mkdir -p "$artifact_dir"
            find . -type f \( -name '*.log' -o -name '*.trs' -o -name '*.info' \) -exec tar cvzf "$artifact_tar" {} +
            exit "$status"
          }
          trap 'collect_logs' EXIT

          if [ "${{ matrix.platform || '' }}" = "freebsd" ]; then
            pkg_prefix=""
            if [ "$(id -u)" -ne 0 ]; then
              if command -v sudo >/dev/null 2>&1; then
                pkg_prefix="sudo"
              elif command -v doas >/dev/null 2>&1; then
                pkg_prefix="doas"
              else
                echo "No privilege escalation helper available" >&2
                exit 1
              fi
            fi

            ${pkg_prefix:+$pkg_prefix }pkg update -f
            ${pkg_prefix:+$pkg_prefix }pkg install -y \
              python3 \
              meson \
              ninja
          elif [ "${{ matrix.platform || '' }}" = "openbsd" ]; then
            pkg_prefix=""
            if [ "$(id -u)" -ne 0 ]; then
              if command -v sudo >/dev/null 2>&1; then
                pkg_prefix="sudo"
              elif command -v doas >/dev/null 2>&1; then
                pkg_prefix="doas"
              else
                echo "No privilege escalation helper available" >&2
                exit 1
              fi
            fi

            ${pkg_prefix:+$pkg_prefix }pkg_add \
              rsync \
              python%3 \
              meson \
              ninja
          elif [ "${{ matrix.platform || '' }}" = "netbsd" ]; then
            pkg_prefix=""
            if [ "$(id -u)" -ne 0 ]; then
              if command -v sudo >/dev/null 2>&1; then
                pkg_prefix="sudo"
              elif command -v doas >/dev/null 2>&1; then
                pkg_prefix="doas"
              else
                echo "No privilege escalation helper available" >&2
                exit 1
              fi
            fi

            trap 'status=$?; if [ "$status" -ne 0 ] && \
              [ -f /var/db/pkgin/pkg_install-err.log ]; then \
              echo "pkg_install error log:" >&2; \
              cat /var/db/pkgin/pkg_install-err.log >&2; \
              cp /var/db/pkgin/pkg_install-err.log pkg_install-err.log || true; \
            fi' EXIT

            ${pkg_prefix:+$pkg_prefix }pkgin -y update
            ${pkg_prefix:+$pkg_prefix }pkgin -y install \
              python311 \
              meson

            if ! command -v ninja >/dev/null 2>&1; then
              ${pkg_prefix:+$pkg_prefix }pkgin -y install ninja
            else
              echo "ninja is already available; skipping install" >&2
            fi
          elif [ "${{ matrix.platform || '' }}" = "haiku" ]; then
            pkgman refresh
            pkgman install -y meson ninja
          fi

          if [ "${{ matrix.musl || '' }}" = "true" ]; then
            export CC=musl-gcc
          elif [ '${{ matrix.sys || '' }}' = 'i686' ]; then
            export CC=gcc
            export CFLAGS="-m32"
            export LDFLAGS="-m32"
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig
            export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
          fi
          disable_threads_flag=""
          if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
            disable_threads_flag="-Dthreads=disabled"
          fi
          disable_tools_flags=""
          if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
            disable_tools_flags="-Dimg2sixel=disabled -Dsixel2png=disabled"
          fi
          disable_simd_flag=""
          if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
            disable_simd_flag="-Dsimd=disabled"
          fi
          unity_flag=""
          if [ "${{ matrix.unity || '' }}" = "true" ]; then
            unity_flag="-Dunity=on"
          fi
          default_library_flag=""
          if [ "${{ matrix.static_only || '' }}" = "true" ]; then
            default_library_flag="--default-library static"
          fi
          amalgamated_lib_flag=""
          if [ "${{ matrix.amalgamated_lib || '' }}" = "true" ]; then
            amalgamated_lib_flag="-Damalgamated_lib=true"
          fi
          meson setup builddir \
              --wrap-mode=nodownload \
              ${default_library_flag} \
              -Dbashcompletiondir=disabled \
              -Dzshcompletiondir=disabled \
              -Dpython=disabled \
              -Dtests=true \
              ${amalgamated_lib_flag} \
              ${disable_tools_flags} \
              ${disable_threads_flag} \
              ${disable_simd_flag}
          meson compile -C builddir
          meson test -C builddir
#          meson compile -C builddir -v
#          meson test -C builddir -v || { cat builddir/meson-logs/testlog.txt || true; exit 1; }

    - name: Fetch BSD artifacts from VM (Meson)
      if: matrix.platform == 'freebsd' || matrix.platform == 'openbsd' || matrix.platform == 'netbsd' || matrix.platform == 'haiku'
      run: |
        set -eux
        mkdir -p "${GITHUB_WORKSPACE}/_artifacts"
        remote_tar="${GITHUB_WORKSPACE}/_artifacts/${{ matrix.platform }}.tar.gz"
        if ssh cross_platform_actions_host "test -f \"${remote_tar}\""; then
          scp cross_platform_actions_host:"${remote_tar}" "${GITHUB_WORKSPACE}/_artifacts/"
        else
          echo "No artifact archive found on VM; skipping copy" >&2
        fi

    - name: Configure, build, and test (Meson, DragonFlyBSD)
      if: matrix.platform == 'dragonflybsd'
      timeout-minutes: 30
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ matrix.df_release }}
        usesh: true
        copyback: false
        run: |
          set -eux
          artifact_dir="${GITHUB_WORKSPACE}/_artifacts/dragonflybsd"
          artifact_tar="${GITHUB_WORKSPACE}/_artifacts/dragonflybsd.tar.gz"
          collect_logs() {
            status=$?
            cd "$GITHUB_WORKSPACE"
            mkdir -p "$artifact_dir"
            find . -type f \( -name '*.log' -o -name '*.trs' -o -name '*.info' \) -exec tar cvzf "$artifact_tar" {} +
            exit "$status"
          }
          trap 'collect_logs' EXIT
          pkg update -f
          pkg install -y python3 meson ninja pkgconf

          disable_threads_flag=""
          if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
            disable_threads_flag="-Dthreads=disabled"
          fi
          disable_tools_flags=""
          if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
            disable_tools_flags="-Dimg2sixel=disabled -Dsixel2png=disabled"
          fi
          disable_simd_flag=""
          if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
            disable_simd_flag="-Dsimd=disabled"
          fi
          unity_flag=""
          if [ "${{ matrix.unity || '' }}" = "true" ]; then
            unity_flag="-Dunity=on"
          fi
          default_library_flag=""
          if [ "${{ matrix.static_only || '' }}" = "true" ]; then
            default_library_flag="--default-library static"
          fi
          amalgamated_lib_flag=""
          if [ "${{ matrix.amalgamated_lib || '' }}" = "true" ]; then
            amalgamated_lib_flag="-Damalgamated_lib=true"
          fi

          date -u
          rdate -n pool.ntp.org || true
          sleep 2
          date -u

          # DragonFly guests in the cross-platform runner do not expose
          # AVX/AVX2 state, so force a portable SIMD baseline to avoid
          # SIGILL in VPTE-heavy tests while still exercising the filter.
          export SIXEL_SIMD_LEVEL=sse2

          cd "$GITHUB_WORKSPACE"
          meson setup builddir \
              --wrap-mode=nodownload \
              ${default_library_flag} \
              -Dbashcompletiondir=disabled \
              -Dzshcompletiondir=disabled \
              -Dpython=disabled \
              -Dtests=true \
              ${amalgamated_lib_flag} \
              ${disable_tools_flags} \
              ${disable_threads_flag} \
              ${disable_simd_flag}
          meson compile -C builddir
          meson test -C builddir
#          meson compile -C builddir -v
#          meson test -C builddir -v || { cat builddir/meson-logs/testlog.txt || true; exit 1; }

    - name: Fetch DragonFlyBSD artifacts from VM (Meson)
      if: matrix.platform == 'dragonflybsd'
      run: |
        set -eux
        mkdir -p "${GITHUB_WORKSPACE}/_artifacts"
        remote_tar="${GITHUB_WORKSPACE}/_artifacts/dragonflybsd.tar.gz"
        if ssh cross_platform_actions_host "test -f \"${remote_tar}\""; then
          scp cross_platform_actions_host:"${remote_tar}" "${GITHUB_WORKSPACE}/_artifacts/"
        else
          echo "No artifact archive found on VM; skipping copy" >&2
        fi

    - name: Upload pkg_install log (Meson NetBSD)
      if: ${{ failure() && matrix.platform == 'netbsd' }}
      uses: actions/upload-artifact@v4
      with:
        name: pkg_install-log-meson-${{ matrix.label }}
        path: pkg_install-err.log
        if-no-files-found: ignore

    - name: Upload meson artifacts (NetBSD)
      if: matrix.platform == 'netbsd' && always()
      uses: actions/upload-artifact@v4
      with:
        name: meson-${{ matrix.label }}
        path: |
          builddir/meson-logs/**
          builddir/_artifacts/**
          coverage.info
        if-no-files-found: warn

    - name: Configure, build, and test (Meson, non-Windows)
      if: runner.os != 'Windows' && matrix.variant != 'alpine' && !contains(fromJson('["freebsd","openbsd","netbsd","haiku","dragonflybsd"]'), matrix.platform || '')
      run: *meson_non_windows

    - name: Configure, build, and test (Meson, Alpine container)
      if: matrix.variant == 'alpine'
      run: |
        set -eux
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          apk add --no-cache \
            bash \
            build-base \
            coreutils \
            curl-dev \
            findutils \
            libjpeg-turbo-dev \
            libpng-dev \
            meson \
            ninja \
            pkgconf \
            python3 \
            zlib-dev

          disable_threads_flag=""
          if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
            disable_threads_flag="-Dthreads=disabled"
          fi
          disable_tools_flags=""
          if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
            disable_tools_flags="-Dimg2sixel=disabled -Dsixel2png=disabled"
          fi
          disable_simd_flag=""
          if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
            disable_simd_flag="-Dsimd=disabled"
          fi
          default_library_flag=""
          if [ "${{ matrix.static_only || '' }}" = "true" ]; then
            default_library_flag="--default-library static"
          fi
          amalgamated_lib_flag=""
          if [ "${{ matrix.amalgamated_lib || '' }}" = "true" ]; then
            amalgamated_lib_flag="-Damalgamated_lib=true"
          fi
          meson setup builddir \
              --wrap-mode=nodownload \
              ${default_library_flag} \
              -Dbashcompletiondir=disabled \
              -Dzshcompletiondir=disabled \
              -Dpython=disabled \
              -Dtests=true \
              ${amalgamated_lib_flag} \
              ${disable_tools_flags} \
              ${disable_threads_flag} \
              ${disable_simd_flag}
          meson compile -C builddir
          meson test -C builddir || { cat builddir/meson-logs/testlog.txt || true; exit 1; }
        '

    - name: Configure, build, and test (Meson, Windows, not MSVC/Cygwin)
      if: ${{ runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'CYGWIN' }}
      shell: msys2 {0}
      run: |
        disable_threads_flag=""
        amalgamated_lib_flag=""
        if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
          disable_threads_flag="-Dthreads=disabled"
        fi
        disable_tools_flags=""
        if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
          disable_tools_flags="-Dimg2sixel=disabled -Dsixel2png=disabled"
        fi
        disable_simd_flag=""
        if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
          disable_simd_flag="-Dsimd=disabled"
        fi
        unity_flag=""
        if [ "${{ matrix.unity || '' }}" = "true" ]; then
          unity_flag="-Dunity=on"
        fi
        default_library_flag=""
        if [ "${{ matrix.static_only || '' }}" = "true" ]; then
          default_library_flag="--default-library static"
        fi
        if [ "${{ matrix.amalgamated_lib || '' }}" = "true" ]; then
          amalgamated_lib_flag="-Damalgamated_lib=true"
        fi
        meson setup builddir \
            --wrap-mode=nodownload \
            ${default_library_flag} \
            -Dbashcompletiondir=disabled \
            -Dzshcompletiondir=disabled \
            -Dpython=disabled \
            -Dtests=true \
            ${amalgamated_lib_flag} \
            ${disable_tools_flags} \
            ${disable_threads_flag} \
            ${disable_simd_flag} \
            ${unity_flag}
        meson compile -C builddir -v
        meson test -C builddir || { cat builddir/meson-logs/testlog.txt || true; exit 1; }

    - name: Configure, build, and test (Meson, Windows, Cygwin)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'CYGWIN' }}
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\cygwin'
        if (-not (Test-Path $cygwinRoot)) { $cygwinRoot = 'C:\cygwin64' }
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $disableThreadsFlag = ''
        if ('${{ matrix.disable_threads }}' -eq 'true') {
          $disableThreadsFlag = '-Dthreads=disabled'
        }
        $disableToolsFlags = ''
        if ('${{ matrix.disable_tools }}' -eq 'true') {
          $disableToolsFlags = '-Dimg2sixel=disabled -Dsixel2png=disabled'
        }
        $disableSimdFlag = ''
        if ('${{ matrix.disable_simd }}' -eq 'true') {
          $disableSimdFlag = '-Dsimd=disabled'
        }
        $unityFlag = ''
        if ('${{ matrix.unity }}' -eq 'true') {
          $unityFlag = '-Dunity=on'
        }
        $defaultLibraryFlag = ''
        if ('${{ matrix.static_only }}' -eq 'true') {
          $defaultLibraryFlag = '--default-library static'
        }
        $amalgamated_libFlag = ''
        if ('${{ matrix.amalgamated_lib }}' -eq 'true') {
          $amalgamated_libFlag = '-Damalgamated_lib=true'
        }
        $scriptLines = @(
          'set -eu',
          'set -o pipefail 2>/dev/null || true',
          'export PATH=/usr/local/bin:/usr/bin',
          'export CC=gcc',
          "disable_threads_flag=`"$disableThreadsFlag`"",
          "disable_tools_flags=`"$disableToolsFlags`"",
          "disable_simd_flag=`"$disableSimdFlag`"",
          "default_library_flag=`"$defaultLibraryFlag`"",
          "unity_flag=`"$unityFlag`"",
          "amalgamated_lib_flag=`"$amalgamated_libFlag`"",
          "export GITHUB_WORKSPACE=`"$workspace`"",
          "cd `"$workspace`"",
          'meson setup builddir --wrap-mode=nodownload ${default_library_flag} ${amalgamated_lib_flag} -Dpng=disabled -Djpeg=disabled -Dcurl=disabled -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled -Dpython=disabled -Dtests=true ${disable_tools_flags} ${disable_threads_flag} ${disable_simd_flag} ${unity_flag}',
          'meson compile -C builddir -v',
          'meson test -C builddir -v || { cat builddir/meson-logs/testlog.txt || true; exit 1; }'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure, build, and test (Meson, Windows, MSVC)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' && matrix.vcpkg_libpng != true && matrix.vcpkg_libjpeg != true }}
      shell: cmd
      run: |
        setlocal ENABLEDELAYEDEXPANSION
        call "%VSINSTALLDIR%\VC\Auxiliary\Build\vcvarsall.bat" x64
        python -m pip install --upgrade pip
        python -m pip install meson ninja
        set "CC=${{ matrix.compiler }}"
        set "CXX=${{ matrix.compiler }}"
        set "DISABLE_THREADS_FLAG="
        if "${{ matrix.disable_threads || '' }}"=="true" set "DISABLE_THREADS_FLAG=-Dthreads=disabled"
        set "DISABLE_TOOLS_FLAGS="
        if "${{ matrix.disable_tools || '' }}"=="true" set "DISABLE_TOOLS_FLAGS=-Dimg2sixel=disabled -Dsixel2png=disabled"
        set "DISABLE_SIMD_FLAG="
        if "${{ matrix.disable_simd || '' }}"=="true" set "DISABLE_SIMD_FLAG=-Dsimd=disabled"
        set "UNITY_FLAG="
        if "${{ matrix.unity || '' }}"=="true" set "UNITY_FLAG=-Dunity=on"
        set "AMALGAMATED_LIB_FLAG="
        if "${{ matrix.amalgamated_lib || '' }}"=="true" set "AMALGAMATED_LIB_FLAG=-Damalgamated_lib=true"
        python -m mesonbuild.mesonmain setup builddir ^
            --wrap-mode=nodownload ^
            --default-library static ^
            -Dpng=disabled ^
            -Djpeg=disabled ^
            -Dcurl=disabled ^
            -Dbashcompletiondir=disabled ^
            -Dzshcompletiondir=disabled ^
            -Dpython=disabled ^
            -Dtests=true ^
            %AMALGAMATED_LIB_FLAG% ^
            %DISABLE_TOOLS_FLAGS% ^
            %DISABLE_THREADS_FLAG% ^
            %DISABLE_SIMD_FLAG% ^
            %UNITY_FLAG%
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain compile -C builddir
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain test -C builddir -v
        if errorlevel 1 (
            if exist builddir\meson-logs\testlog.txt type builddir\meson-logs\testlog.txt
            exit /b !errorlevel!
        )
        endlocal

    - name: Configure, build, and test (Meson, Windows, MSVC, vcpkg libpng)
      if: ${{ runner.os == 'Windows' && matrix.compiler == 'cl' && matrix.vcpkg_libpng == true }}
      shell: cmd
      run: |
        setlocal ENABLEDELAYEDEXPANSION
