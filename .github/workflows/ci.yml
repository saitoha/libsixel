name: libsixel CI (build & test)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16

jobs:
  ci-autotools:
    name: Autotools ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      matrix:
        include:
          - label: freebsd 14.3 x86_64
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: freebsd
            cp_os: freebsd
            cp_arch: x86-64
            cp_version: '14.3'
            variant: freebsd
          - label: freebsd 14.3 x86_64 amalgamated_lib
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: freebsd
            cp_os: freebsd
            cp_arch: x86-64
            cp_version: '14.3'
            variant: amalgamated_lib
            extra_options: '--enable-amalgamated-lib'
          - label: freebsd 14.3 aarch64
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: freebsd
            cp_os: freebsd
            cp_arch: arm64
            cp_version: '14.3'
            variant: freebsd
          - label: netbsd 10.1 x86_64
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: netbsd
            cp_os: netbsd
            cp_arch: x86-64
            cp_version: '10.1'
            variant: netbsd
            extra_options: >-
              --enable-gcov
#          - label: netbsd 10.1 aarch64
#            os: ubuntu-latest
#            runner: ubuntu-latest
#            platform: netbsd
#            cp_os: netbsd
#            cp_arch: arm64
#            cp_version: '10.1'
#            variant: netbsd
          - label: haiku r1beta5 x86-64
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: haiku
            cp_os: haiku
            cp_arch: x86-64
            cp_version: r1beta5
            variant: haiku
            extra_options: >-
              --enable-gcov
          - label: openbsd 7.8 x86-64
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: openbsd
            cp_os: openbsd
            cp_arch: x86-64
            cp_version: '7.8'
            variant: openbsd
            extra_options: >-
              --enable-gcov
#          - label: openbsd 7.8 aarch64
#            os: ubuntu-latest
#            runner: ubuntu-latest
#            platform: openbsd
#            cp_os: openbsd
#            cp_arch: arm64
#            cp_version: '7.8'
#            variant: openbsd
          - label: dragonflybsd 6.4.2 x86-64
            os: ubuntu-latest
            runner: ubuntu-latest
            platform: dragonflybsd
            df_release: '6.4.2'
            variant: dragonflybsd
          - label: ubuntu x86_64 static-only
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            variant: static-only
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-shared
              --enable-static
            extra_packages: gcc-14
          - label: ubuntu x86_64 no-simd
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            variant: disable-simd
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-simd
            extra_packages: gcc-14
          - label: ubuntu x86_64 no-tools
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            variant: disable-tools
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-img2sixel
              --disable-sixel2png
            extra_packages: gcc-14
          - label: ubuntu x86_64 no-threads
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            variant: disable-threads
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-threads
            extra_packages: gcc-14
          - label: ubuntu x86_64 musl-cross
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            musl: true
            variant: musl-cross
            extra_options: >-
              CC=musl-gcc
            extra_packages: musl-tools
          - label: alpine 3.20 x86_64
            os: ubuntu-latest
            runner: ubuntu-latest
            variant: alpine
            extra_options: >-
              --enable-gcov
          - label: ubuntu 24.04 aarch64
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            sys: aarch64
            variant: default
            extra_options: >-
              CC=gcc-14
              --enable-gcov
            extra_packages: gcc-14
          - label: ubuntu 24.04 aarch64 amalgamated_lib
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            sys: aarch64
            variant: amalgamated_lib
            extra_options: >-
              CC=gcc-14
              --enable-amalgamated-lib
            extra_packages: gcc-14
          - label: ubuntu i686
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: i686
            variant: default
            extra_options: >-
              CC=gcc
              CFLAGS="-m32"
              LDFLAGS="-m32"
              PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig
              PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            extra_packages: gcc-multilib
          - label: macos aarch64
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            variant: default
            extra_options: >-
              --enable-gcov
            extra_packages: lcov
          - label: macos aarch64 amalgamated_lib
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            variant: amalgamated_lib
            extra_options: >-
              --enable-amalgamated-lib
          - label: macos x86_64
            os: macos-15
            runner: macos-15
            sys: x86_64
            variant: default
            extra_options: >-
              --enable-gcov
            extra_packages: lcov
          - label: macos x86_64 amalgamated_lib
            os: macos-15
            runner: macos-15
            sys: x86_64
            variant: amalgamated_lib
            extra_options: >-
              --enable-amalgamated-lib
          - label: cosmopolitan ubuntu 24.04 aarch64
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            sys: aarch64
            variant: cosmopolitan
            cosmopolitan: true
          - label: cosmopolitan macos aarch64
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            variant: cosmopolitan
            cosmopolitan: true
          - label: emscripten ubuntu 24.04 aarch64
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            variant: emscripten
            emscripten: true
          - label: emscripten macos aarch64
            os: macos-latest
            runner: macos-latest
            variant: emscripten
            emscripten: true
          - label: mingw64 static-only
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            variant: static-only
            extra_options: >-
              --disable-shared
              --enable-static
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: mingw64 no-simd
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            variant: disable-simd
            extra_options: >-
              --disable-simd
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: mingw64 no-tools
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            variant: disable-tools
            extra_options: >-
              --disable-img2sixel
              --disable-sixel2png
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: mingw64 no-threads
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            variant: disable-threads
            extra_options: >-
              --disable-threads
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: ucrt64
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: UCRT64
            variant: default
            extra_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
          - label: ucrt64 amalgamated_lib
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: UCRT64
            variant: amalgamated_lib
            extra_options: >-
              --enable-amalgamated-lib
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
          - label: clang64
            os: windows-latest
            runner: windows-latest
            compiler: clang
            sys: CLANG64
            variant: default
            extra_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-clang-x86_64-toolchain
              mingw-w64-clang-x86_64-lcov
          - label: clang-cl
            os: windows-latest
            runner: windows-latest
            compiler: clang-cl
            sys: MSVC
            variant: clang-cl
            extra_options: >-
              --enable-gcov
            extra_packages: make
          - label: msvc
            os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: default
            extra_options: >-
              CC=cl
              --enable-gcov
            extra_packages: make
          - label: msvc amalgamated_lib
            os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: amalgamated_lib
            extra_options: >-
              CC=cl
              --enable-amalgamated-lib
            extra_packages: make
          - label: cygwin amalgamated_lib
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: CYGWIN
            variant: amalgamated_lib
            extra_options: >-
              --enable-amalgamated-lib
          - label: cosmopolitan msys
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MSYS
            variant: cosmopolitan
            cosmopolitan: true
            extra_packages: >-
              unzip
              make
#          - label: cosmopolitan cygwin
#            os: windows-latest
#            runner: windows-latest
#            compiler: gcc
#            sys: CYGWIN
#            variant: cosmopolitan
#            cosmopolitan: true
          - label: msvc vcpkg-libpng
            os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: vcpkg-libpng
            vcpkg_libpng: true
            extra_options: >-
              CC=cl
              --enable-gcov
            extra_packages: make
          - label: msvc vcpkg-libjpeg
            os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: vcpkg-libjpeg
            vcpkg_libjpeg: true
            extra_options: >-
              CC=cl
              --enable-gcov
            extra_packages: make
#          - label: emscripten msys x86_64
#            os: windows-latest
#            runner: windows-latest
#            sys: MSYS
#            variant: emscripten
#            emscripten: true
          - label: mingw32
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW32
            variant: default
            extra_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-i686-toolchain
          - label: msys
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MSYS
            variant: default
            extra_options: >-
              --enable-gcov
            extra_packages: >-
              make
              gcc
              pkgconf
              python-pip
              lcov
          - label: cygwin
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: CYGWIN
            variant: default
            extra_options: >-
              --enable-gcov

    steps:
    - name: Configure git EOL
      if: matrix.sys == 'CYGWIN'
      run: git config --global core.autocrlf false

    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Install extra packages (Linux)
      if: runner.os == 'Linux' && (matrix.extra_packages || '') != ''
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.extra_packages }}

    - name: Fix Homebrew taps/cache
      if: runner.os == 'macOS'
      run: |
        brew update-reset
        rm -f ~/Library/Caches/Homebrew/downloads/* || true
        brew update -f
        brew doctor || true

    - name: Install extra packages (macOS)
      if: runner.os == 'macOS' && (matrix.extra_packages || '') != ''
      shell: bash
      run: |
        brew update
        brew install ${{ matrix.extra_packages }}

    - name: Configure and build (DragonFlyBSD)
      if: matrix.platform == 'dragonflybsd'
      timeout-minutes: 30
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ matrix.df_release }}
        usesh: true
        copyback: false
        run: |
          set -eux
          artifact_dir="${GITHUB_WORKSPACE}/_artifacts/dragonflybsd"
          artifact_tar="${GITHUB_WORKSPACE}/_artifacts/dragonflybsd.tar.gz"
          collect_logs() {
            status=$?
            cd "$GITHUB_WORKSPACE"
            mkdir -p "$artifact_dir"
            find . -type f \( -name '*.log' -o -name '*.trs' -o -name '*.info' \) -exec tar cvzf "$artifact_tar" {} +
            exit "$status"
          }
          trap 'collect_logs' EXIT

          pkg update -f
          pkg install -y gmake pkgconf

          cd "$GITHUB_WORKSPACE"

          ./configure \
            --enable-debug \
            --enable-tests \
            --disable-dependency-tracking \
            ${{ matrix.extra_options || '' }}
          gmake V=1
          gmake check

    - name: Fetch DragonFlyBSD artifacts from VM (Autotools)
      if: matrix.platform == 'dragonflybsd'
      run: |
        set -eux
        mkdir -p "${GITHUB_WORKSPACE}/_artifacts"
        remote_tar="${GITHUB_WORKSPACE}/_artifacts/dragonflybsd.tar.gz"
        if ssh cross_platform_actions_host "test -f \"${remote_tar}\""; then
          scp cross_platform_actions_host:"${remote_tar}" "${GITHUB_WORKSPACE}/_artifacts/"
        else
          echo "No artifact archive found on VM; skipping copy" >&2
        fi

    - name: Setup MSVC developer env (vcvars)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_libpng == true || matrix.vcpkg_libjpeg == true) }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ matrix.vcpkg_libpng || false }}-${{ matrix.vcpkg_libjpeg || false }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, libpng/libjpeg)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_libpng == true || matrix.vcpkg_libjpeg == true) }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
          git init $vcpkgRoot
        }
        git -C $vcpkgRoot remote remove origin 2>$null
        git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

        git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
        git -C $vcpkgRoot reset --hard FETCH_HEAD

        Set-Location $vcpkgRoot

        cmd /c bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        if ('${{ matrix.vcpkg_libpng || false }}' -eq 'true') {
          $packages += 'libpng'
        }
        if ('${{ matrix.vcpkg_libjpeg || false }}' -eq 'true') {
          $packages += 'libjpeg-turbo'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows' && matrix.sys != 'CYGWIN'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys == 'MSVC' && 'MSYS' || matrix.sys }}
        update: true
        install: ${{ matrix.extra_packages || 'make' }}

    - name: Setup Cygwin
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: gcc-core,make,pkg-config,python3,python3-pip,ninja

    - name: Cache Cosmopolitan toolchain
      if: matrix.variant == 'cosmopolitan'
      uses: actions/cache@v4
      with:
        path: cosmopolitan/cosmocc.zip
        key: cosmocc-${{ runner.os }}-${{ matrix.sys || 'native' }}-${{ hashFiles('cosmopolitan/build-cosmocc.sh') }}

    - name: Prepare Cosmopolitan toolchain (non-Windows)
      if: matrix.variant == 'cosmopolitan' && runner.os != 'Windows'
      shell: bash
      run: |
        set -eux
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -d cosmopolitan cosmopolitan/cosmocc.zip
        chmod +x cosmopolitan/bin/cosmo*

    - name: Prepare Cosmopolitan toolchain (Windows, MSYS2)
      if: matrix.variant == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys != 'CYGWIN'
      shell: msys2 {0}
      run: |
        set -eux
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -d cosmopolitan cosmopolitan/cosmocc.zip
        chmod +x cosmopolitan/bin/cosmo*

    - name: Prepare Cosmopolitan toolchain (Windows, Cygwin)
      if: matrix.variant == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\\cygwin'
        $env:PATH = "$cygwinRoot\bin;$env:PATH"
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          'set -eux',
          'set -o pipefail 2>/dev/null || true',
          "cd `"$workspace`"",
          'mkdir -p cosmopolitan',
          'if [ ! -f cosmopolitan/cosmocc.zip ]; then curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip; fi',
          'unzip -o -d cosmopolitan cosmopolitan/cosmocc.zip',
          'chmod +x cosmopolitan/bin/cosmo*'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Install gcovr
      if: runner.os != 'Windows' && matrix.emscripten != true && (matrix.sys || '') != 'i686' && !contains(fromJson('["freebsd","openbsd","netbsd"]'), matrix.platform || '') && !contains(fromJson('["amalgamated_lib","cosmopolitan"]'), matrix.variant || '')
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install -U pip gcovr
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

    - name: Build with Emscripten (non-Windows)
      if: matrix.emscripten == true && runner.os != 'Windows'
      run: |
        emscripten/build-emcc.sh

    - name: Build with Emscripten (Windows)
      if: matrix.emscripten == true && runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        ./emscripten/build-emcc.sh

    - name: Configure and build (non-Windows)
      if: runner.os != 'Windows' && matrix.emscripten != true && !contains(fromJson('["alpine","cosmopolitan"]'), matrix.variant || '') && !contains(fromJson('["freebsd","openbsd","netbsd","haiku","dragonflybsd"]'), matrix.platform || '')
      shell: bash
      run: |
        set -eux

        ./configure \
          --enable-debug \
          --enable-tests \
          --disable-dependency-tracking \
          ${{ matrix.extra_options || '' }}
        make V=1
        make check V=1

    - name: Configure and build (Autotools, Alpine container)
      if: matrix.variant == 'alpine'
      run: |
        set -eux
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          apk add --no-cache \
            autoconf \
            automake \
            bash \
            build-base \
            coreutils \
            curl-dev \
            findutils \
            libjpeg-turbo-dev \
            libpng-dev \
            libtool \
            pkgconf \
            zlib-dev

            ./configure \
                --enable-debug \
                --enable-tests \
                ${{ matrix.extra_options || '' }} \
                --disable-dependency-tracking
          make V=1
          make check V=1
        '

    - name: Configure and build (Windows, not MSVC/Cygwin)
      if: ${{ runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'CYGWIN' && matrix.variant != 'cosmopolitan' && matrix.emscripten != true }}
      shell: msys2 {0}
      run: |
        set -eux

        ./configure \
          --without-png \
          --without-jpeg \
          --without-libcurl \
          --enable-debug \
          --enable-tests \
          --disable-dependency-tracking \
          ${{ matrix.extra_options || '' }}
        make V=1
        make check V=1

    - name: Configure and build (Windows, Cygwin)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'CYGWIN' && matrix.variant != 'cosmopolitan' && matrix.emscripten != true }}
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\cygwin'
        $env:PATH = "$cygwinRoot\bin;$env:PATH"
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          'set -eu',
          'set -o pipefail 2>/dev/null || true',
          "export GITHUB_WORKSPACE=`"$workspace`"",
          "cd `"$workspace`"",
          "CC=${{ matrix.compiler }} ./configure --without-png --without-jpeg --without-libcurl --enable-debug --enable-tests --disable-dependency-tracking ${{ matrix.extra_options || '' }}",
          'make V=1'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure and build (Windows, MSVC)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' }}
      shell: msys2 {0}
      run: |
        VCVARS="$(cygpath -w "$VSINSTALLDIR")\\VC\\Auxiliary\\Build\\vcvarsall.bat"
        cmd //c call "${VCVARS}" x64 \>nul \&\& set
        eval $(
            cmd //c call "${VCVARS}" x64 \>nul \&\& set |
            grep -i '^\(PATH\|INCLUDE\|LIB\|LIBPATH\)'  |
            while IFS== read -r key val; do
                case "$key" in PATH|Path)
                    echo export PATH=\"$(echo "$val" | tr \; \\n | while read -r p; do cygpath "$p"; done | grep ^/ | tr \\n :)\"\;
                    ;;
                *)
                    echo export "$key"=\""$val"\"\;
                    ;;
                esac;
            done
        )
        CC=${{ matrix.compiler }} \
        LD=link \
        AR="${SHELL} $(pwd)/build-aux/ar-lib lib" \
        ARFLAGS=cr \
        NM="dumpbin -symbols" \
        STRIP=: \
        RANLIB=: \
        ./configure \
          --host=x86_64-pc-windows-msvc \
          --enable-debug \
          --enable-tests \
          --disable-dependency-tracking \
          --without-png \
          --without-jpeg \
          --without-libcurl \
          ${{ matrix.extra_options || '' }}
        make V=1

    - name: Configure and build (Cosmopolitan, non-Windows)
      if: matrix.variant == 'cosmopolitan' && runner.os != 'Windows'
      shell: bash
      run: |
        set -eux
        export PATH="$PWD/cosmopolitan/bin:$PATH"
        builddir="$PWD/cosmopolitan/build"
        mkdir -p "$builddir"
        cd "$builddir"
        ../../configure \
          --enable-simd \
          --disable-shared \
          --enable-static \
          --without-png \
          --without-jpeg \
          --without-libcurl \
          --without-onnxruntime \
          --disable-wiccodec \
          --disable-appkit \
          --without-coregraphics \
          --disable-quicklook-extension \
          --disable-quicklook-preview \
          CC=cosmocc \
          LD=cosmocc \
          AR=cosmoar \
          RANLIB=cosmoranlib \
          INSTALL=cosmoinstall
        make -j V=1
        make check -j

    - name: Configure and build (Cosmopolitan, Windows MinGW)
      if: matrix.variant == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys != 'CYGWIN'
      shell: msys2 {0}
      run: |
        set -eux
        export PATH="$PWD/cosmopolitan/bin:$PATH"
        builddir="$PWD/cosmopolitan/build"
        mkdir -p "$builddir"
        cd "$builddir"
        ../../configure \
          --enable-simd \
          --disable-shared \
          --enable-static \
          --without-png \
          --without-jpeg \
          --without-libcurl \
          --without-onnxruntime \
          --disable-wiccodec \
          --disable-appkit \
          --without-coregraphics \
          --disable-quicklook-extension \
          --disable-quicklook-preview \
          CC=cosmocc \
          LD=cosmocc \
          AR=cosmoar \
          RANLIB=cosmoranlib \
          INSTALL=cosmoinstall
        make V=1
        make check

    - name: Configure and build (Cosmopolitan, Cygwin)
      if: matrix.variant == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\\cygwin'
        $env:PATH = "$cygwinRoot\bin;$env:PATH"
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          'set -eux',
          'set -o pipefail 2>/dev/null || true',
          "export PATH=`"$workspace/cosmopolitan/bin:`$PATH`"",
          "cd `"$workspace/cosmopolitan`"",
          'mkdir -p build',
          'cd build',
          '../../configure --enable-simd --disable-shared --enable-static --without-png --without-jpeg --without-libcurl --without-onnxruntime --disable-wiccodec --disable-appkit --without-coregraphics --disable-quicklook-extension --disable-quicklook-preview CC=cosmocc LD=cosmocc AR=cosmoar RANLIB=cosmoranlib INSTALL=cosmoinstall --host=x86_64-unknown-cosmo CFLAGS="-nostdlib -nostartfiles -nodefaultlibs -ffreestanding"',
          'make V=1',
          'make check'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure, build, and run tests (FreeBSD/OpenBSD/NetBSD/Haiku)
      if: (matrix.platform == 'freebsd' || matrix.platform == 'openbsd' || matrix.platform == 'netbsd' || matrix.platform == 'haiku') && matrix.emscripten != true
      timeout-minutes: 30
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          set -eux
          : "${GITHUB_WORKSPACE:=$PWD}"

          artifact_dir="${GITHUB_WORKSPACE}/_artifacts/${{ matrix.platform }}"
          artifact_tar="${GITHUB_WORKSPACE}/_artifacts/${{ matrix.platform }}.tar.gz"
          collect_logs() {
            status=$?
            cd "$GITHUB_WORKSPACE"
            mkdir -p "$artifact_dir"
            find . -type f \( -name '*.log' -o -name '*.trs' -o -name '*.info' \) -exec tar cvzf "$artifact_tar" {} +
            exit "$status"
          }
          trap 'collect_logs' EXIT

          pkg_prefix=""
          if [ "$(id -u)" -ne 0 ]; then
            if command -v sudo >/dev/null 2>&1; then
              pkg_prefix="sudo"
            elif command -v doas >/dev/null 2>&1; then
              pkg_prefix="doas"
            else
              echo "No privilege escalation helper available" >&2
              exit 1
            fi
          fi

          make_cmd="gmake"
          if [ "${{ matrix.platform }}" = "freebsd" ]; then
            ${pkg_prefix:+$pkg_prefix }pkg update -f
            ${pkg_prefix:+$pkg_prefix }pkg install -y \
              gmake \
              # pkgconf avoided to reduce fragile package installs
            :
          elif [ "${{ matrix.platform }}" = "netbsd" ]; then
            ${pkg_prefix:+$pkg_prefix }pkgin -y update
            ${pkg_prefix:+$pkg_prefix }pkgin -y install \
              gmake
            if [ -f /var/db/pkgin/pkg_install-err.log ]; then
              cp /var/db/pkgin/pkg_install-err.log "$GITHUB_WORKSPACE/pkg_install-err.log" || true
            fi
          elif [ "${{ matrix.platform }}" = "openbsd" ]; then
            ${pkg_prefix:+$pkg_prefix }pkg_add \
              gmake \
              rsync \
              # pkgconf avoided to reduce fragile package installs
            :
          else
            pkgman refresh
            pkgman install -y \
              make
            make_cmd="make"
          fi

          ./configure \
            --enable-debug \
            --enable-tests \
            --disable-dependency-tracking \
            ${{ matrix.extra_options || '' }}
          ${make_cmd} V=1

          if command -v gmake >/dev/null 2>&1; then
            gmake check V=1
          else
            make check V=1
          fi

    - name: Run tests (Windows, not MSVC/Cygwin/CLANG64)
      if: runner.os == 'Windows' && !contains(fromJson('["CLANG64","MSVC","CYGWIN"]'), matrix.sys || '') && matrix.variant != 'cosmopolitan' && matrix.emscripten != true
      shell: msys2 {0}
      run: make check V=1

    - name: Fetch BSD artifacts from VM (Autotools)
      if: (matrix.platform == 'freebsd' || matrix.platform == 'openbsd' || matrix.platform == 'netbsd' || matrix.platform == 'haiku') && matrix.emscripten != true
      run: |
        set -eux
        mkdir -p "${GITHUB_WORKSPACE}/_artifacts"
        remote_tar="${GITHUB_WORKSPACE}/_artifacts/${{ matrix.platform }}.tar.gz"
        if ssh cross_platform_actions_host "test -f \"${remote_tar}\""; then
          scp cross_platform_actions_host:"${remote_tar}" "${GITHUB_WORKSPACE}/_artifacts/"
        else
          echo "No artifact archive found on VM; skipping copy" >&2
        fi

    - name: Run tests (Windows, CLANG64)
      if: runner.os == 'Windows' && matrix.sys == 'CLANG64' && matrix.variant != 'cosmopolitan' && matrix.emscripten != true
      shell: msys2 {0}
      run: |
        LLVM_PROFILE_FILE="%p-%m.profraw" make check V=1
        find . -name \*.profraw || true
        llvm-profdata merge -sparse coverage/*.profraw -o coverage/coverage.profdata || true
        find . -type f \( -name '*.exe' -o -name '*.dll' \) |
        xargs llvm-cov export -format=lcov \
          -instr-profile=coverage/coverage.profdata > coverage.info || true

    - name: Run tests (Windows, MSVC)
      if: runner.os == 'Windows' && matrix.sys == 'MSVC' && matrix.variant != 'cosmopolitan' && matrix.emscripten != true
      shell: msys2 {0}
      run: |
        VCVARS="$(cygpath -w "$VSINSTALLDIR")\\VC\\Auxiliary\\Build\\vcvarsall.bat"
        cmd //c call "${VCVARS}" x64 \>nul \&\& set
        eval $(
            cmd //c call "${VCVARS}" x64 \>nul \&\& set |
            grep -i '^\(PATH\|INCLUDE\|LIB\|LIBPATH\)'  |
            while IFS== read -r key val; do
                case "$key" in PATH|Path)
                    echo export PATH=\"$(echo "$val" | tr \; \\n | while read -r p; do cygpath "$p"; done | grep ^/ | tr \\n :)\"\;
                    ;;
                *)
                    echo export "$key"=\""$val"\"\;
                    ;;
                esac;
            done
        )
        make check V=1

    - name: Run tests (Windows, Cygwin)
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN' && matrix.variant != 'cosmopolitan'
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\cygwin'
        if (-not (Test-Path $cygwinRoot)) { $cygwinRoot = 'C:\cygwin64' }
        $env:PATH = "$cygwinRoot\bin;$env:PATH"
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          'set -eu',
          'set -o pipefail 2>/dev/null || true',
          "export GITHUB_WORKSPACE=`"$workspace`"",
          "cd `"$workspace`"",
          'make check V=1'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Capture coverage (Linux)
      if: runner.os == 'Linux' && matrix.emscripten != true && (matrix.sys || '') != 'i686' && !(matrix.musl || false) && !contains(fromJson('["freebsd","openbsd","netbsd","haiku"]'), matrix.platform || '') && !contains(fromJson('["alpine","amalgamated_lib","cosmopolitan"]'), matrix.variant || '')
      shell: bash
      run: |
        gcovr -r . --lcov -o coverage.info \
                   --gcov-executable gcov-14

    - name: Capture coverage (non-MSVC)
      if: runner.os == 'macOS' && !contains(fromJson('["amalgamated_lib","cosmopolitan"]'), matrix.variant || '') && matrix.emscripten != true
      shell: bash
      run: |
        lcov -c \
          -d "$PWD/src/.libs" \
          -d "$PWD/converters" \
          --rc branch_coverage=1 \
          -o coverage.info

    - name: Capture coverage (Windows MSYS2/MinGW/UCRT/Clang)
      if: runner.os == 'Windows' && !contains(fromJson('["MSVC","CYGWIN","MINGW32"]'), matrix.sys || '') && !contains(fromJson('["amalgamated_lib","cosmopolitan"]'), matrix.variant || '') && matrix.emscripten != true
      shell: msys2 {0}
      run: |
        lcov -c \
          -d "$PWD/src/.libs" \
          -d "$PWD/converters" \
          --rc branch_coverage=1 \
          -o coverage.info

    - name: Fix artifact permissions (Autotools Alpine container)
      if: ${{ matrix.variant == 'alpine' && always() }}
      run: |
        set -eux
        for dir in tests tests/_artifacts; do
          if [ -e "$dir" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$dir"
            sudo find "$dir" -type d -exec chmod u+rwx,go+rx {} +
            sudo find "$dir" -type f -exec chmod u+rw,go+r {} +
          fi
        done

    - name: Upload autotools artifacts
      if: always() && !contains(fromJson('["freebsd","openbsd","netbsd"]'), matrix.platform || '')
      uses: actions/upload-artifact@v4
      with:
        name: autotools-${{ matrix.os }}-${{ matrix.sys || 'native' }}-${{ matrix.compiler || 'default' }}-${{ matrix.variant || 'default' }}
        path: |
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
        if-no-files-found: warn
        overwrite: true

    - name: Upload autotools artifacts (cross-platform VMs)
      if: always() && (matrix.platform == 'freebsd' || matrix.platform == 'openbsd' || matrix.platform == 'netbsd' || matrix.platform == 'haiku' || matrix.platform == 'dragonflybsd')
      uses: actions/upload-artifact@v4
      with:
        name: autotools-${{ matrix.label }}
        path: |
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
          pkg_install-err.log
        if-no-files-found: warn
        overwrite: true

    - name: Upload to Coveralls (per-flag, parallel)
      id: coveralls_upload
      if: ${{ runner.os != 'Windows' && matrix.os != 'macos-15' && matrix.sys != 'i686' && matrix.emscripten != true && !(matrix.musl || false) && !contains(fromJson('["freebsd","openbsd","netbsd","haiku","dragonflybsd"]'), matrix.platform || '') && !contains(fromJson('["amalgamated_lib","cosmopolitan","alpine"]'), matrix.variant || '') }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
        flag-name: ${{ matrix.label }}
        parallel: true

    - name: Wait before Coveralls retry (per-flag)
      if: ${{ runner.os != 'Windows' && matrix.os != 'macos-15' && steps.coveralls_upload.outcome == 'failure' && matrix.emscripten != true && !(matrix.musl || false) && !contains(fromJson('["freebsd","openbsd","netbsd","haiku"]'), matrix.platform || '') && !contains(fromJson('["amalgamated_lib","cosmopolitan","alpine"]'), matrix.variant || '') }}
      run: sleep 5

    - name: Upload to Coveralls (per-flag, retry)
      if: ${{ runner.os != 'Windows' && matrix.os != 'macos-15' && steps.coveralls_upload.outcome == 'failure' && matrix.emscripten != true && !(matrix.musl || false) && !contains(fromJson('["freebsd","openbsd","netbsd","haiku","dragonflybsd"]'), matrix.platform || '') && !contains(fromJson('["amalgamated_lib","cosmopolitan","alpine"]'), matrix.variant || '') }}
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
        flag-name: ${{ matrix.label }}
        parallel: true

  ci-autotools-finish:
    needs: ci-autotools
    runs-on: ubuntu-latest
    steps:
      - name: Finalize Coveralls
        id: coveralls_finalize
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

      - name: Wait before Coveralls retry (finalize)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        run: sleep 5

      - name: Finalize Coveralls (retry)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

  ci-dist-autotools:
    name: AT-tarball ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
          include:
            - label: Linux thumbnailer command
              os: ubuntu-latest
              runner: ubuntu-latest
              sys: native
              configure_flags: >-
                --without-png --without-jpeg --without-libcurl
                --enable-debug --enable-tests
                --disable-dependency-tracking --enable-thumbnailer-command
            - label: macOS Quick Look extension
              os: macos-latest
              runner: macos-latest
              sys: native
              configure_flags: >-
                --without-png --without-jpeg --without-libcurl
                --enable-debug --enable-tests
                --disable-dependency-tracking --enable-quicklook-extension
                --enable-quicklook-preview
            - label: Windows WIC codec (MinGW)
              os: windows-latest
              runner: windows-latest
              msystem: MINGW64
              sys: MINGW64
              configure_flags: >-
                --without-png --without-jpeg --without-libcurl
                --enable-debug --enable-tests
                --disable-dependency-tracking --enable-wiccodec
              extra_packages: >-
                make
                mingw-w64-x86_64-toolchain

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Prepare Homebrew cache
      if: runner.os == 'macOS'
      run: |
        brew update-reset
        rm -f ~/Library/Caches/Homebrew/downloads/* || true
        brew update -f

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: ${{ matrix.extra_packages || 'make' }}

    - name: Create Autotools dist archive (non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail
        ./configure ${{ matrix.configure_flags }}
        make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
        make dist
        ls -l libsixel-*.tar.*

    - name: Create Autotools dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        ./configure ${{ matrix.configure_flags }}
        make -j$(nproc)
        make dist
        ls -l libsixel-*.tar.*

    - name: Build from Autotools dist archive (non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail
        artifact_dir="dist-build/_artifacts"
        collect_logs() {
          status=$?
          if [ -d "dist-build" ]; then
            mkdir -p "$artifact_dir"
            find dist-build -type f \( -name 'config.log' -o -name 'test-suite.log' -o -name '*.log' -o -name '*.trs' \) \
              ! -path "dist-build/_artifacts/*" \
              | while IFS= read -r f; do
                  rel="${f#dist-build/}"
                  dest="${artifact_dir}/${rel}"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done || true
          fi
          exit "$status"
        }
        trap 'collect_logs' EXIT

        tarball=$(ls libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        ./configure ${{ matrix.configure_flags }}
        make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
        make check V=1

    - name: Build from Autotools dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        artifact_dir="dist-build/_artifacts"
        collect_logs() {
          status=$?
          if [ -d "dist-build" ]; then
            mkdir -p "$artifact_dir"
            find dist-build -type f \( -name 'config.log' -o -name 'test-suite.log' -o -name '*.log' -o -name '*.trs' \) \
              ! -path "dist-build/_artifacts/*" \
              | while IFS= read -r f; do
                  rel="${f#dist-build/}"
                  dest="${artifact_dir}/${rel}"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done || true
          fi
          exit "$status"
        }
        trap 'collect_logs' EXIT

        tarball=$(ls libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        ./configure ${{ matrix.configure_flags }}
        make -j$(nproc)
        make check V=1

    - name: Upload autotools dist artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: autotools-dist-${{ matrix.os }}-${{ matrix.sys || 'native' }}
        path: |
          libsixel-*.tar.*
          dist-build/**/test-suite.log
          dist-build/**/*.log
          dist-build/**/*.trs
          dist-build/**/_artifacts/**
        if-no-files-found: warn

  ci-autotools-asan:
    name: AT-ASan ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      matrix:
        include:
          - label: ubuntu clang
            os: ubuntu-latest
            runner: ubuntu-latest
            extra_options: ''
            artifact_suffix: default
            extra_packages: ''
          - label: ubuntu clang with-gd
            os: ubuntu-latest
            runner: ubuntu-latest
            extra_options: '--with-gd'
            artifact_suffix: with-gd
            extra_packages: 'libgd-dev'
          - label: ubuntu clang with-gdk-pixbuf2
            os: ubuntu-latest
            runner: ubuntu-latest
            extra_options: '--with-gdk-pixbuf2'
            artifact_suffix: with-gdk-pixbuf2
            extra_packages: 'libgdk-pixbuf2.0-dev'
          - label: ubuntu clang with-png
            os: ubuntu-latest
            runner: ubuntu-latest
            extra_options: '--with-png'
            artifact_suffix: with-png
            extra_packages: 'libpng-dev'
          - label: ubuntu clang with-jpeg
            os: ubuntu-latest
            runner: ubuntu-latest
            extra_options: '--with-jpeg'
            artifact_suffix: with-jpeg
            extra_packages: 'libjpeg-turbo8-dev'
          - label: ubuntu clang with-libcurl
            os: ubuntu-latest
            runner: ubuntu-latest
            extra_options: '--with-libcurl'
            artifact_suffix: with-libcurl
            extra_packages: 'libcurl4-openssl-dev'
          - label: macos aarch64 clang
            os: macos-latest
            runner: macos-latest
            extra_options: ''
            artifact_suffix: default
            extra_packages: ''
          - label: macos aarch64 clang enable-quicklook-extension
            os: macos-latest
            runner: macos-latest
            extra_options: '--enable-quicklook-extension'
            artifact_suffix: enable-quicklook-extension
            extra_packages: ''
          - label: macos aarch64 clang with-coregraphics
            os: macos-latest
            runner: macos-latest
            extra_options: '--with-coregraphics'
            artifact_suffix: with-coregraphics
            extra_packages: ''
          - label: macos x86_64 clang
            os: macos-15
            runner: macos-15
            extra_options: ''
            artifact_suffix: default
            extra_packages: ''
          - label: clang64
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            extra_options: ''
            artifact_suffix: default
            extra_packages: ''
          - label: clang64 with-wic
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            extra_options: '--with-wic'
            artifact_suffix: with-wic
            extra_packages: >-
              make
              pkgconf
              mingw-w64-clang-x86_64-toolchain
          - label: clang64 enable-wiccodec
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            extra_options: '--enable-wiccodec'
            artifact_suffix: enable-wiccodec
            extra_packages: >-
              make
              pkgconf
              mingw-w64-clang-x86_64-toolchain
          - label: clang64 with-winhttp
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            extra_options: '--with-winhttp'
            artifact_suffix: with-winhttp
            extra_packages: >-
              make
              pkgconf
              mingw-w64-clang-x86_64-toolchain
    env:
      ASAN_CFLAGS: "-fsanitize=address -O1 -g -fno-omit-frame-pointer"
      ASAN_LDFLAGS: "-fsanitize=address"
    steps:
    - name: Configure git EOL
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      run: git config --global core.autocrlf false

    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Install clang (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang

    - name: Install extra packages (Linux)
      if: runner.os == 'Linux' && (matrix.extra_packages || '') != ''
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.extra_packages }}

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: ${{ matrix.extra_packages || 'make' }}

    - name: Configure and build (ASan, non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        extra='${{ matrix.extra_options }}'
        CC=clang \
        CFLAGS="$ASAN_CFLAGS" \
        LDFLAGS="$ASAN_LDFLAGS" \
        ./configure \
            --enable-debug \
            --enable-tests \
            --disable-dependency-tracking \
            ${extra:+$extra}
        make V=1

    - name: Configure and build (ASan, Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        extra='${{ matrix.extra_options }}'
        CC=clang CFLAGS="$ASAN_CFLAGS" LDFLAGS="$ASAN_LDFLAGS" ./configure \
            --without-png \
            --without-jpeg \
            --without-libcurl \
            --enable-debug \
            --enable-tests \
            --disable-dependency-tracking \
            ${extra:+$extra}
        make V=1

    - name: Upload autotools ASan artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: autotools-asan-${{ matrix.os }}-${{ matrix.sys || 'native' }}-${{ matrix.artifact_suffix }}
        path: |
          **/config.log
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
        if-no-files-found: warn
        overwrite: true

  ci-dist-meson:
    name: Meson-tarball ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux thumbnailer command
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_flags: >-
              -Dpng=disabled -Djpeg=disabled -Dcurl=disabled
              -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled
              -Dpython=disabled -Druby=disabled -Dtests=true
              -Dthumbnailer_command=enabled
          - label: macOS Quick Look extension
            os: macos-latest
            runner: macos-latest
            setup_flags: >-
              -Dpng=disabled -Djpeg=disabled -Dcurl=disabled
              -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled
              -Dpython=disabled -Druby=disabled -Dtests=true
              -Dquicklook_extension=enabled -Dquicklook_preview=enabled
          - label: mingw64 wiccodec
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_flags: >-
              --default-library static --wrap-mode=nodownload
              -Dpng=disabled -Djpeg=disabled -Dcurl=disabled
              -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled
              -Dpython=disabled -Druby=disabled -Dtests=true
              -Dwic=enabled -Dwiccodec=enabled
            extra_packages: >-
              python
              ninja
              git
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-ninja

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Install Meson toolchain (non-Windows)
      if: runner.os != 'Windows'
      run: |
        python3 -m venv .meson-venv
        . .meson-venv/bin/activate
        pip install --upgrade pip
        pip install meson ninja
        echo "$PWD/.meson-venv/bin" >> "$GITHUB_PATH"

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: ${{ matrix.extra_packages || 'python ninja git' }}

    - name: Create Meson dist archive (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail
        meson setup builddir \
          --wrap-mode=nodownload \
          -Dbashcompletiondir=disabled \
          -Dzshcompletiondir=disabled \
          ${{ matrix.setup_flags }}
        meson compile -C builddir -v
        meson dist -C builddir
        ls -l builddir/meson-dist

    - name: Create Meson dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        meson setup builddir \
          -Dbashcompletiondir=disabled \
          -Dzshcompletiondir=disabled \
          ${{ matrix.setup_flags }}
        meson compile -C builddir -v
        meson dist -C builddir --allow-dirty
        ls -l builddir/meson-dist

    - name: Build from Meson dist archive (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail
        artifact_dir="dist-build/_artifacts"
        collect_logs() {
          status=$?
          if [ -d "dist-build" ]; then
            mkdir -p "$artifact_dir"
            find dist-build -type f \( -name 'config.log' -o -name 'test-suite.log' -o -name '*.log' -o -name '*.trs' -o -name 'testlog.txt' -o -path '*/meson-logs/*' \) \
              ! -path "dist-build/_artifacts/*" \
              | while IFS= read -r f; do
                  rel="${f#dist-build/}"
                  dest="${artifact_dir}/${rel}"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done || true
          fi
          exit "$status"
        }
        trap 'collect_logs' EXIT

        tarball=$(ls builddir/meson-dist/libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        meson setup build --wrap-mode=nodownload ${{ matrix.setup_flags }}
        meson compile -C build -v
        meson test -C build || { cat build/meson-logs/testlog.txt || true; exit 1; }

    - name: Build from Meson dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        artifact_dir="dist-build/_artifacts"
        collect_logs() {
          status=$?
          if [ -d "dist-build" ]; then
            mkdir -p "$artifact_dir"
            find dist-build -type f \( -name 'config.log' -o -name 'test-suite.log' -o -name '*.log' -o -name '*.trs' -o -name 'testlog.txt' -o -path '*/meson-logs/*' \) \
              ! -path "dist-build/_artifacts/*" \
              | while IFS= read -r f; do
                  rel="${f#dist-build/}"
                  dest="${artifact_dir}/${rel}"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done || true
          fi
          exit "$status"
        }
        trap 'collect_logs' EXIT

        tarball=$(ls builddir/meson-dist/libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        meson setup build ${{ matrix.setup_flags }}
        meson compile -C build -v
        meson test -C build || { cat build/meson-logs/testlog.txt || true; exit 1; }

    - name: Upload meson dist artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: meson-dist-${{ matrix.os }}-${{ matrix.msystem || 'native' }}
        path: |
          builddir/meson-dist/**
          dist-build/**/meson-logs/**
          dist-build/**/_artifacts/**
          dist-build/**/testlog.txt
        if-no-files-found: warn

