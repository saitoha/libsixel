    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >-
          make
        pacboy: >-
          cc:p

    - name: Create Autotools dist archive (non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail
        ./configure ${{ matrix.configure_flags }}
        make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
        make dist
        ls -l libsixel-*.tar.*

    - name: Create Autotools dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        ./configure ${{ matrix.configure_flags }}
        make -j$(nproc)
        make dist
        ls -l libsixel-*.tar.*

    - name: Build from Autotools dist archive (non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euxo pipefail
        tarball=$(ls libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        ./configure ${{ matrix.configure_flags }}
        make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
        make check V=1

    - name: Build from Autotools dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        tarball=$(ls libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        ./configure ${{ matrix.configure_flags }}
        make -j$(nproc)
        make check V=1

    - name: Upload autotools dist artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: autotools-dist-${{ matrix.os }}-${{ matrix.sys || 'native' }}
        path: |
          libsixel-*.tar.*
          dist-build/**/test-suite.log
          dist-build/**/*.log
          dist-build/**/*.trs
          dist-build/**/_artifacts/**
        if-no-files-found: warn



  ci-autotools-asan:
    name: AT-ASan ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      matrix:
        include:
          - label: ubuntu clang
            os: ubuntu-latest
            runner: ubuntu-latest
            configure_extra: ''
            artifact_suffix: default
            apt: ''
          - label: ubuntu clang with-gd
            os: ubuntu-latest
