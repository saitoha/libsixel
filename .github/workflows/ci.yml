name: libsixel CI (build & test)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16

jobs:
  ci:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      matrix:
        include:
          - label: Autotools-alpine-3.20-x86_64
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            guest_packages: >-
              build-base
              coreutils
              findutils
            exec_type: alpine

          - label: Meson-alpine-3.20-x86_64
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            guest_packages: >-
              build-base
              meson
            exec_type: alpine

          - label: Autotools-ubuntu-x86_64-ASan-avx2
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --without-png
              --without-jpeg
              --enable-avx2
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-ASan-avx2
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --buildtype=debug
              -Db_sanitize=address
              -Db_lundef=false
              -Davx2=true
            extra_packages: >-
              meson
              clang
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-ASan-png-jpeg-avx512
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --with-png
              --with-jpeg
              --enable-avx512
            extra_packages: >-
              meson
              clang
              libpng-dev
              libjpeg-dev
            exec_type: bash

          - label: Meson-ubuntu-x86_64-ASan-png-jpeg-avx512
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --buildtype=debug
              -Db_sanitize=address
              -Db_lundef=false
              -Dpng=enabled
              -Djpeg=enabled
              -Davx512=enabled
            extra_packages: >-
              meson
              clang
              libpng-dev
              libjpeg-dev
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-ASan-gdk-pixbuf2
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --without-png
              --without-jpeg
              --with-gdk-pixbuf2
            extra_packages: >-
              clang
              libgdk-pixbuf2.0-dev
            exec_type: bash

          - label: Meson-ubuntu-x86_64-ASan-gdk-pixbuf2
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --buildtype=debug
              -Db_sanitize=address
              -Db_lundef=false
              -Dpng=disabled
              -Djpeg=disabled
              -Dgdk_pixbuf2=enabled
            extra_packages: >-
              meson
              clang
              libgdk-pixbuf2.0-dev
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-ASan-GD-no-aborttrace
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --without-png
              --without-jpeg
              --with-gd
              --disable-abort-trace
            extra_packages: >-
              clang
              libgd-dev
            exec_type: bash

          - label: Meson-ubuntu-x86_64-ASan-GD-no-aborttrace
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --buildtype=debug
              -Db_sanitize=address
              -Db_lundef=false
              -Dpng=disabled
              -Djpeg=disabled
              -Dgd=enabled
              -Dabort_trace=disabled
            extra_packages: >-
              meson
              clang
              libgd-dev
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-static
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-gcov
              --disable-shared
              --enable-static
            extra_packages: >-
              gcc-14
              gcovr
            exec_type: bash

          - label: Meson-ubuntu-x86_64-static
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Db_coverage=true
              -Db_staticpic=true
              -Ddefault_library=static
            extra_packages: >-
              meson
              gcc-14
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-no-simd
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-gcov
              --disable-simd
            extra_packages: >-
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Meson-ubuntu-x86_64-no-simd
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Db_coverage=true
              -Dsimd=disabled
            extra_packages: >-
              meson
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-no-tools
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_options: >-
              --disable-img2sixel
              --disable-sixel2png
            exec_type: bash

          - label: Meson-ubuntu-x86_64-no-tools
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_options: >-
              -Dimg2sixel=disabled
              -Dsixel2png=disabled
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-no-threads
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-gcov
              --disable-threads
            extra_packages: >-
              gcc-14
            pip_packages: >-
              gcovr
            exec_type: bash

          - label: Meson-ubuntu-x86_64-no-threads
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Db_coverage=true
              -Dthreads=disabled
            extra_packages: >-
              gcc-14
            pip_packages: >-
              meson
              gcovr
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-musl
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=musl-gcc
            extra_packages: >-
              musl-tools
            exec_type: bash

          - label: Meson-ubuntu-x86_64-musl
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=musl-gcc
            extra_packages: >-
              meson
              musl-tools
            exec_type: bash

          - label: Autotools-ubuntu-24.04-aarch64-distcheck
            buildtool: autotools
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            check_target: distcheck
            exec_type: bash

          - label: Meson-ubuntu-24.04-aarch64-distcheck
            buildtool: meson
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            check_target: dist
            extra_packages: >-
              meson
              ninja-build
            exec_type: bash

          - label: Autotools-ubuntu-24.04-aarch64-amalgamated-lib
            buildtool: autotools
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              --enable-amalgamated-lib
            extra_packages: >-
              gcc-14
            exec_type: bash

          - label: Meson-ubuntu-24.04-aarch64-amalgamated-lib
            buildtool: meson
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            setup_prefix: >-
              CC=gcc-14
            setup_options: >-
              -Damalgamated_lib=false
            extra_packages: >-
              meson
              gcc-14
            exec_type: bash

          - label: Autotools-ubuntu-aarch64-cosmopolitan-static
            buildtool: autotools
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            setup_prefix: >-
              CC=cosmocc
              LD=cosmocc
              AR=cosmoar
              RANLIB=cosmoranlib
              INSTALL=cosmoinstall
            setup_options: >-
              --disable-shared
              --without-png
              --without-jpeg
              --without-libcurl
              --without-onnxruntime
            exec_type: bash

          - label: Meson-ubuntu-aarch64-cosmopolitan-static
            buildtool: meson
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            setup_prefix: >-
              CC=cosmocc-meson
              LD=cosmocc-meson
              AR=cosmoar
              RANLIB=cosmoranlib
              INSTALL=cosmoinstall
            setup_options: >-
              -Ddefault_library=static
              -Dpng=disabled
              -Djpeg=disabled
              -Dcurl=disabled
              -Donnxruntime=disabled
            check_target:
              test --wrapper "$PWD"/build-aux/ape-wrapper
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-ubuntu-aarch64-emscripten
            buildtool: autotools
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            setup_prefix: >-
              CFLAGS="-O3 -g0 -flto -msimd128 -fdata-sections -ffunction-sections"
              LDFLAGS="-sNODERAWFS=1 -sSTACK_SIZE=524288 -sINITIAL_MEMORY=268435456 -sSINGLE_FILE=1 -sENVIRONMENT=node -sALLOW_MEMORY_GROWTH=1 -sWASM_BIGINT=1 -sUSE_PTHREADS=1 -sASSERTIONS=0"
              emconfigure
            setup_options: >-
              --host=wasm32-unknown-emscripten
              --with-shebang-file="$PWD/build-aux/shebang/node"
              --disable-shared
            extra_packages: >-
              nodejs
            exec_type: bash

          - label: Meson-ubuntu-aarch64-emscripten
            buildtool: meson
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            setup_prefix: >-
              emconfigure
            setup_options: >-
              --cross-file build-aux/meson-cross/emscripten
              -Ddefault_library=static
            extra_packages: >-
              meson
              nodejs
            exec_type: bash

          - label: Autotools-ubuntu-i686
            buildtool: autotools
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc
              CFLAGS="-m32"
              LDFLAGS="-m32"
              PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig
              PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            extra_packages: >-
              gcc-multilib
            exec_type: bash

          - label: Meson-ubuntu-i686
            buildtool: meson
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_prefix: >-
              CC=gcc
              CFLAGS="-m32"
              LDFLAGS="-m32"
              PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig
              PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            extra_packages: >-
              meson
              gcc-multilib
            exec_type: bash

          - label: Autotools-macos-aarch64-distcheck
            buildtool: autotools
            os: macos-latest
            runner: macos-latest
            check_target: distcheck
            exec_type: bash

          - label: Meson-macos-aarch64-distcheck
            buildtool: meson
            os: macos-latest
            runner: macos-latest
            check_target: dist
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-ASan-gdk-pixbuf2
            buildtool: autotools
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --without-png
              --without-jpeg
              --with-gdk-pixbuf2
            extra_packages: >-
              gdk-pixbuf
            exec_type: bash

          - label: Meson-macos-aarch64-ASan-gdk-pixbuf2
            buildtool: meson
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --buildtype=debug
              -Db_sanitize=address
              -Db_lundef=false
              -Dpng=disabled
              -Djpeg=disabled
              -Dgdk_pixbuf2=enabled
            extra_packages: >-
              meson
              gdk-pixbuf
            exec_type: bash

          - label: Autotools-macos-aarch64-ASan-GD
            buildtool: autotools
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --without-png
              --without-jpeg
              --with-gd
            extra_packages: >-
              gd
            exec_type: bash

          - label: Meson-macos-aarch64-ASan-GD
            buildtool: meson
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            setup_options: >-
              --buildtype=debug
              -Db_sanitize=address
              -Db_lundef=false
              -Dpng=disabled
              -Djpeg=disabled
              -Dgd=enabled
            extra_packages: >-
              meson
              gd
            exec_type: bash

          - label: Autotools-macos-aarch64-amalgamated-lib-disable-appkit
            buildtool: autotools
            os: macos-latest
            runner: macos-latest
            setup_options: >-
              --enable-amalgamated-lib
              --disable-appkit
            exec_type: bash

          - label: Meson-macos-aarch64-amalgamated-lib-disable-appkit
            buildtool: meson
            os: macos-latest
            runner: macos-latest
            setup_options: >-
              -Damalgamated_lib=true
              -Dappkit=disabled
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-x86_64
            buildtool: autotools
            os: macos-15
            runner: macos-15
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              lcov
            exec_type: bash

          - label: Meson-macos-x86_64
            buildtool: meson
            os: macos-15
            runner: macos-15
            setup_options: >-
              -Db_coverage=true
            extra_packages: >-
              meson
              lcov
            exec_type: bash

          - label: Autotools-macos-x86_64-amalgamated-lib
            buildtool: autotools
            os: macos-15
            runner: macos-15
            setup_options: >-
              --enable-amalgamated-lib
            exec_type: bash

          - label: Meson-macos-x86_64-amalgamated-lib
            buildtool: meson
            os: macos-15
            runner: macos-15
            setup_options: >-
              -Damalgamated_lib=true
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-cosmopolitan-static
            buildtool: autotools
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CC=cosmocc
              LD=cosmocc
              AR=cosmoar
              RANLIB=cosmoranlib
              INSTALL=cosmoinstall
            setup_options: >-
              --disable-shared
              --without-png
              --without-jpeg
              --without-libcurl
              --without-onnxruntime
              --without-coregraphics
              --disable-quicklook-extension
              --disable-quicklook-preview
              --disable-appkit
            exec_type: bash

          - label: Meson-macos-aarch64-cosmopolitan-static
            buildtool: meson
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CC=cosmocc-meson
              LD=cosmocc-meson
              AR=cosmoar
              RANLIB=cosmoranlib
              INSTALL=cosmoinstall
            setup_options: >-
              -Ddefault_library=static
              -Dpng=disabled
              -Djpeg=disabled
              -Dcurl=disabled
              -Donnxruntime=disabled
              -Dcoregraphics=disabled
              -Dquicklook_extension=disabled
              -Dquicklook_preview=disabled
              -Dappkit=disabled
            check_target:
              test --wrapper "$PWD"/build-aux/ape-wrapper
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-emscripten
            buildtool: autotools
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              CFLAGS="-O3 -g0 -flto -msimd128 -fdata-sections -ffunction-sections"
              LDFLAGS="-sNODERAWFS=1 -sSTACK_SIZE=524288 -sINITIAL_MEMORY=268435456 -sSINGLE_FILE=1 -sENVIRONMENT=node -sALLOW_MEMORY_GROWTH=1 -sWASM_BIGINT=1 -sUSE_PTHREADS=1 -sASSERTIONS=0"
              emconfigure
            setup_options: >-
              --host=wasm32-unknown-emscripten
              --with-shebang-file="$PWD/build-aux/shebang/node"
              --disable-shared
            extra_packages: >-
              node
            exec_type: bash

          - label: Meson-macos-aarch64-emscripten
            buildtool: meson
            os: macos-latest
            runner: macos-latest
            setup_prefix: >-
              emconfigure
            setup_options: >-
              --cross-file build-aux/meson-cross/emscripten
              -Ddefault_library=static
            extra_packages: >-
              meson
              node
            exec_type: bash

          - label: Autotools-msys2-mingw64-static
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --disable-shared
              --enable-static
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-mingw64-no-simd
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --enable-gcov
              --disable-simd
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Meson-msys2-mingw64-no-simd
            buildtool: meson
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              -Db_coverage=true
              -Dsimd=disabled
            setup_prefix: >-
              CC=gcc
            extra_packages: >-
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-mingw64-no-tools
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --disable-img2sixel
              --disable-sixel2png
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
            exec_type: msys2

          - label: Meson-msys2-mingw64-no-tools
            buildtool: meson
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_prefix: >-
              CC=gcc
            setup_options: >-
              -Dimg2sixel=disabled
              -Dsixel2png=disabled
            extra_packages: >-
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-toolchain
            exec_type: msys2

          - label: Autotools-msys2-mingw64-no-threads
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_options: >-
              --disable-threads
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Meson-msys2-mingw64-no-threads
            buildtool: meson
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_prefix: >-
              CC=gcc
            setup_options: >-
              -Dthreads=disabled
              -Db_coverage=true
            extra_packages: >-
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-ucrt64
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: UCRT64
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
            exec_type: msys2

          - label: Meson-msys2-ucrt64
            buildtool: meson
            os: windows-latest
            runner: windows-latest
            msystem: UCRT64
            setup_prefix: >-
              CC=gcc
            setup_options: >-
              -Db_coverage=true
            extra_packages: >-
              mingw-w64-ucrt-x86_64-meson
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-ucrt64-amalgamated-lib
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: UCRT64
            setup_options: >-
              --enable-amalgamated-lib
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
            exec_type: msys2

          - label: Meson-msys2-ucrt64-amalgamated-lib
            buildtool: meson
            os: windows-latest
            runner: windows-latest
            msystem: UCRT64
            setup_prefix: >-
              CC=gcc
            setup_options: >-
              -Db_coverage=true
              -Damalgamated_lib=true
            extra_packages: >-
              mingw-w64-ucrt-x86_64-meson
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
            exec_type: msys2

          - label: Autotools-msys2-clang64
            buildtool: autotools
            os: windows-latest
            runner: windows-latest
            msystem: CLANG64
            setup_prefix: >-
              CC=clang
            setup_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-clang-x86_64-toolchain
              mingw-w64-clang-x86_64-lcov
            exec_type: msys2

