            os: macos-latest
            runner: macos-latest
            variant: default
          - label: macos x86_64
            os: macos-15
            runner: macos-15
            variant: default
          - label: mingw64 static-only
            os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            static_only: true
