name: libsixel CI (build & test)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16

jobs:
  ci-autotools:
    name: Autotools ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: freebsd
            cp_os: freebsd
            cp_arch: x86-64
            cp_version: '14.3'
            variant: freebsd
            label: freebsd 14.3 x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: freebsd
            cp_os: freebsd
            cp_arch: arm64
            cp_version: '14.3'
            variant: freebsd
            label: freebsd 14.3 arm64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: openbsd
            cp_os: openbsd
            cp_arch: x86-64
            cp_version: '7.8'
            variant: openbsd
            label: openbsd 7.8 x86-64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: openbsd
            cp_os: openbsd
            cp_arch: arm64
            cp_version: '7.8'
            variant: openbsd
            label: openbsd 7.8 arm64
          - os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            static_only: true
            variant: static-only
            label: ubuntu x86_64 static-only
          - os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            disable_simd: true
            variant: disable-simd
            label: ubuntu x86_64 no-simd
          - os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            disable_tools: true
            variant: disable-tools
            label: ubuntu x86_64 no-tools
          - os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            disable_threads: true
            variant: disable-threads
            label: ubuntu x86_64 no-threads
          - os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            musl: true
            variant: musl-cross
            label: ubuntu x86_64 musl-cross
          - os: ubuntu-latest
            runner: ubuntu-latest
            sys: i686
            variant: default
            label: ubuntu i686
          - os: macos-latest
            runner: macos-latest
            sys: aarch64
            variant: default
            label: macos aarch64
          - os: macos-15
            runner: macos-15
            sys: x86_64
            variant: default
            label: macos x86_64
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            static_only: true
            variant: static-only
            label: mingw64 static-only
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            disable_simd: true
            variant: disable-simd
            label: mingw64 no-simd
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            disable_tools: true
            variant: disable-tools
            label: mingw64 no-tools
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW64
            disable_threads: true
            variant: disable-threads
            label: mingw64 no-threads
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: UCRT64
            variant: default
            label: ucrt64
          - os: windows-latest
            runner: windows-latest
            compiler: clang
            sys: CLANG64
            variant: default
            label: clang64
          - os: windows-latest
            runner: windows-latest
            compiler: clang-cl
            sys: MSVC
            variant: clang-cl
            label: clang-cl
          - os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: default
            label: msvc
          - os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: vcpkg-libpng
            vcpkg_libpng: true
            label: msvc vcpkg-libpng
          - os: windows-latest
            runner: windows-latest
            compiler: cl
            sys: MSVC
            variant: vcpkg-libjpeg
            vcpkg_libjpeg: true
            label: msvc vcpkg-libjpeg
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MINGW32
            variant: default
            label: mingw32
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: MSYS
            variant: default
            label: msys
          - os: windows-latest
            runner: windows-latest
            compiler: gcc
            sys: CYGWIN
            variant: default
            label: cygwin

    steps:
    - name: Configure git EOL
      if: runner.os == 'Windows'
      run: git config --global core.autocrlf false

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Install multilib toolchain (Linux i686)
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os == 'Linux' && (matrix.sys || '') == 'i686'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib

    - name: Install musl toolchain (Linux musl-cross)
      if: ${{ matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os == 'Linux' && (matrix.musl || false) }}
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Fix Homebrew taps/cache
      if: runner.os == 'macOS'
      run: |
        brew update-reset
        rm -f ~/Library/Caches/Homebrew/downloads/* || true
        brew update -f
        brew doctor || true

    - name: Install lcov (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update
        brew install lcov

    - name: Install dependencies (FreeBSD)
      if: matrix.platform == 'freebsd'
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        environment_variables: CI
        run: |
          set -eux

          pkg_prefix=""
          if [ "$(id -u)" -ne 0 ]; then
            if command -v sudo >/dev/null 2>&1; then
              pkg_prefix="sudo"
            elif command -v doas >/dev/null 2>&1; then
              pkg_prefix="doas"
            else
              echo "No privilege escalation helper available" >&2
              exit 1
            fi
          fi

          ${pkg_prefix:+$pkg_prefix }pkg update -f
          ${pkg_prefix:+$pkg_prefix }pkg install -y \
            gmake \
            pkgconf \
            png \
            jpeg-turbo \
            curl

    - name: Install dependencies (OpenBSD)
      if: matrix.platform == 'openbsd'
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        environment_variables: CI
        run: |
          set -eux

          pkg_prefix=""
          if [ "$(id -u)" -ne 0 ]; then
            if command -v sudo >/dev/null 2>&1; then
              pkg_prefix="sudo"
            elif command -v doas >/dev/null 2>&1; then
              pkg_prefix="doas"
            else
              echo "No privilege escalation helper available" >&2
              exit 1
            fi
          fi

          ${pkg_prefix:+$pkg_prefix }pkg_add \
            gmake \
            pkgconf \
            png \
            jpeg \
            curl

    - name: Setup MSVC developer env (vcvars)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_libpng == true || matrix.vcpkg_libjpeg == true) }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ matrix.vcpkg_libpng || false }}-${{ matrix.vcpkg_libjpeg || false }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, libpng/libjpeg)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_libpng == true || matrix.vcpkg_libjpeg == true) }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
          git init $vcpkgRoot
        }
        git -C $vcpkgRoot remote remove origin 2>$null
        git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

        git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
        git -C $vcpkgRoot reset --hard FETCH_HEAD

        Set-Location $vcpkgRoot

        cmd /c bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        if ('${{ matrix.vcpkg_libpng || false }}' -eq 'true') {
          $packages += 'libpng'
        }
        if ('${{ matrix.vcpkg_libjpeg || false }}' -eq 'true') {
          $packages += 'libjpeg-turbo'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows, MinGW/UCRT/Clang)
      if: runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'MSYS' && matrix.sys != 'CYGWIN' && matrix.sys != 'MINGW32'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: false
        cache: false

    - name: Update keyring then upgrade
      if: runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'MSYS' && matrix.sys != 'CYGWIN' && matrix.sys != 'MINGW32'
      shell: msys2 {0}
      run: |
        set -eux
        cp -a /etc/pacman.conf /etc/pacman.conf.bak
        awk '
          BEGIN{skip=0}
          /^\[clangarm64\]/{skip=1; print "#" $0; next}
          /^\[.*\]/{ if(skip){skip=0} }
          { if(skip) print "#" $0; else print $0 }
        ' /etc/pacman.conf.bak > /etc/pacman.conf
        rm -f /var/lib/pacman/sync/*.db /var/lib/pacman/sync/*.files || true
        pacman -Sy --noconfirm --needed msys2-keyring
        pacboy -S --noconfirm --needed cc:p
        pacman -S --noconfirm --needed make

    - name: Setup MSYS2 (Windows, MinGW/UCRT/Clang)
      if: runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'MSYS' && matrix.sys != 'CYGWIN' && matrix.sys != 'MINGW32'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: false
        install: >-
          make
        pacboy: >-
          cc:p
          lcov:p

    - name: Setup MSYS2 (Windows, MinGW/UCRT/Clang)
      if: matrix.sys == 'MINGW32'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: >-
          make
        pacboy: >-
          cc:p

    - name: Setup MSYS2 (Windows, MSYS gcc)
      if: runner.os == 'Windows' && matrix.sys == 'MSYS' && matrix.compiler == 'gcc'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MSYS
        update: true
        install: >-
          make
          gcc
          pkgconf
          python-pip
          lcov

    - name: Setup MSYS2 (Windows, MSVC)
      if: runner.os == 'Windows' && matrix.sys == 'MSVC'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MSYS
        update: true
        install: >-
          make

    - name: Setup Cygwin
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: gcc-core,make,pkg-config,python3,python3-pip,ninja

    - name: Install gcovr
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os != 'Windows' && (matrix.sys || '') != 'i686'
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install -U pip gcovr
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

    - name: Install gcc-14 (Linux)
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-14

    - name: Configure and build (FreeBSD)
      if: matrix.platform == 'freebsd'
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        environment_variables: CI
        run: |
          set -eux

          # OpenBSD clang (e.g., 6.8) warns that --coverage is unused and
          # converts it into an error under -Werror, so skip gcov here.
          enable_gcov_flag=""
          disable_threads_flag=""
          if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
            disable_threads_flag="--disable-threads"
          fi
          disable_tools_flags=""
          if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
            disable_tools_flags="--disable-img2sixel --disable-sixel2png"
          fi
          disable_simd_flag=""
          if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
            disable_simd_flag="--disable-simd"
          fi
          static_only_flags=""
          if [ "${{ matrix.static_only || '' }}" = "true" ]; then
            static_only_flags="--disable-shared --enable-static"
            enable_gcov_flag=""
          fi

          ./configure \
              --without-bashcompletiondir \
              --without-zshcompletiondir \
              --disable-python \
              --enable-debug \
              --enable-tests \
              ${enable_gcov_flag} \
              --disable-dependency-tracking \
              ${disable_tools_flags} \
              ${disable_threads_flag} \
              ${disable_simd_flag} \
              ${static_only_flags}
          gmake V=1

    - name: Configure and build (OpenBSD)
      if: matrix.platform == 'openbsd'
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        environment_variables: CI
        run: |
          set -eux

          enable_gcov_flag="--enable-gcov"
          disable_threads_flag=""
          if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
            disable_threads_flag="--disable-threads"
          fi
          disable_tools_flags=""
          if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
            disable_tools_flags="--disable-img2sixel --disable-sixel2png"
          fi
          disable_simd_flag=""
          if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
            disable_simd_flag="--disable-simd"
          fi
          static_only_flags=""
          if [ "${{ matrix.static_only || '' }}" = "true" ]; then
            static_only_flags="--disable-shared --enable-static"
            enable_gcov_flag=""
          fi

          ./configure \
              --without-bashcompletiondir \
              --without-zshcompletiondir \
              --disable-python \
              --enable-debug \
              --enable-tests \
              ${enable_gcov_flag} \
              --disable-dependency-tracking \
              ${disable_tools_flags} \
              ${disable_threads_flag} \
              ${disable_simd_flag} \
              ${static_only_flags}
          gmake V=1

    - name: Configure and build (non-Windows)
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os != 'Windows'
      shell: bash
      run: |
        enable_gcov_flag="--enable-gcov"
        if [ "${{ matrix.musl || '' }}" = "true" ]; then
          export CC=musl-gcc
          enable_gcov_flag=""
        elif [ '${{ matrix.sys || '' }}' = 'i686' ]; then
          export CC="gcc -m32"
          export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig
          export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
          enable_gcov_flag=""
        elif [ "${{ runner.os }}" = "Linux" ]; then
          export CC=gcc-14
        fi
        disable_threads_flag=""
        if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
          disable_threads_flag="--disable-threads"
        fi
        disable_tools_flags=""
        if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
          disable_tools_flags="--disable-img2sixel --disable-sixel2png"
        fi
        disable_simd_flag=""
        if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
          disable_simd_flag="--disable-simd"
        fi
        static_only_flags=""
        if [ "${{ matrix.static_only || '' }}" = "true" ]; then
          static_only_flags="--disable-shared --enable-static"
        fi
        ./configure \
            --without-bashcompletiondir \
            --without-zshcompletiondir \
            --disable-python \
            --enable-debug \
            --enable-tests \
            ${enable_gcov_flag} \
            --disable-dependency-tracking \
            ${disable_tools_flags} \
            ${disable_threads_flag} \
            ${disable_simd_flag} \
            ${static_only_flags}
        cat config.log
        make V=1

    - name: Configure and build (Windows, not MSVC/Cygwin)
      if: ${{ runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'CYGWIN' }}
      shell: msys2 {0}
      run: |
        disable_threads_flag=""
        if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
          disable_threads_flag="--disable-threads"
        fi
        disable_tools_flags=""
        if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
          disable_tools_flags="--disable-img2sixel --disable-sixel2png"
        fi
        disable_simd_flag=""
        if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
          disable_simd_flag="--disable-simd"
        fi
        static_only_flags=""
        if [ "${{ matrix.static_only || '' }}" = "true" ]; then
          static_only_flags="--disable-shared --enable-static"
        fi
        ./configure CC=${{ matrix.compiler }} \
            --without-png \
            --without-jpeg \
            --without-libcurl \
            --without-bashcompletiondir \
            --without-zshcompletiondir \
            --disable-python \
            --enable-debug \
            --enable-tests \
            --enable-gcov \
            --disable-dependency-tracking \
            ${disable_tools_flags} \
            ${disable_threads_flag} \
            ${disable_simd_flag} \
            ${static_only_flags}
        cat config.log
        make V=1

    - name: Configure and build (Windows, Cygwin)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'CYGWIN' }}
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\cygwin'
        if (-not (Test-Path $cygwinRoot)) { $cygwinRoot = 'C:\cygwin64' }
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $disableThreadsFlag = ''
        if ('${{ matrix.disable_threads }}' -eq 'true') {
          $disableThreadsFlag = '--disable-threads'
        }
        $disableToolsFlags = ''
        if ('${{ matrix.disable_tools }}' -eq 'true') {
          $disableToolsFlags = '--disable-img2sixel --disable-sixel2png'
        }
        $disableSimdFlag = ''
        if ('${{ matrix.disable_simd }}' -eq 'true') {
          $disableSimdFlag = '--disable-simd'
        }
        $staticOnlyFlags = ''
        if ('${{ matrix.static_only }}' -eq 'true') {
          $staticOnlyFlags = '--disable-shared --enable-static'
        }
        $scriptLines = @(
          'set -eu',
          'set -o pipefail 2>/dev/null || true',
          "disable_threads_flag=`"$disableThreadsFlag`"",
          "disable_tools_flags=`"$disableToolsFlags`"",
          "disable_simd_flag=`"$disableSimdFlag`"",
          "static_only_flags=`"$staticOnlyFlags`"",
          "export GITHUB_WORKSPACE=`"$workspace`"",
          "cd `"$workspace`"",
          './configure CC=${{ matrix.compiler }} --without-png --without-jpeg --without-libcurl --without-bashcompletiondir --without-zshcompletiondir --disable-python --enable-debug --enable-tests --enable-gcov --disable-dependency-tracking ${disable_tools_flags} ${disable_threads_flag} ${disable_simd_flag} ${static_only_flags}',
          'cat config.log',
          'make V=1'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure and build (Windows, MSVC)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' }}
      shell: msys2 {0}
      run: |
        VCVARS="$(cygpath -w "$VSINSTALLDIR")\\VC\\Auxiliary\\Build\\vcvarsall.bat"
        cmd //c call "${VCVARS}" x64 \>nul \&\& set
        disable_threads_flag=""
        if [ "${{ matrix.disable_threads || '' }}" = "true" ]; then
          disable_threads_flag="--disable-threads"
        fi
        disable_tools_flags=""
        if [ "${{ matrix.disable_tools || '' }}" = "true" ]; then
          disable_tools_flags="--disable-img2sixel --disable-sixel2png"
        fi
        disable_simd_flag=""
        if [ "${{ matrix.disable_simd || '' }}" = "true" ]; then
          disable_simd_flag="--disable-simd"
        fi
        eval $(
            cmd //c call "${VCVARS}" x64 \>nul \&\& set |
            grep -i '^\(PATH\|INCLUDE\|LIB\|LIBPATH\)'  |
            while IFS== read -r key val; do
                case "$key" in PATH|Path)
                    echo export PATH=\"$(echo "$val" | tr \; \\n | while read -r p; do cygpath "$p"; done | grep ^/ | tr \\n :)\"\;
                    ;;
                *)
                    echo export "$key"=\""$val"\"\;
                    ;;
                esac;
            done
        )
        ./configure CC=${{ matrix.compiler }} LD=link AR="${SHELL} $(pwd)/build-aux/ar-lib lib" ARFLAGS=cr NM="dumpbin -symbols" STRIP=: RANLIB=: \
            --host=x86_64-pc-windows-msvc \
            --without-bashcompletiondir \
            --without-zshcompletiondir \
            --disable-python \
            --enable-debug \
            --enable-tests \
            --disable-dependency-tracking \
            --without-png \
            --without-jpeg \
            --without-libcurl \
            ${disable_tools_flags} \
            ${disable_threads_flag} \
            ${disable_simd_flag}
        cat config.log
        make V=1

    - name: Run tests (FreeBSD/OpenBSD)
      if: matrix.platform == 'freebsd' || matrix.platform == 'openbsd'
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        environment_variables: CI
        run: |
          set -eux
          gmake check V=1

    - name: Run tests (non-Windows)
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os != 'Windows'
      shell: bash
      run: make check V=1

    - name: Run tests (Windows, not MSVC/Cygwin/CLANG64)
      if: runner.os == 'Windows' && matrix.sys != 'CLANG64' && matrix.sys != 'MSVC' && matrix.sys != 'CYGWIN'
      shell: msys2 {0}
      run: make check V=1

    - name: Run tests (Windows, CLANG64)
      if: runner.os == 'Windows' && matrix.sys == 'CLANG64'
      shell: msys2 {0}
      run: |
        LLVM_PROFILE_FILE="%p-%m.profraw" make check V=1
        find . -name \*.profraw || true
        llvm-profdata merge -sparse coverage/*.profraw -o coverage/coverage.profdata || true
        find . -type f \( -name '*.exe' -o -name '*.dll' \) |
        xargs llvm-cov export -format=lcov \
          -instr-profile=coverage/coverage.profdata > coverage.info || true

    - name: Run tests (Windows, MSVC)
      if: runner.os == 'Windows' && matrix.sys == 'MSVC'
      shell: msys2 {0}
      run: |
        VCVARS="$(cygpath -w "$VSINSTALLDIR")\\VC\\Auxiliary\\Build\\vcvarsall.bat"
        cmd //c call "${VCVARS}" x64 \>nul \&\& set
        eval $(
            cmd //c call "${VCVARS}" x64 \>nul \&\& set |
            grep -i '^\(PATH\|INCLUDE\|LIB\|LIBPATH\)'  |
            while IFS== read -r key val; do
                case "$key" in PATH|Path)
                    echo export PATH=\"$(echo "$val" | tr \; \\n | while read -r p; do cygpath "$p"; done | grep ^/ | tr \\n :)\"\;
                    ;;
                *)
                    echo export "$key"=\""$val"\"\;
                    ;;
                esac;
            done
        )
        make check V=1

    - name: Run tests (Windows, Cygwin)
      if: runner.os == 'Windows' && matrix.sys == 'CYGWIN'
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\cygwin'
        if (-not (Test-Path $cygwinRoot)) { $cygwinRoot = 'C:\cygwin64' }
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          'set -eu',
          'set -o pipefail 2>/dev/null || true',
          "export GITHUB_WORKSPACE=`"$workspace`"",
          "cd `"$workspace`"",
          'make check V=1'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Capture coverage (Linux)
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && runner.os == 'Linux' && (matrix.sys || '') != 'i686' && !(matrix.musl || false)
      shell: bash
      run: |
        gcovr -r . --lcov -o coverage.info \
                   --gcov-executable gcov-14

    - name: Capture coverage (non-MSVC)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        lcov -c \
          -d "$PWD/src/.libs" \
          -d "$PWD/converters" \
          --rc branch_coverage=1 \
          -o coverage.info

    - name: Capture coverage (Windows MSYS2/MinGW/UCRT/Clang)
      if: runner.os == 'Windows' && matrix.sys != 'MSVC' && matrix.sys != 'CYGWIN' && matrix.sys != 'MINGW32'
      shell: msys2 {0}
      run: |
        lcov -c \
          -d "$PWD/src/.libs" \
          -d "$PWD/converters" \
          --rc branch_coverage=1 \
          -o coverage.info

    - name: Upload autotools artifacts
      if: matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && always()
      uses: actions/upload-artifact@v4
      with:
        name: autotools-${{ matrix.os }}-${{ matrix.sys || 'native' }}-${{ matrix.compiler || 'default' }}-${{ matrix.variant || 'default' }}
        path: |
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
        if-no-files-found: warn
        overwrite: true

    - name: Upload to Coveralls (per-flag, parallel)
      id: coveralls_upload
      if: ${{ runner.os != 'Windows' && matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && matrix.os != 'macos-15' && matrix.sys != 'i686' && !(matrix.musl || false) }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
        flag-name: ${{ matrix.cfg }}
        parallel: true

    - name: Wait before Coveralls retry (per-flag)
      if: ${{ runner.os != 'Windows' && matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && matrix.os != 'macos-15' && steps.coveralls_upload.outcome == 'failure' && !(matrix.musl || false) }}
      run: sleep 5

    - name: Upload to Coveralls (per-flag, retry)
      if: ${{ runner.os != 'Windows' && matrix.platform != 'freebsd' && matrix.platform != 'openbsd' && matrix.os != 'macos-15' && steps.coveralls_upload.outcome == 'failure' && !(matrix.musl || false) }}
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
        flag-name: ${{ matrix.cfg }}
        parallel: true


  ci-autotools-finish:
    needs: ci-autotools
    runs-on: ubuntu-latest
    steps:
      - name: Finalize Coveralls
        id: coveralls_finalize
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

      - name: Wait before Coveralls retry (finalize)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        run: sleep 5

      - name: Finalize Coveralls (retry)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true


  ci-dist-autotools:
    name: AT-tarball ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux thumbnailer command
            os: ubuntu-latest
            runner: ubuntu-latest
            configure_flags: >-
              --without-png --without-jpeg --without-libcurl
              --without-bashcompletiondir --without-zshcompletiondir
              --disable-python --enable-debug --enable-tests
              --disable-dependency-tracking --enable-thumbnailer-command
          - label: macOS Quick Look extension
            os: macos-latest
            runner: macos-latest
            configure_flags: >-
              --without-png --without-jpeg --without-libcurl
              --without-bashcompletiondir --without-zshcompletiondir
              --disable-python --enable-debug --enable-tests
              --disable-dependency-tracking --enable-quicklook-extension
              --enable-quicklook-preview
          - label: Windows WIC codec (MinGW)
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            configure_flags: >-
              --without-png --without-jpeg --without-libcurl
              --without-bashcompletiondir --without-zshcompletiondir
              --disable-python --enable-debug --enable-tests
              --disable-dependency-tracking --enable-wiccodec

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Prepare Homebrew cache
      if: runner.os == 'macOS'
      run: |
        brew update-reset
        rm -f ~/Library/Caches/Homebrew/downloads/* || true
