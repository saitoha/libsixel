          - label: ubuntu clang with-gdk-pixbuf2
            os: ubuntu-latest
            runner: ubuntu-latest
            configure_extra: '--with-gdk-pixbuf2'
            artifact_suffix: with-gdk-pixbuf2
            apt: 'libgdk-pixbuf2.0-dev'
          - label: ubuntu clang with-png
            os: ubuntu-latest
            runner: ubuntu-latest
            configure_extra: '--with-png'
            artifact_suffix: with-png
            apt: 'libpng-dev'
          - label: ubuntu clang with-jpeg
            os: ubuntu-latest
            runner: ubuntu-latest
            configure_extra: '--with-jpeg'
            artifact_suffix: with-jpeg
            apt: 'libjpeg-turbo8-dev'
          - label: ubuntu clang with-libcurl
            os: ubuntu-latest
            runner: ubuntu-latest
            configure_extra: '--with-libcurl'
            artifact_suffix: with-libcurl
            apt: 'libcurl4-openssl-dev'
          - label: macos aarch64 clang
            os: macos-latest
            runner: macos-latest
            configure_extra: ''
            artifact_suffix: default
            apt: ''
          - label: macos aarch64 clang enable-quicklook-extension
            os: macos-latest
            runner: macos-latest
            configure_extra: '--enable-quicklook-extension'
            artifact_suffix: enable-quicklook-extension
            apt: ''
          - label: macos aarch64 clang with-coregraphics
            os: macos-latest
            runner: macos-latest
            configure_extra: '--with-coregraphics'
            artifact_suffix: with-coregraphics
            apt: ''
          - label: macos x86_64 clang
            os: macos-15
            runner: macos-15
            configure_extra: ''
            artifact_suffix: default
            apt: ''
          - label: clang64
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            configure_extra: ''
            artifact_suffix: default
            apt: ''
          - label: clang64 with-wic
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            configure_extra: '--with-wic'
            artifact_suffix: with-wic
            apt: ''
          - label: clang64 enable-wiccodec
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            configure_extra: '--enable-wiccodec'
            artifact_suffix: enable-wiccodec
            apt: ''
          - label: clang64 with-winhttp
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            configure_extra: '--with-winhttp'
            artifact_suffix: with-winhttp
            apt: ''
    env:
      ASAN_CFLAGS: "-fsanitize=address -O1 -g -fno-omit-frame-pointer"
      ASAN_LDFLAGS: "-fsanitize=address"
    steps:
    - name: Configure git EOL
      if: runner.os == 'Windows'
      run: git config --global core.autocrlf false

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
