name: libsixel CI (build & test)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16
  # Enforce Node.js 24 for JavaScript actions before the hosted-runner switch.
  # Node.js 24 becomes default on 2026-06-02 and Node.js 20 is removed on
  # 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc
            buildtool: autotools
            runner: ubuntu-latest
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc
            buildtool: meson
            runner: ubuntu-latest
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc
            buildtool: autotools
            runner: macos-latest
            exec_type: bash

          - label: Meson-macos-aarch64-gcc
            buildtool: meson
            runner: macos-latest
            extra_packages: >-
              meson
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-x86_64
            buildtool: meson
            runner: windows-latest
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  tcc:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-tcc-shared
            buildtool: autotools
            runner: ubuntu-latest
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
            setup_prefix: >-
              CC=tcc
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-tcc-static
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=tcc
            setup_options: >-
              --disable-shared
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-tcc-shared-png-jpeg-tiff-webp
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=tcc
            setup_options: >-
              --with-png
              --with-jpeg
              --with-tiff
              --with-webp
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
              libpng-dev
              libjpeg-dev
              libtiff-dev
              libwebp-dev
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-tcc-shared-gd
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=tcc
            setup_options: >-
              --with-gd
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
              libgd-dev
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-tcc-no-threads
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=tcc
            setup_options: >-
              --disable-threads
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-tcc-amalgamated_lib
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=tcc
            setup_options: >-
              --enable-amalgamated-lib
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-tcc-amalgamated_tools
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              CC=tcc
            setup_options: >-
              --enable-amalgamated-tools
            extra_packages: >-
              clang
              tcc
              libc6-dev
              binutils
            exec_type: bash

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  staticcheck:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-staticcheck
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              mkdir -p "$HOME/.local/bin";
              command -v actionlint >/dev/null 2>&1 ||
              { curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash |
              bash -s -- latest "$HOME/.local/bin"; };
              PATH="$HOME/.local/bin:$PATH"
            check_target: staticcheck
            extra_packages: >-
              shellcheck
              codespell
              curl
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-staticcheck
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              mkdir -p "$HOME/.local/bin";
              command -v actionlint >/dev/null 2>&1 ||
              { curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash |
              bash -s -- latest "$HOME/.local/bin"; };
              PATH="$HOME/.local/bin:$PATH"
            check_target: compile staticcheck
            extra_packages: >-
              meson
              shellcheck
              codespell
              curl
            exec_type: bash

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  static-analyze:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Meson-cmd-x86_64-msvc-static-analyze
            runner: windows-latest
            analyzer: msvc

          - label: Autotools-ubuntu-x86_64-clang-static-analyze
            runner: ubuntu-latest
            analyzer: clang

          - label: Autotools-ubuntu-x86_64-gcc-static-analyze
            runner: ubuntu-latest
            analyzer: gcc

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup MSVC developer env
        if: ${{ matrix.analyzer == 'msvc' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build with MSVC /W4 /analyze
        if: ${{ matrix.analyzer == 'msvc' }}
        shell: cmd
        run: |
          setlocal ENABLEDELAYEDEXPANSION
          python -m pip install --upgrade pip
          if errorlevel 1 exit /b !errorlevel!
          python -m pip install meson
          if errorlevel 1 exit /b !errorlevel!
          python -m mesonbuild.mesonmain setup builddir -Danalyzer=true
          if errorlevel 1 exit /b !errorlevel!
          python -m mesonbuild.mesonmain compile -C builddir --ninja-args=-k0
          if errorlevel 1 exit /b !errorlevel!
          endlocal

      - name: Install Clang Static Analyzer
        if: ${{ matrix.analyzer == 'clang' }}
        shell: bash
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y clang clang-tools

      - name: Build with Clang Static Analyzer
        if: ${{ matrix.analyzer == 'clang' }}
        shell: bash
        run: |
          set -eux
          CC=clang ./configure --enable-analyzer
          SCAN_BUILD="$(command -v scan-build || command -v scan-build-18 || command -v scan-build-17 || command -v scan-build-16)"
          ROOT_DIR="$(pwd)"
          "$SCAN_BUILD" \
            --use-cc=clang \
            --use-c++=clang++ \
            -disable-checker deadcode.DeadStores \
            --exclude "$ROOT_DIR/assessment" \
            --exclude "$ROOT_DIR/tests" \
            --exclude "$ROOT_DIR/examples" \
            --exclude "$ROOT_DIR/drawing" \
            --exclude "$ROOT_DIR/python" \
            --exclude "$ROOT_DIR/ruby" \
            --exclude "$ROOT_DIR/windows" \
            --exclude "$ROOT_DIR/quicklook-extension" \
            --status-bugs \
            --keep-going \
            make -j"$(nproc)" V=1

      - name: Build with GCC Static Analyzer
        if: ${{ matrix.analyzer == 'gcc' }}
        shell: bash
        run: |
          set -eux
          CC=gcc ./configure --enable-analyzer
          make -j"$(nproc)" V=1

  pgo:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-clang-pgo
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              export LLVM_PROFILE_FILE="${GITHUB_WORKSPACE}/pgo/default-%p-%m.profraw";
              mkdir build;
              cd build;
              rel=..;
              CC=clang
            setup_options: >-
              --enable-pgo=generate --with-pgo-data=${GITHUB_WORKSPACE}/pgo
            pgo_use_options: >-
              --enable-pgo=use --with-pgo-profdata=${GITHUB_WORKSPACE}/pgo/default.profdata
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-clang-pgo
            buildtool: meson
            runner: ubuntu-latest
            setup_prefix: >-
              export LLVM_PROFILE_FILE="$PWD/pgo/default-%p-%m.profraw";
              CC=clang
            setup_options: >-
              -Db_pgo=generate
            pgo_use_options: >-
              -Db_pgo=use
            extra_packages: >-
              meson
              clang
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-gcc-pgo
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-pgo=generate --with-pgo-data=${GITHUB_WORKSPACE}/pgo
            pgo_use_options: >-
              --enable-pgo=use --with-pgo-data=${GITHUB_WORKSPACE}/pgo
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-pgo
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Db_pgo=generate
            pgo_use_options: >-
              -Db_pgo=use
            extra_packages: >-
              meson
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-pgo
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Dmsvc_pgo=generate
            pgo_use_options: >-
              -Dmsvc_pgo=use
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  python:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-python
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-python
            extra_packages: >-
              clang
            pip_packages: >-
              build
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-gcc-python-vpath_build
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              mkdir build;
              cd build;
              rel=..;
            setup_options: >-
              --enable-python
            extra_packages: >-
              clang
            pip_packages: >-
              build
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-python
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-python
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-python
            pip_packages: >-
              build
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-python
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-x86_64-python
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Dpython=enabled
            pip_packages: >-
              build
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  python-coverage:
    needs: [python]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-python-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-python
            extra_packages: >-
              clang
            pip_packages: >-
              build
              pytest
              coverage
            check_target: check-python
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-python-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
              pytest
              coverage
            check_target: compile test-python
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-python-coverage
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-python
            pip_packages: >-
              build
              pytest
              coverage
            check_target: check-python
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-python-coverage
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Dpython=enabled
            extra_packages: >-
              meson
            pip_packages: >-
              build
              pytest
              coverage
            check_target: compile test-python
            exec_type: bash

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  ruby:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-ruby
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-ruby
            extra_packages: >-
              clang
            exec_type: bash

          - label: Autotools-ubuntu-x86_64-gcc-ruby-vpath_build
            buildtool: autotools
            runner: ubuntu-latest
            setup_prefix: >-
              mkdir build;
              cd build;
              rel=..;
            setup_options: >-
              --enable-ruby
            extra_packages: >-
              clang
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-ruby
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Druby=enabled
            extra_packages: >-
              meson
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-ruby
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-ruby
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-ruby
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Druby=enabled
            extra_packages: >-
              meson
            exec_type: bash

          - label: Meson-cmd-x86_64-msvc-x86_64-ruby
            buildtool: meson
            runner: windows-latest
            setup_options: >-
              -Druby=enabled
            exec_type: cmd

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  ruby-coverage:
    needs: [ruby]
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - label: Autotools-ubuntu-x86_64-gcc-ruby-coverage
            buildtool: autotools
            runner: ubuntu-latest
            setup_options: >-
              --enable-ruby
            extra_packages: >-
              clang
            check_target: check-ruby
            exec_type: bash

          - label: Meson-ubuntu-x86_64-gcc-ruby-coverage
            buildtool: meson
            runner: ubuntu-latest
            setup_options: >-
              -Druby=enabled
            extra_packages: >-
              meson
            check_target: compile test-ruby
            exec_type: bash

          - label: Autotools-macos-aarch64-gcc-ruby-coverage
            buildtool: autotools
            runner: macos-latest
            setup_options: >-
              --enable-ruby
            check_target: check-ruby
            exec_type: bash

          - label: Meson-macos-aarch64-gcc-ruby-coverage
            buildtool: meson
            runner: macos-latest
            setup_options: >-
              -Druby=enabled
            extra_packages: >-
              meson
            check_target: compile test-ruby
            exec_type: bash

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Disable Spotlight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo mdutil -i off / || true
          sudo mdutil -i off /System/Volumes/Data || true

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  perl:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
