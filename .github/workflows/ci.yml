   steps:
     - name: Configure git EOL
       if: ${{ matrix.exec_type == 'cygwin' }}
       run: git config --global core.autocrlf false

     - uses: actions/checkout@v6
       with:
         fetch-depth: 1

     - name: Normalize line endings (Windows)
       if: runner.os == 'Windows'
       shell: bash
       run: |
         git config core.autocrlf false
         git reset --hard

      - name: Start VM (DragonFlyBSD)
        if: ${{ matrix.exec_type == 'dragonflybsd-vm' }}
        timeout-minutes: 30
        uses: vmactions/dragonflybsd-vm@v1
        with:
          release: ${{ matrix.version }}
          sync-time: true
          sync: nfs

      - name: Start VM (Solaris)
        if: ${{ matrix.exec_type == 'solaris-vm' }}
        timeout-minutes: 30
        uses: vmactions/solaris-vm@v1
        with:
          release: ${{ matrix.version }}
          sync-time: true
          sync: rsync

      - name: Install extra packages (Linux)
        if: ${{ runner.os == 'Linux' && matrix.exec_type == 'bash' && (matrix.extra_packages || '') != '' }}
        shell: bash
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.extra_packages }}

      - name: Install extra packages (macOS)
        if: ${{ runner.os == 'macOS' && (matrix.extra_packages || '') != '' }}
        shell: bash
        timeout-minutes: 5
        run: |
          #brew update
          brew install ${{ matrix.extra_packages }}

      - name: Install extra packages (FreeBSD)
        if: ${{ matrix.exec_type == 'cross-platform-vms' && matrix.cp_os == 'freebsd' && (matrix.extra_packages || '') != '' }}
        timeout-minutes: 15
        uses: cross-platform-actions/action@v0.30.0
        with:
          operating_system: ${{ matrix.cp_os }}
          architecture: ${{ matrix.cp_arch }}
          version: ${{ matrix.cp_version }}
          sync_files: runner-to-vm
          environment_variables: CI,GITHUB_WORKSPACE
          run: |
            #sudo pkg update -f
            sudo pkg install -y ${{ matrix.extra_packages }}

      - name: Install extra packages (NetBSD)
        if: ${{ matrix.exec_type == 'cross-platform-vms' && matrix.cp_os == 'netbsd' && (matrix.extra_packages || '') != '' }}
        timeout-minutes: 15
        uses: cross-platform-actions/action@v0.30.0
        with:
          operating_system: ${{ matrix.cp_os }}
          architecture: ${{ matrix.cp_arch }}
          version: ${{ matrix.cp_version }}
          sync_files: runner-to-vm
          environment_variables: CI,GITHUB_WORKSPACE
          run: |
            #sudo pkgin -y update
            sudo pkgin -y install ${{ matrix.extra_packages }}
            if [ -f /var/db/pkgin/pkg_install-err.log ]; then
              cp /var/db/pkgin/pkg_install-err.log "$GITHUB_WORKSPACE/pkg_install-err.log" || true
            fi

      - name: Install extra packages (OpenBSD)
        if: ${{ matrix.exec_type == 'cross-platform-vms' && matrix.cp_os == 'openbsd' && (matrix.extra_packages || '') != '' }}
        timeout-minutes: 15
        uses: cross-platform-actions/action@v0.30.0
        with:
          operating_system: ${{ matrix.cp_os }}
          architecture: ${{ matrix.cp_arch }}
          version: ${{ matrix.cp_version }}
          sync_files: runner-to-vm
          environment_variables: CI,GITHUB_WORKSPACE
          run: |
            sudo pkg_add ${{ matrix.extra_packages }}

      - name: Install extra packages (Haiku)
        if: ${{ matrix.exec_type == 'cross-platform-vms' && matrix.cp_os == 'haiku' && (matrix.extra_packages || '') != '' }}
        timeout-minutes: 15
        uses: cross-platform-actions/action@v0.30.0
        with:
          operating_system: ${{ matrix.cp_os }}
          architecture: ${{ matrix.cp_arch }}
          version: ${{ matrix.cp_version }}
          sync_files: runner-to-vm
          environment_variables: CI,GITHUB_WORKSPACE
          run: |
            pkgman refresh
            pkgman install -y ${{ matrix.extra_packages }}

      - name: Setup MSVC developer env (vcvars, x86_64 target)
        if: ${{ matrix.runner == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup MSVC developer env (vcvars, arm64 target)
        if: ${{ matrix.runner == 'windows-11-arm' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Save MSVC env:Path
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          "MSVC_PATH=$env:Path" >> $env:GITHUB_ENV

      - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
        if: ${{ (matrix.vcpkg_packages || '') != '' }}
        uses: actions/cache@v4
        with:
          path: |
            ~\vcpkg\installed
            ~\vcpkg\buildtrees
            ~\vcpkg\packages
            ~\vcpkg\downloads
          key: vcpkg-${{ runner.os }}-msvc-${{ matrix.vcpkg_packages || 'none' }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install vcpkg dependencies (MSVC, vcpkg deps)
        if: ${{ (matrix.vcpkg_packages || '') != '' }}
        shell: pwsh
        run: |
          $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
          if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
            git init $vcpkgRoot
          }
          git -C $vcpkgRoot remote remove origin 2>$null
          git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

          git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
          git -C $vcpkgRoot reset --hard FETCH_HEAD

          Set-Location $vcpkgRoot

          cmd /c bootstrap-vcpkg.bat
          $packages = @('pkgconf')
          $extra = '${{ matrix.vcpkg_packages || '' }}'.Trim()
          if ($extra -ne '') {
            $packages += $extra -split '\s+'
          }
          .\\vcpkg.exe install $packages --triplet x64-windows
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup MSYS2 (Windows)
        if: ${{ (matrix.msystem || '') != '' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          #update: true
          install: ${{ matrix.extra_packages || 'make' }}

      - name: Create junction to Git for Windows
        if: ${{ matrix.exec_type == 'gitbash' }}
        shell: pwsh
        run: |
          if (!(Test-Path 'C:\GitBash')) {
            New-Item -ItemType Junction -Path 'C:\GitBash' -Target 'C:\Program Files\Git' | Out-Null
          }
          'C:\GitBash\bin'     | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          'C:\GitBash\usr\bin' | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Setup Cygwin
        if: ${{ matrix.exec_type == 'cygwin' }}
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: ${{ matrix.extra_packages || 'make' }}

      - name: Cache Cosmopolitan toolchain
        if: ${{ contains(matrix.setup_prefix || '', 'CC=cosmocc') }}
        uses: actions/cache@v4
        with:
          path: cosmopolitan/cosmocc.zip
          key: cosmocc-${{ hashFiles('cosmopolitan/cosmocc.zip') }}

      - name: Prepare Cosmopolitan toolchain
        if: ${{ contains(matrix.setup_prefix || '', 'CC=cosmocc') }}
        shell: bash
        timeout-minutes: 5
        run: |
          set -exv
          mkdir -p cosmopolitan
          if [ ! -f cosmopolitan/cosmocc.zip ]; then
            curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
          fi
          unzip -o -q cosmopolitan/cosmocc.zip
          chmod +x bin/cosmo*

      - name: Prepare Emscripten toolchain
        if: ${{ contains(matrix.label, 'emscripten') }}
        shell: bash
        timeout-minutes: 15
        run: |
          set -exv
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          sh emsdk/emsdk install latest
          sh emsdk/emsdk activate latest
          echo "$PWD/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install pip packages
        if: ${{ (matrix.pip_packages || '') != '' }}
        shell: bash
        timeout-minutes: 5
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -U pip ${{ matrix.pip_packages }}
          if command -v cygpath; then
            echo "$(cygpath -w "$PWD/.venv/bin")" >> "$GITHUB_PATH"
          else
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Build and test (Autotools, bash)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'bash' }}
        shell: bash
        timeout-minutes: 15
        run: |
          set -exv
          export PATH="$PWD/build-aux:$PWD/bin:$PATH"
          ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
          ${{ matrix.make || 'make' }} V=1
          ${{ matrix.make || 'make' }} ${{ matrix.check_target || 'check' }}

      - name: Build and test (Meson, bash)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'bash' }}
        shell: bash
        timeout-minutes: 15
        run: |
          set -exv
          export PATH="$PWD/build-aux:$PWD/bin:$PATH"
          ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
          meson compile -C builddir -v
          meson ${{ matrix.check_target || 'test' }} -C builddir

      - name: Build and test (Autotools, msys2)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'msys2' }}
        shell: msys2 {0}
        timeout-minutes: 30
        run: |
          set -exv
          MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
          PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
          ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
          ${{ matrix.make || 'make' }} V=1
          ${{ matrix.make || 'make' }} ${{ matrix.check_target || 'check' }}

      - name: Build and test (Meson, msys2)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'msys2' }}
        shell: msys2 {0}
        timeout-minutes: 30
        run: |
          set -exv
          MSVC_BIN_PATH="$(cygpath -u -p "$MSVC_PATH")"
          PATH="$PWD/build-aux:$PWD/bin:$PATH:$MSVC_BIN_PATH"
          ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
          meson compile -C builddir -v
          meson ${{ matrix.check_target || 'test' }} -C builddir

      - name: Build and test (Autotools, Cygwin)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'cygwin' }}
        shell: C:\cygwin\bin\bash.exe -o igncr {0}
        timeout-minutes: 15
        run: |
          set -exv
          PATH="$PWD/build-aux:$PATH"
          ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
          ${{ matrix.make || 'make' }} V=1
          if grep ^ac_cv_prog_ac_ct_CC=gcc$ config.log; then
            ${{ matrix.make || 'make' }} ${{ matrix.check_target || 'check' }}
          else
            : # cross build: don't run test
          fi

      - name: Build and test (Meson, Cygwin)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'cygwin' }}
        shell: C:\cygwin\bin\bash.exe -o igncr {0}
        timeout-minutes: 15
        run: |
          set -exv
          PATH="$PWD/build-aux:$PATH"
          ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
          meson compile -C builddir -v
          if grep ^ac_cv_prog_ac_ct_CC=gcc$ config.log; then
            meson ${{ matrix.check_target || 'test' }} -C builddir
          else
            : # cross build: don't run test
          fi

      - name: Build and test (Meson, Command Prompt)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'cmd' }}
        shell: cmd
        run: |
          setlocal ENABLEDELAYEDEXPANSION
          python -m pip install --upgrade pip
          if errorlevel 1 exit /b !errorlevel!
          python -m pip install meson
          if errorlevel 1 exit /b !errorlevel!
          python -m mesonbuild.mesonmain setup builddir ${{ matrix.setup_options || '' }}
          if errorlevel 1 exit /b !errorlevel!
          python -m mesonbuild.mesonmain compile -C builddir
          if errorlevel 1 exit /b !errorlevel!
          python -m mesonbuild.mesonmain ${{ matrix.check_target || 'test' }} -C builddir
          if errorlevel 1 exit /b !errorlevel!
          endlocal

      - name: Build and test (Autotools, Alpine container)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'docker' }}
        shell: bash
        timeout-minutes: 15
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.image }} sh -euc '
            set -xve
            apk add --no-cache ${{ matrix.guest_packages || '' }}
            addgroup -g '"$(id -g)"' hostgrp 2>/dev/null || true
            adduser  -D -u '"$(id -u)"' -G hostgrp hostusr 2>/dev/null || true
            chown -R '"$(id -u):$(id -g)"' /src
            su hostusr -c "
              ./configure ${{ matrix.setup_options || '' }}
              ${{ matrix.make || 'make' }} V=1
              ${{ matrix.make || 'make' }} ${{ matrix.check_target || 'check' }}
            "
          '

      - name: Build and test (Meson, Alpine container)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'docker' }}
        shell: bash
        timeout-minutes: 15
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.image }} sh -euc '
            set -xve
            apk add --no-cache ${{ matrix.guest_packages || '' }}
            addgroup -g '"$(id -g)"' hostgrp 2>/dev/null || true
            adduser  -D -u '"$(id -u)"' -G hostgrp hostusr 2>/dev/null || true
            chown -R '"$(id -u):$(id -g)"' /src
            su hostusr -c "
              ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
              meson compile -C builddir -v
              meson test -C builddir
            "
          '

      - name: Build and test (Autotools, FreeBSD/OpenBSD/NetBSD/Haiku)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'cross-platform-vms' }}
        uses: cross-platform-actions/action@v0.30.0
        timeout-minutes: 15
        with:
          operating_system: ${{ matrix.cp_os }}
          architecture: ${{ matrix.cp_arch }}
          version: ${{ matrix.cp_version }}
#          sync_files: runner-to-vm
          environment_variables: CI,GITHUB_WORKSPACE
          run: |
            set -xv
            ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
            ${{ matrix.make || 'make' }} V=1
            ${{ matrix.make || 'make' }} ${{ matrix.check_target || 'check' }}

      - name: Build and test (Meson, FreeBSD/OpenBSD/NetBSD/Haiku)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'cross-platform-vms' }}
        timeout-minutes: 15
        uses: cross-platform-actions/action@v0.30.0
        with:
          operating_system: ${{ matrix.cp_os }}
          architecture: ${{ matrix.cp_arch }}
          version: ${{ matrix.cp_version }}
#          sync_files: runner-to-vm
          environment_variables: CI,GITHUB_WORKSPACE
          run: |
            set -xv
            ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
            meson compile -C builddir -v
            meson ${{ matrix.check_target || 'test' }} -C builddir

      - name: Build and test (Autotools, DragonFlyBSD)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'dragonflybsd-vm' }}
        timeout-minutes: 15
        uses: vmactions/dragonflybsd-vm@v1
        with:
          release: ${{ matrix.version }}
          sync-time: true
          sync: nfs
          prepare: |
            #pkg update -f
            pkg install -y ${{ matrix.extra_packages || 'gmake' }}
          run: |
            ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
            gmake V=1
            gmake ${{ matrix.check_target || 'check' }}

      - name: Configure, build, and test (Meson, DragonFlyBSD)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'dragonflybsd-vm' }}
        timeout-minutes: 15
        uses: vmactions/dragonflybsd-vm@v1
        with:
          release: ${{ matrix.version }}
          sync-time: true
          sync: rsync
          prepare: |
            #pkg update -f
            pkg install -y ${{ matrix.extra_packages || 'meson' }}
          run: |
            cd "$GITHUB_WORKSPACE"
            ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
            meson compile -C builddir
            meson ${{ matrix.check_target || 'test' }} -C builddir

      - name: Build and test (Autotools, OpenIndiana)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'openindiana-vm' }}
        timeout-minutes: 40
        uses: vmactions/openindiana-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          sync: rsync
          prepare: |
            pkg set-publisher -g http://pkg.openindiana.org/hipster/ openindiana.org
            #pkg update -f
            pkg install --accept --no-be ${{ matrix.extra_packages }}
          run: |
            cd "$GITHUB_WORKSPACE"
            ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
            ${{ matrix.make || 'gmake' }} V=1
            ${{ matrix.make || 'gmake' }} ${{ matrix.check_target || 'check' }}

      - name: Configure, build, and test (Meson, OpenIndiana)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'openindiana-vm' }}
        timeout-minutes: 40
        uses: vmactions/openindiana-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          sync: rsync
          prepare: |
            pkg set-publisher -g http://pkg.openindiana.org/hipster/ openindiana.org
            #pkg update -f
            pkg install --accept --no-be ${{ matrix.extra_packages }}
          run: |
            cd "$GITHUB_WORKSPACE"
            ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
            meson compile -C builddir
            meson ${{ matrix.check_target || 'test' }} -C builddir

      - name: Build and test (Autotools, Solaris)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'solaris-vm' }}
        timeout-minutes: 20
        uses: vmactions/solaris-vm@v1
        with:
          release: ${{ matrix.version }}
          sync-time: true
          sync: nfs
          prepare: |
            #pkg update -f
            pkg install --accept ${{ matrix.extra_packages || 'gnu-make gcc' }}
          run: |
            ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
            ${{ matrix.make || 'gmake' }} V=1
            ${{ matrix.make || 'gmake' }} ${{ matrix.check_target || 'check' }}

      - name: Configure, build, and test (Meson, Solaris)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'solaris-vm' }}
        timeout-minutes: 20
        uses: vmactions/solaris-vm@v1
        with:
          release: ${{ matrix.version }}
          sync-time: true
          sync: nfs
          prepare: |
            #pkg update -f
            pkg install --accept ${{ matrix.extra_packages || 'gnu-make gcc meson ninja' }}
          run: |
            cd "$GITHUB_WORKSPACE"
            ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
            meson compile -C builddir
            meson ${{ matrix.check_target || 'test' }} -C builddir

      - name: Build and test (Autotools, OmniOS)
        if: ${{ matrix.buildtool == 'autotools' && matrix.exec_type == 'omnios-vm' }}
        timeout-minutes: 20
        uses: vmactions/omnios-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          sync: rsync
          prepare: |
            #pkg update -f
            pkg install --accept ${{ matrix.extra_packages || 'developer/gcc13 developer/build/gnu-make' }}
          run: |
            cd "$GITHUB_WORKSPACE"
            ${{ matrix.setup_prefix || '' }} ./configure ${{ matrix.setup_options || '' }}
            ${{ matrix.make || 'gmake' }} V=1
            ${{ matrix.make || 'gmake' }} ${{ matrix.check_target || 'check' }}

      - name: Configure, build, and test (Meson, OmniOS)
        if: ${{ matrix.buildtool == 'meson' && matrix.exec_type == 'omnios-vm' }}
        timeout-minutes: 20
        uses: vmactions/omnios-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          sync: rsync
          prepare: |
            #pkg update -f
            pkg install --accept ${{ matrix.extra_packages || 'developer/build/gnu-make' }}
          run: |
            cd "$GITHUB_WORKSPACE"
            export PATH="$HOME/.local/bin:$PATH"
            python3 -m pip install --user --upgrade pip meson ninja
            ${{ matrix.setup_prefix || '' }} meson setup builddir ${{ matrix.setup_options || '' }}
            meson compile -C builddir
            meson ${{ matrix.check_target || 'test' }} -C builddir

#      - name: Capture coverage (Windows, CLANG64)
#        if: ${{ matrix.exec_type == 'msys2' && matrix.msystem == 'CLANG64' }}
#        shell: msys2 {0}
#        timeout-minutes: 15
#        run: |
#          LLVM_PROFILE_FILE="%p-%m.profraw" make check
#          find . -name \*.profraw || true
#          llvm-profdata merge -sparse coverage/*.profraw -o coverage/coverage.profdata || true
#          find . -type f \( -name '*.exe' -o -name '*.dll' \) |
#          xargs llvm-cov export -format=lcov \
#            -instr-profile=coverage/coverage.profdata > coverage.info || true

      - name: Capture coverage
        if: ${{ always() && contains(fromJson('["--enable-gcov", "-Db_coverage"]'), matrix.setup_options || '') && matrix.exec_type == 'bash' }}
        shell: bash
        timeout-minutes: 5
        run: |
          if test -f coverage.info; then
            echo "coverage.info already exists; skipping capture"
            exit 0
          fi
          if command -v gcovr >/dev/null 2>&1; then
            gcovr -r . --lcov -o coverage.info \
              --gcov-executable gcov-14 || true
          elif command -v lcov >/dev/null 2>&1; then
            lcov -c \
              -d "$PWD/src" \
              -d "$PWD/src/.libs" \
              -d "$PWD/converters" \
              -d "$PWD/tests/cli" \
              -d "$PWD/tests/loader" \
              -d "$PWD/tests/filter" \
              -d "$PWD/tests/probe" \
              -d "$PWD/tests/palette" \
              --rc branch_coverage=1 \
              -o coverage.info || true
          else
            echo "No gcovr or lcov found; skipping coverage capture"
          fi

      - name: Capture coverage (Windows)
        if: ${{ always() && contains(fromJson('["--enable-gcov", "-Db_coverage"]'), matrix.setup_options || '') && matrix.exec_type == 'msys2' }}
        shell: msys2 {0}
        timeout-minutes: 5
        run: |
          set -exv
          if [ -e coverage.info ]; then
            echo "coverage.info already exists; skipping capture"
            exit 0
          fi
          if command -v gcovr >/dev/null 2>&1; then
            gcovr -r . --lcov -o coverage.info
            cat coverage.info
          elif command -v lcov >/dev/null 2>&1; then
            lcov -c \
              -d "src/.libs" \
              -d "converters" \
              -d "tests/cli" \
              -d "tests/loader" \
              -d "tests/filter" \
              -d "tests/probe" \
              -d "tests/palette" \
              --rc branch_coverage=1 \
              -o coverage.info
            sed -i "s#^SF:$PWD/#SF:#" coverage.info
            cat coverage.info
          else
            echo "No gcovr or lcov found; skipping coverage capture"
          fi

      - name: Fetch BSD artifacts from VM
        if: ${{ always() && matrix.exec_type == 'cross-platform-vms' }}
        shell: bash
        timeout-minutes: 5
        run: |
          if [ "${{ matrix.cp_os }}" = "haiku" ]; then
            vm_workspace="/boot/home${GITHUB_WORKSPACE}"
            user=user
          else
            vm_workspace="${GITHUB_WORKSPACE}"
            user=runner
          fi
          ssh "${user}"@cross_platform_actions_host bash -c 'cd '"${vm_workspace}"' && find . -type f "(" -name "*.log" -o -name "*.trs" -o -name "*.info" ")" -exec tar cvzf /tmp/artifacts.tar.gz {} +' || true
          scp "${user}"@cross_platform_actions_host:/tmp/artifacts.tar.gz . || true
          tar xvzf artifacts.tar.gz || true

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            **/test-suite.log
            **/*.log
            **/*.trs
            **/_artifacts/**
            coverage.info
            pkg_install-err.log
            **/artifacts.tar.gz
            builddir/meson-dist/**
            builddir/meson-logs/**
            builddir/**/_artifacts/**
            builddir/**/testlog.txt
            builddir/**/*.log
          if-no-files-found: warn
          overwrite: true

      - name: Upload to Coveralls (per-flag, parallel)
        id: coveralls_upload
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        if: ${{ hashFiles('coverage.info') != '' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.info
          flag-name: ${{ matrix.label }}
          parallel: true

      - name: Wait before Coveralls retry (per-flag)
        if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
        run: sleep 5

      - name: Upload to Coveralls (per-flag, retry)
        if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.info
          flag-name: ${{ matrix.label }}
          parallel: true

  ci-finish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Finalize Coveralls
        id: coveralls_finalize
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

      - name: Wait before Coveralls retry (finalize)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        run: sleep 5

      - name: Finalize Coveralls (retry)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

