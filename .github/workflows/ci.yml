    - name: Configure, build, and test (Meson, Windows, MSVC, vcpkg libjpeg)
      if: ${{ runner.os == 'Windows' && matrix.compiler == 'cl' && matrix.vcpkg_libjpeg == true }}
      shell: cmd
      run: |
        setlocal ENABLEDELAYEDEXPANSION
