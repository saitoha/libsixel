        set "AMALGAMATED_LIB_FLAG="
        if "${{ matrix.amalgamated_lib || '' }}"=="true" set "AMALGAMATED_LIB_FLAG=-Damalgamated_lib=true"
        python -m mesonbuild.mesonmain setup builddir ^
            --wrap-mode=nodownload ^
