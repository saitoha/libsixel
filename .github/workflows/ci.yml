        python -m pip install --upgrade pip
        python -m pip install meson ninja
        set "PKG_CONFIG=%VCPKG_ROOT%\installed\x64-windows\tools\pkgconf\pkgconf.exe"
        set "PKG_CONFIG_PATH=%VCPKG_ROOT%\installed\x64-windows\lib\pkgconfig"
        set "PATH=%VCPKG_ROOT%\installed\x64-windows\bin;%PATH%"
        set "DISABLE_THREADS_FLAG="
        if "${{ matrix.disable_threads || '' }}"=="true" set "DISABLE_THREADS_FLAG=-Dthreads=disabled"
        set "DISABLE_TOOLS_FLAGS="
        if "${{ matrix.disable_tools || '' }}"=="true" set "DISABLE_TOOLS_FLAGS=-Dimg2sixel=disabled -Dsixel2png=disabled"
        set "DISABLE_SIMD_FLAG="
        if "${{ matrix.disable_simd || '' }}"=="true" set "DISABLE_SIMD_FLAG=-Dsimd=disabled"
        set "UNITY_FLAG="
        if "${{ matrix.unity || '' }}"=="true" set "UNITY_FLAG=-Dunity=on"
        set "AMALGAMATED_LIB_FLAG="
        if "${{ matrix.amalgamated_lib || '' }}"=="true" set "AMALGAMATED_LIB_FLAG=-Damalgamated_lib=true"
        python -m mesonbuild.mesonmain setup builddir ^
            --wrap-mode=nodownload ^
            --default-library shared ^
            -Dbashcompletiondir=disabled ^
            -Dzshcompletiondir=disabled ^
            -Dpython=disabled ^
            -Dtests=true ^
            -Dcurl=disabled ^
            -Dpng=disabled ^
            -Djpeg=enabled ^
            %AMALGAMATED_LIB_FLAG% ^
            %DISABLE_TOOLS_FLAGS% ^
            %DISABLE_THREADS_FLAG% ^
            %DISABLE_SIMD_FLAG% ^
            %UNITY_FLAG%
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain compile -C builddir
        if errorlevel 1 exit /b !errorlevel!
        python -m mesonbuild.mesonmain test -C builddir -v
        if errorlevel 1 (
            if exist builddir\meson-logs\testlog.txt type builddir\meson-logs\testlog.txt
            exit /b !errorlevel!
        )
        endlocal

    - name: Fix artifact permissions (Meson Alpine container)
      if: ${{ matrix.variant == 'alpine' && always() }}
      run: |
        set -eux
        for dir in builddir _artifacts; do
          if [ -e "$dir" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$dir"
            sudo find "$dir" -type d -exec chmod u+rwx,go+rx {} +
            sudo find "$dir" -type f -exec chmod u+rw,go+r {} +
          fi
        done

    - name: Upload meson artifacts
      if: always() && !contains(fromJson('["freebsd","openbsd","netbsd"]'), matrix.platform || '')
      uses: actions/upload-artifact@v4
      with:
        name: meson-${{ matrix.os }}-${{ matrix.sys || 'native' }}-${{ matrix.compiler || 'default' }}-${{ matrix.variant || 'default' }}
        path: |
          builddir/meson-logs/**
          builddir/**/_artifacts/**
          builddir/**/testlog.txt
          builddir/**/*.log
        if-no-files-found: warn
        overwrite: true

