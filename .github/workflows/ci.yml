name: libsixel CI (build & test)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16

jobs:
  ci-autotools:
    name: Autotools ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      matrix:
        include:
          - label: freebsd-14.3-x86_64
            os: ubuntu-latest
            runner: ubuntu-latest
            cp_os: freebsd
            cp_arch: x86-64
            cp_version: '14.3'
            exec_type: cross-platform-vms
          - label: freebsd-14.3-x86_64-amalgamated-lib
            os: ubuntu-latest
            runner: ubuntu-latest
            cp_os: freebsd
            cp_arch: x86-64
            cp_version: '14.3'
            extra_options: '--enable-amalgamated-lib'
            exec_type: cross-platform-vms
          - label: freebsd-14.3-aarch64
            os: ubuntu-latest
            runner: ubuntu-latest
            cp_os: freebsd
            cp_arch: arm64
            cp_version: '14.3'
            exec_type: cross-platform-vms
          - label: netbsd-10.1-x86_64
            os: ubuntu-latest
            runner: ubuntu-latest
            cp_os: netbsd
            cp_arch: x86-64
            cp_version: '10.1'
            exec_type: cross-platform-vms
          - label: haiku-r1beta5-x86-64
            os: ubuntu-latest
            runner: ubuntu-latest
            cp_os: haiku
            cp_arch: x86-64
            cp_version: r1beta5
            exec_type: cross-platform-vms
          - label: openbsd-7.8-x86-64
            os: ubuntu-latest
            runner: ubuntu-latest
            cp_os: openbsd
            cp_arch: x86-64
            cp_version: '7.8'
            exec_type: cross-platform-vms
          - label: dragonflybsd-6.4.2-x86-64
            os: ubuntu-latest
            runner: ubuntu-latest
            exec_type: dragonflybsd-vm
          - label: alpine-3.20-x86_64
            os: ubuntu-latest
            runner: ubuntu-latest
            exec_type: alpine
          - label: ubuntu-x86_64-ASan
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
              --without-png
              --without-jpeg
            extra_packages: clang
          - label: ubuntu-x86_64-ASan-libpng-libjpeg
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
              --with-png
              --with-jpeg
            extra_packages: >-
              clang
              libpng-dev
              libjpeg-dev
          - label: ubuntu-x86_64-ASan-gdk-pixbuf2
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
              --without-png
              --without-jpeg
              --with-gdk-pixbuf2
            extra_packages: >-
              clang
              libgdk-pixbuf2.0-dev
          - label: ubuntu-x86_64-ASan-GD
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
              --without-png
              --without-jpeg
              --with-gd
            extra_packages: >-
              clang
              libgd-dev
          - label: ubuntu-x86_64-static-only
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-shared
              --enable-static
            extra_packages: gcc-14
          - label: ubuntu-x86_64-no-simd
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-simd
            extra_packages: gcc-14
            pip_packages: gcovr
          - label: ubuntu-x86_64-no-tools
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              --disable-img2sixel
              --disable-sixel2png
          - label: ubuntu-x86_64-no-threads
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            extra_options: >-
              CC=gcc-14
              --enable-gcov
              --disable-threads
            extra_packages: gcc-14
            pip_packages: gcovr
          - label: ubuntu-x86_64-musl
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: x86_64
            musl: true
            extra_options: >-
              CC=musl-gcc
            extra_packages: musl-tools
          - label: ubuntu-24.04-aarch64-distcheck
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            sys: aarch64
            check_target: distcheck
          - label: ubuntu-24.04-aarch64-amalgamated-lib
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            sys: aarch64
            extra_options: >-
              CC=gcc-14
              --enable-amalgamated-lib
            extra_packages: gcc-14
          - label: ubuntu-i686
            os: ubuntu-latest
            runner: ubuntu-latest
            sys: i686
            extra_options: >-
              CC=gcc
              CFLAGS="-m32"
              LDFLAGS="-m32"
              PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig
              PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            extra_packages: gcc-multilib
          - label: macos-aarch64-distcheck
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            extra_options: >-
              --enable-gcov
            extra_packages: lcov
            check_target: distcheck
          - label: macos-aarch64-ASan-gdk-pixbuf2
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
              --without-png
              --without-jpeg
              --with-gdk-pixbuf2
            extra_packages: >-
              gdk-pixbuf
          - label: macos-aarch64-ASan-GD
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
              --without-png
              --without-jpeg
              --with-gd
            extra_packages: >-
              gd
          - label: macos-aarch64-amalgamated-lib
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            extra_options: >-
              --enable-amalgamated-lib
          - label: macos-x86_64
            os: macos-15
            runner: macos-15
            sys: x86_64
            extra_options: >-
              --enable-gcov
            extra_packages: lcov
          - label: macos-x86_64-amalgamated-lib
            os: macos-15
            runner: macos-15
            sys: x86_64
            extra_options: >-
              --enable-amalgamated-lib
          - label: cosmopolitan-ubuntu-24.04-aarch64
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            sys: aarch64
            cosmopolitan: true
            exec_type: cosmopolitan
          - label: cosmopolitan-macos-aarch64
            os: macos-latest
            runner: macos-latest
            sys: aarch64
            cosmopolitan: true
            exec_type: cosmopolitan
          - label: emscripten-ubuntu-24.04-aarch64
            os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            emscripten: true
            exec_type: emscripten
          - label: emscripten-macos-aarch64
            os: macos-latest
            runner: macos-latest
            emscripten: true
            exec_type: emscripten
          - label: mingw64-static
            os: windows-latest
            runner: windows-latest
            sys: MINGW64
            extra_options: >-
              --disable-shared
              --enable-static
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: mingw64-no-simd
            os: windows-latest
            runner: windows-latest
            sys: MINGW64
            extra_options: >-
              --disable-simd
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: mingw64-no-tools
            os: windows-latest
            runner: windows-latest
            sys: MINGW64
            extra_options: >-
              --disable-img2sixel
              --disable-sixel2png
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
          - label: mingw64-no-threads
            os: windows-latest
            runner: windows-latest
            sys: MINGW64
            extra_options: >-
              --disable-threads
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-lcov
          - label: ucrt64
            os: windows-latest
            runner: windows-latest
            sys: UCRT64
            extra_options: >-
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
          - label: ucrt64-amalgamated-lib
            os: windows-latest
            runner: windows-latest
            sys: UCRT64
            extra_options: >-
              --enable-amalgamated-lib
            extra_packages: >-
              make
              mingw-w64-ucrt-x86_64-toolchain
              mingw-w64-ucrt-x86_64-lcov
          - label: clang64
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            extra_options: >-
              CC=clang
              --enable-gcov
            extra_packages: >-
              make
              mingw-w64-clang-x86_64-toolchain
              mingw-w64-clang-x86_64-lcov
          - label: clang64-ASan
            os: windows-latest
            runner: windows-latest
            sys: CLANG64
            extra_options: >-
              CC=clang
              CFLAGS="-fsanitize=address -O1 -g -fno-omit-frame-pointer"
              LDFLAGS="-fsanitize=address"
            extra_packages: >-
              make
              pkgconf
              mingw-w64-clang-x86_64-toolchain
          - label: clang-cl
            os: windows-latest
            runner: windows-latest
            sys: MSVC
            extra_options: >-
              CC=clang-cl
              LD=link
              AR="sh ar-lib lib"
              ARFLAGS=cr
              NM="dumpbin -symbols"
              STRIP=:
              RANLIB=:
              --host=x86_64-pc-windows-msvc
            extra_packages: make
            exec_type: msvc
          - label: msvc
            os: windows-latest
            runner: windows-latest
            sys: MSVC
            extra_options: >-
              CC=cl
              LD=link
              AR="sh ar-lib lib"
              ARFLAGS=cr
              NM="dumpbin -symbols"
              STRIP=:
              RANLIB=:
              --host=x86_64-pc-windows-msvc
            extra_packages: make
            exec_type: msvc
          - label: msvc-amalgamated-lib
            os: windows-latest
            runner: windows-latest
            sys: MSVC
            extra_options: >-
              CC=cl
              LD=link
              AR="sh ar-lib lib"
              ARFLAGS=cr
              NM="dumpbin -symbols"
              STRIP=:
              RANLIB=:
              --host=x86_64-pc-windows-msvc
              --enable-amalgamated-lib
            extra_packages: make
            exec_type: msvc
          - label: msvc-vcpkg-libpng
            os: windows-latest
            runner: windows-latest
            sys: MSVC
            extra_options: >-
              CC=cl
              LD=link
              AR="sh ar-lib lib"
              ARFLAGS=cr
              NM="dumpbin -symbols"
              STRIP=:
              RANLIB=:
              --host=x86_64-pc-windows-msvc
            extra_packages: make
            vcpkg_packages: libpng
            exec_type: msvc
          - label: msvc-vcpkg-libjpeg
            os: windows-latest
            runner: windows-latest
            sys: MSVC
            extra_options: >-
              CC=cl
              LD=link
              AR="sh ar-lib lib"
              ARFLAGS=cr
              NM="dumpbin -symbols"
              STRIP=:
              RANLIB=:
              --host=x86_64-pc-windows-msvc
            extra_packages: make
            vcpkg_packages: libjpeg-turbo
            exec_type: msvc
          - label: mingw32
            os: windows-latest
            runner: windows-latest
            sys: MINGW32
            extra_packages: >-
              make
              mingw-w64-i686-toolchain
          - label: msys
            os: windows-latest
            runner: windows-latest
            sys: MSYS
            extra_options: >-
              --enable-gcov
            extra_packages: >-
              make
              gcc
              pkgconf
              python-pip
              lcov
          - label: cosmopolitan-msys
            os: windows-latest
            runner: windows-latest
            sys: MSYS
            cosmopolitan: true
            extra_packages: >-
              unzip
              make
            exec_type: cosmopolitan
          - label: cygwin
            os: windows-latest
            runner: windows-latest
            sys: CYGWIN
            exec_type: cygwin
          - label: cygwin-amalgamated-lib
            os: windows-latest
            runner: windows-latest
            sys: CYGWIN
            extra_options: >-
              --enable-amalgamated-lib
            exec_type: cygwin

    steps:
    - name: Configure git EOL
      if: ${{ (matrix.exec_type || '') == 'cygwin' }}
      run: git config --global core.autocrlf false

    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Normalize line endings (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config core.autocrlf false
        git reset --hard

    - name: Install extra packages (Linux)
      if: ${{ runner.os == 'Linux' && (matrix.extra_packages || '') != '' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.extra_packages }}

    - name: Install extra packages (macOS)
      if: ${{ runner.os == 'macOS' && (matrix.extra_packages || '') != '' }}
      shell: bash
      run: |
        brew update
        brew install ${{ matrix.extra_packages }}

    - name: Setup MSVC developer env (vcvars)
      if: ${{ runner.os == 'Windows' && matrix.sys == 'MSVC' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg artifacts (MSVC, vcpkg deps)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_packages || '') != '' }}
      uses: actions/cache@v4
      with:
        path: |
          ~\vcpkg\installed
          ~\vcpkg\buildtrees
          ~\vcpkg\packages
          ~\vcpkg\downloads
        key: vcpkg-${{ runner.os }}-msvc-${{ matrix.vcpkg_packages || 'none' }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install vcpkg dependencies (MSVC, vcpkg deps)
      if: ${{ runner.os == 'Windows' && (matrix.vcpkg_packages || '') != '' }}
      shell: pwsh
      run: |
        $vcpkgRoot = "$env:USERPROFILE\\vcpkg"
        if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
          git init $vcpkgRoot
        }
        git -C $vcpkgRoot remote remove origin 2>$null
        git -C $vcpkgRoot remote add origin https://github.com/microsoft/vcpkg

        git -C $vcpkgRoot fetch --depth 1 origin "${{ env.VCPKG_REF }}"
        git -C $vcpkgRoot reset --hard FETCH_HEAD

        Set-Location $vcpkgRoot

        cmd /c bootstrap-vcpkg.bat
        $packages = @('pkgconf')
        $extra = '${{ matrix.vcpkg_packages || '' }}'.Trim()
        if ($extra -ne '') {
          $packages += $extra -split '\s+'
        }
        .\\vcpkg.exe install $packages --triplet x64-windows
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows' && matrix.sys != 'CYGWIN'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys == 'MSVC' && 'MSYS' || matrix.sys }}
        update: true
        install: ${{ matrix.extra_packages || 'make' }}

    - name: Setup Cygwin
      if: ${{ (matrix.exec_type || '') == 'cygwin' }}
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: gcc-core,make,python3

    - name: Cache Cosmopolitan toolchain
      if: ${{ (matrix.exec_type || '') == 'cosmopolitan' }}
      uses: actions/cache@v4
      with:
        path: cosmopolitan/cosmocc.zip
        key: cosmocc-${{ runner.os }}-${{ matrix.sys || 'native' }}-${{ hashFiles('cosmopolitan/build-cosmocc.sh') }}

    - name: Prepare Cosmopolitan toolchain (non-Windows)
      if: ${{ (matrix.exec_type || '') == 'cosmopolitan' && runner.os != 'Windows' }}
      shell: bash
      run: |
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -d cosmopolitan cosmopolitan/cosmocc.zip
        chmod +x cosmopolitan/bin/cosmo*

    - name: Prepare Cosmopolitan toolchain (Windows, MSYS2)
      if: ${{ (matrix.exec_type || '') == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys != 'CYGWIN' }}
      shell: msys2 {0}
      run: |
        mkdir -p cosmopolitan
        if [ ! -f cosmopolitan/cosmocc.zip ]; then
          curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip
        fi
        unzip -o -d cosmopolitan cosmopolitan/cosmocc.zip
        chmod +x cosmopolitan/bin/cosmo*

    - name: Prepare Cosmopolitan toolchain (Windows, Cygwin)
      if: ${{ (matrix.exec_type || '') == 'cygwin/cosmopolitan' }}
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\\cygwin'
        $env:PATH = "$cygwinRoot\bin;$env:PATH"
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          "cd `"$workspace`"",
          'mkdir -p cosmopolitan',
          'if [ ! -f cosmopolitan/cosmocc.zip ]; then curl -L -o cosmopolitan/cosmocc.zip https://cosmo.zip/pub/cosmocc/cosmocc.zip; fi',
          'unzip -o -d cosmopolitan cosmopolitan/cosmocc.zip',
          'chmod +x cosmopolitan/bin/cosmo*'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Install pip packages
      if: ${{ (matrix.pip_packages || '') != '' }}
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install -U pip ${{ matrix.pip_packages }}
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

    - name: Configure and build (DragonFlyBSD)
      if: ${{ (matrix.exec_type || '') == 'dragonflybsd-vm' }}
      timeout-minutes: 30
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: 6.4.2
        usesh: true
        copyback: false
        run: |
          artifact_dir="${GITHUB_WORKSPACE}/_artifacts"
          artifact_tar="${GITHUB_WORKSPACE}/_artifacts/artifacts.tar.gz"
          collect_logs() {
            status=$?
            cd "$GITHUB_WORKSPACE"
            mkdir -p "$artifact_dir"
            find . -type f \( -name '*.log' -o -name '*.trs' -o -name '*.info' \) -exec tar czf "$artifact_tar" {} +
            exit "$status"
          }
          trap 'collect_logs' EXIT
          pkg update -f
          pkg install -y gmake pkgconf
          cd "$GITHUB_WORKSPACE"
          ./configure \
            ${{ matrix.extra_options || '' }}
          gmake V=1
          gmake ${{ matrix.check_target || 'check' }}

    - name: Fetch DragonFlyBSD artifacts from VM (Autotools)
      if: ${{ (matrix.exec_type || '') == 'dragonflybsd-vm' }}
      run: |
        mkdir -p "${GITHUB_WORKSPACE}/_artifacts"
        remote_tar="${GITHUB_WORKSPACE}/_artifacts/artifacts.tar.gz"
        if ssh cross_platform_actions_host "test -f \"${remote_tar}\""; then
          scp cross_platform_actions_host:"${remote_tar}" "${GITHUB_WORKSPACE}/_artifacts/"
        else
          echo "No artifact archive found on VM; skipping copy" >&2
        fi

    - name: Configure and build (non-Windows)
      if: ${{ (matrix.exec_type || '') == '' && runner.os != 'Windows' }}
      shell: bash
      run: |
        ./configure \
          ${{ matrix.extra_options || '' }}
        make V=1
        make ${{ matrix.check_target || 'check' }}

    - name: Configure and build (Windows, not MSVC/Cygwin)
      if: ${{ (matrix.exec_type || '') == '' && runner.os == 'Windows' && matrix.sys != 'CYGWIN' }}
      shell: msys2 {0}
      run: |
        ./configure \
          ${{ matrix.extra_options || '' }}
        make V=1
        make ${{ matrix.check_target || 'check' }}

#    - name: Configure and build (Windows, Cygwin)
#      if: ${{ (matrix.exec_type || '') == '' && runner.os == 'Windows' && matrix.sys == 'CYGWIN' }}
#      shell: pwsh
#      run: |
#        $cygwinRoot = 'C:\cygwin'
#        $env:PATH = "$cygwinRoot\bin;$env:PATH"
#        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
#        $scriptLines = @(
#          "export GITHUB_WORKSPACE=`"$workspace`"",
#          "cd `"$workspace`"",
#          "./configure ${{ matrix.extra_options || '' }}",
#          'make V=1',
#          'make check'
#        )
#        $script = [string]::Join("`n", $scriptLines)
#        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure and build (Windows, Cygwin)
      if: ${{ (matrix.exec_type || '') == 'cygwin' }}
      shell: C:\cygwin\bin\bash.exe -o igncr {0}
      run: |
        set -xv
        pwd
        cd "$(cygpath -u "$GITHUB_WORKSPACE")"
        ./configure ${{ matrix.extra_options || '' }}
        make V=1
        make check

    - name: Build with Emscripten (non-Windows)
      if: ${{ (matrix.exec_type || '') == 'emscripten' && runner.os != 'Windows' }}
      run: |
        ./emscripten/build-emcc.sh

    - name: Build with Emscripten (Windows)
      if: ${{ (matrix.exec_type || '') == 'emscripten' && runner.os == 'Windows' }}
      shell: msys2 {0}
      run: |
        ./emscripten/build-emcc.sh

    - name: Configure and build (Autotools, Alpine container)
      if: ${{ (matrix.exec_type || '') == 'alpine' }}
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:3.20 sh -euc '
          apk add --no-cache \
            autoconf \
            automake \
            bash \
            build-base \
            coreutils \
            curl-dev \
            findutils \
            libjpeg-turbo-dev \
            libpng-dev \
            libtool \
            pkgconf \
            zlib-dev
            ./configure ${{ matrix.extra_options || '' }}
          make V=1
          make ${{ matrix.check_target || 'check' }}
        '

    - name: Configure and build, and run tests (Windows, MSVC)
      if: ${{ (matrix.exec_type || '') == 'msvc' }}
      shell: msys2 {0}
      run: |
        VCVARS="$(cygpath -w "$VSINSTALLDIR")\\VC\\Auxiliary\\Build\\vcvarsall.bat"
        cmd //c call "${VCVARS}" x64 \>nul \&\& set
        eval $(
            cmd //c call "${VCVARS}" x64 \>nul \&\& set |
            grep -i '^\(PATH\|INCLUDE\|LIB\|LIBPATH\)'  |
            while IFS== read -r key val; do
                case "$key" in PATH|Path)
                    echo export PATH=\"$(echo "$val" | tr \; \\n | while read -r p; do cygpath "$p"; done | grep ^/ | tr \\n :)\"\;
                    ;;
                *)
                    echo export "$key"=\""$val"\"\;
                    ;;
                esac;
            done
        )
        PATH="$(pwd)/build-aux:$PATH"
        ./configure \
          ${{ matrix.extra_options || '' }}
        make V=1
        make ${{ matrix.check_target || 'check' }}

    - name: Configure and build, and run tests (Cosmopolitan, non-Windows)
      if: ${{ (matrix.exec_type || '') == 'cosmopolitan' && runner.os != 'Windows' }}
      shell: bash
      run: |
        export PATH="$PWD/cosmopolitan/bin:$PATH"
        builddir="$PWD/cosmopolitan/build"
        mkdir -p "$builddir"
        cd "$builddir"
        ../../configure \
          --enable-simd \
          --disable-shared \
          --enable-static \
          --without-png \
          --without-jpeg \
          --without-libcurl \
          --without-onnxruntime \
          --disable-wiccodec \
          --disable-appkit \
          --without-coregraphics \
          --disable-quicklook-extension \
          --disable-quicklook-preview \
          CC=cosmocc \
          LD=cosmocc \
          AR=cosmoar \
          RANLIB=cosmoranlib \
          INSTALL=cosmoinstall
        make V=1
        make ${{ matrix.check_target || 'check' }}

    - name: Configure and build, and run tests (Cosmopolitan, Windows MinGW)
      if: ${{ (matrix.exec_type || '') == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys != 'CYGWIN' }}
      shell: msys2 {0}
      run: |
        export PATH="$PWD/cosmopolitan/bin:$PATH"
        builddir="$PWD/cosmopolitan/build"
        mkdir -p "$builddir"
        cd "$builddir"
        ../../configure \
          --enable-simd \
          --disable-shared \
          --enable-static \
          --without-png \
          --without-jpeg \
          --without-libcurl \
          --without-onnxruntime \
          --disable-wiccodec \
          --disable-appkit \
          --without-coregraphics \
          --disable-quicklook-extension \
          --disable-quicklook-preview \
          CC=cosmocc \
          LD=cosmocc \
          AR=cosmoar \
          RANLIB=cosmoranlib \
          INSTALL=cosmoinstall
        make V=1
        make ${{ matrix.check_target || 'check' }}

    - name: Configure and build, and run tests (Cosmopolitan, Cygwin)
      if: ${{ (matrix.exec_type || '') == 'cosmopolitan' && runner.os == 'Windows' && matrix.sys == 'CYGWIN' }}
      shell: pwsh
      run: |
        $cygwinRoot = 'C:\\cygwin'
        $env:PATH = "$cygwinRoot\bin;$env:PATH"
        $workspace = &"$cygwinRoot\bin\cygpath.exe" -u $env:GITHUB_WORKSPACE
        $scriptLines = @(
          "export PATH=`"$workspace/cosmopolitan/bin:`$PATH`"",
          "cd `"$workspace/cosmopolitan`"",
          'mkdir -p build',
          'cd build',
          '../../configure --enable-simd --disable-shared --enable-static --without-png --without-jpeg --without-libcurl --without-onnxruntime --disable-wiccodec --disable-appkit --without-coregraphics --disable-quicklook-extension --disable-quicklook-preview CC=cosmocc LD=cosmocc AR=cosmoar RANLIB=cosmoranlib INSTALL=cosmoinstall --host=x86_64-unknown-cosmo CFLAGS="-nostdlib -nostartfiles -nodefaultlibs -ffreestanding"',
          'make V=1',
          'make check'
        )
        $script = [string]::Join("`n", $scriptLines)
        &"$cygwinRoot\bin\bash.exe" --login -c $script

    - name: Configure, build, and run tests (FreeBSD/OpenBSD/NetBSD/Haiku)
      if: ${{ (matrix.exec_type || '') == 'cross-platform-vms' }}
      timeout-minutes: 30
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: ${{ matrix.cp_os }}
        architecture: ${{ matrix.cp_arch }}
        version: ${{ matrix.cp_version }}
        sync_files: runner-to-vm
        environment_variables: CI,GITHUB_WORKSPACE
        run: |
          : "${GITHUB_WORKSPACE:=$PWD}"

          artifact_dir="${GITHUB_WORKSPACE}/_artifacts"
          artifact_tar="${GITHUB_WORKSPACE}/_artifacts/artifacts.tar.gz"
          collect_logs() {
            status=$?
            cd "$GITHUB_WORKSPACE"
            mkdir -p "$artifact_dir"
            find . -type f \( -name '*.log' -o -name '*.trs' -o -name '*.info' \) -exec tar czf "$artifact_tar" {} +
            exit "$status"
          }
          trap 'collect_logs' EXIT

          pkg_prefix=""
          if [ "$(id -u)" -ne 0 ]; then
            if command -v sudo >/dev/null 2>&1; then
              pkg_prefix="sudo"
            elif command -v doas >/dev/null 2>&1; then
              pkg_prefix="doas"
            else
              echo "No privilege escalation helper available" >&2
              exit 1
            fi
          fi

          make_cmd="gmake"
          if command -v pkg; then
            ${pkg_prefix:+$pkg_prefix }pkg update -f
            ${pkg_prefix:+$pkg_prefix }pkg install -y \
              gmake \
              # pkgconf avoided to reduce fragile package installs
            :
          elif command -v pkgin; then
            ${pkg_prefix:+$pkg_prefix }pkgin -y update
            ${pkg_prefix:+$pkg_prefix }pkgin -y install \
              gmake
            if [ -f /var/db/pkgin/pkg_install-err.log ]; then
              cp /var/db/pkgin/pkg_install-err.log "$GITHUB_WORKSPACE/pkg_install-err.log" || true
            fi
          elif command -v pkg_add; then
            ${pkg_prefix:+$pkg_prefix }pkg_add \
              gmake \
              rsync \
              # pkgconf avoided to reduce fragile package installs
            :
          else
            pkgman refresh
            pkgman install -y make
            make_cmd="make"
          fi

          ./configure \
            ${{ matrix.extra_options || '' }}
          ${make_cmd} V=1
          ${make_cmd} ${{ matrix.check_target || 'check' }}

    - name: Fetch BSD artifacts from VM (Autotools)
      if: ${{ always() && (matrix.exec_type || '') == 'cross-platform-vms' }}
      run: |
        mkdir -p "${GITHUB_WORKSPACE}/_artifacts"
        remote_tar="${GITHUB_WORKSPACE}/_artifacts/artifacts.tar.gz"
        if ssh cross_platform_actions_host "test -f \"${remote_tar}\""; then
          scp cross_platform_actions_host:"${remote_tar}" "${GITHUB_WORKSPACE}/_artifacts/"
        else
          echo "No artifact archive found on VM; skipping copy" >&2
        fi

    - name: Capture coverage (Windows, CLANG64)
      if: ${{ (matrix.exec_type || '') == '' && matrix.sys == 'CLANG64' }}
      shell: msys2 {0}
      run: |
        LLVM_PROFILE_FILE="%p-%m.profraw" make check V=1
        find . -name \*.profraw || true
        llvm-profdata merge -sparse coverage/*.profraw -o coverage/coverage.profdata || true
        find . -type f \( -name '*.exe' -o -name '*.dll' \) |
        xargs llvm-cov export -format=lcov \
          -instr-profile=coverage/coverage.profdata > coverage.info || true

    - name: Capture coverage
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if test -f coverage.info; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        if command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info \
            --gcov-executable gcov-14 || true
        elif command -v lcov >/dev/null 2>&1; then
          lcov -c \
            -d "$PWD/src" \
            -d "$PWD/src/.libs" \
            -d "$PWD/converters" \
            -d "$PWD/tests/cli" \
            -d "$PWD/tests/loader" \
            -d "$PWD/tests/filter" \
            -d "$PWD/tests/probe" \
            -d "$PWD/tests/palette" \
            --rc branch_coverage=1 \
            -o coverage.info || true
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi

    - name: Capture coverage (Windows)
      if: runner.os == 'Windows' && matrix.sys != 'CYGWIN'
      shell: msys2 {0}
      run: |
        if [ -e coverage.info ]; then
          echo "coverage.info already exists; skipping capture"
          exit 0
        fi
        if command -v gcovr >/dev/null 2>&1; then
          gcovr -r . --lcov -o coverage.info || true
        elif command -v lcov >/dev/null 2>&1; then
          lcov -c \
            -d "$PWD/src/.libs" \
            -d "$PWD/converters" \
            -d "$PWD/tests/cli" \
            -d "$PWD/tests/loader" \
            -d "$PWD/tests/filter" \
            -d "$PWD/tests/probe" \
            -d "$PWD/tests/palette" \
            --rc branch_coverage=1 \
            -o coverage.info || true
        else
          echo "No gcovr or lcov found; skipping coverage capture"
        fi

    - name: Fix artifact permissions (Autotools Alpine container)
      if: ${{ always() && (matrix.exec_type || '') == 'alpine' }}
      run: |
        for dir in tests tests/_artifacts; do
          if [ -e "$dir" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$dir"
            sudo find "$dir" -type d -exec chmod u+rwx,go+rx {} +
            sudo find "$dir" -type f -exec chmod u+rw,go+r {} +
          fi
        done

    - name: Upload autotools artifacts
      if: ${{ always() && !((matrix.exec_type || '') == 'cross-platform-vms' || (matrix.exec_type || '') == 'dragonflybsd-vm') }}
      uses: actions/upload-artifact@v4
      with:
        name: autotools-${{ matrix.label }}
        path: |
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
        if-no-files-found: warn
        overwrite: true

    - name: Upload autotools artifacts (cross-platform VMs, dragonflybsd VM)
      if: ${{ always() && ((matrix.exec_type || '') == 'cross-platform-vms' || (matrix.exec_type || '') == 'dragonflybsd-vm') }}
      uses: actions/upload-artifact@v4
      with:
        name: autotools-${{ matrix.label }}
        path: |
          **/test-suite.log
          **/*.log
          **/*.trs
          **/_artifacts/**
          coverage.info
          pkg_install-err.log
          **/artifacts.tar.gz
        if-no-files-found: warn
        overwrite: true

    - name: Upload to Coveralls (per-flag, parallel)
      id: coveralls_upload
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      if: ${{ hashFiles('coverage.info') != '' }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
        flag-name: ${{ matrix.label }}
        parallel: true

    - name: Wait before Coveralls retry (per-flag)
      if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
      run: sleep 5

    - name: Upload to Coveralls (per-flag, retry)
      if: ${{ hashFiles('coverage.info') != '' && steps.coveralls_upload.outcome == 'failure' }}
      continue-on-error: true
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
        flag-name: ${{ matrix.label }}
        parallel: true

  ci-autotools-finish:
    needs: ci-autotools
    runs-on: ubuntu-latest
    steps:
      - name: Finalize Coveralls
        id: coveralls_finalize
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

      - name: Wait before Coveralls retry (finalize)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        run: sleep 5

      - name: Finalize Coveralls (retry)
        if: ${{ steps.coveralls_finalize.outcome == 'failure' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

  ci-dist-meson:
    name: Meson-tarball ${{ matrix.label }}
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux thumbnailer command
            os: ubuntu-latest
            runner: ubuntu-latest
            setup_flags: >-
              -Dpng=disabled -Djpeg=disabled -Dcurl=disabled
              -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled
              -Dpython=disabled -Druby=disabled -Dtests=true
              -Dthumbnailer_command=enabled
          - label: macOS Quick Look extension
            os: macos-latest
            runner: macos-latest
            setup_flags: >-
              -Dpng=disabled -Djpeg=disabled -Dcurl=disabled
              -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled
              -Dpython=disabled -Druby=disabled -Dtests=true
              -Dquicklook_extension=enabled -Dquicklook_preview=enabled
          - label: mingw64 wiccodec
            os: windows-latest
            runner: windows-latest
            msystem: MINGW64
            setup_flags: >-
              --default-library static --wrap-mode=nodownload
              -Dpng=disabled -Djpeg=disabled -Dcurl=disabled
              -Dbashcompletiondir=disabled -Dzshcompletiondir=disabled
              -Dpython=disabled -Druby=disabled -Dtests=true
              -Dwic=enabled -Dwiccodec=enabled
            extra_packages: >-
              python
              ninja
              git
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-ninja

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Install Meson toolchain (non-Windows)
      if: runner.os != 'Windows'
      run: |
        python3 -m venv .meson-venv
        . .meson-venv/bin/activate
        pip install --upgrade pip
        pip install meson ninja
        echo "$PWD/.meson-venv/bin" >> "$GITHUB_PATH"

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: ${{ matrix.extra_packages || 'python ninja git' }}

    - name: Create Meson dist archive (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        meson setup builddir \
          --wrap-mode=nodownload \
          -Dbashcompletiondir=disabled \
          -Dzshcompletiondir=disabled \
          ${{ matrix.setup_flags }}
        meson compile -C builddir -v
        meson dist -C builddir
        ls -l builddir/meson-dist

    - name: Create Meson dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        meson setup builddir \
          -Dbashcompletiondir=disabled \
          -Dzshcompletiondir=disabled \
          ${{ matrix.setup_flags }}
        meson compile -C builddir
        meson dist -C builddir --allow-dirty
        ls -l builddir/meson-dist

    - name: Build from Meson dist archive (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        artifact_dir="dist-build/_artifacts"
        collect_logs() {
          status=$?
          if [ -d "dist-build" ]; then
            mkdir -p "$artifact_dir"
            find dist-build -type f \( -name 'config.log' -o -name 'test-suite.log' -o -name '*.log' -o -name '*.trs' -o -name 'testlog.txt' -o -path '*/meson-logs/*' \) \
              ! -path "dist-build/_artifacts/*" \
              | while IFS= read -r f; do
                  rel="${f#dist-build/}"
                  dest="${artifact_dir}/${rel}"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done || true
          fi
          exit "$status"
        }
        trap 'collect_logs' EXIT

        tarball=$(ls builddir/meson-dist/libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        meson setup build --wrap-mode=nodownload ${{ matrix.setup_flags }}
        meson compile -C build
        meson test -C build

    - name: Build from Meson dist archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        artifact_dir="dist-build/_artifacts"
        collect_logs() {
          status=$?
          if [ -d "dist-build" ]; then
            mkdir -p "$artifact_dir"
            find dist-build -type f \( -name 'config.log' -o -name 'test-suite.log' -o -name '*.log' -o -name '*.trs' -o -name 'testlog.txt' -o -path '*/meson-logs/*' \) \
              ! -path "dist-build/_artifacts/*" \
              | while IFS= read -r f; do
                  rel="${f#dist-build/}"
                  dest="${artifact_dir}/${rel}"
                  mkdir -p "$(dirname "$dest")"
                  cp "$f" "$dest"
                done || true
          fi
          exit "$status"
        }
        trap 'collect_logs' EXIT

        tarball=$(ls builddir/meson-dist/libsixel-*.tar.* | head -n1)
        mkdir dist-build
        tar -xf "$tarball" -C dist-build
        distdir=$(find dist-build -maxdepth 1 -type d -name 'libsixel-*' | head -n1)
        cd "$distdir"
        meson setup build ${{ matrix.setup_flags }}
        meson compile -C build
        meson test -C build

    - name: Upload meson dist artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: meson-dist-${{ matrix.os }}-${{ matrix.msystem || 'native' }}
        path: |
          builddir/meson-dist/**
          dist-build/**/meson-logs/**
          dist-build/**/_artifacts/**
          dist-build/**/testlog.txt
        if-no-files-found: warn

