name: libsixel experimental CI

on:
  push:
    branches-ignore:
      - 'ci/triage/**'
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: experimental-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  vcpkg-msvc-autotools:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: Autotools-msys2-msvc-vcpkg-png-jpeg-tiff-webp-no-lcms2
            buildtool: autotools
            runner: windows-latest
            msystem: MSYS
            setup_options: >-
              --host=x86_64-pc-windows-msvc
              --with-png
              --with-jpeg
              --with-tiff
              --with-webp
              --without-lcms2
              --without-librsvg
              --without-gd
              --without-gdk-pixbuf2
              --without-libcurl
              --without-libfetch
            extra_packages: make
            vcpkg_packages: >-
              libpng
              libjpeg-turbo
              tiff
              libwebp
            exec_type: msys2

          - label: Autotools-msys2-msvc-vcpkg-no-png-jpeg-tiff-webp-lcms2
            buildtool: autotools
            runner: windows-latest
            msystem: MSYS
            setup_options: >-
              --host=x86_64-pc-windows-msvc
              --without-png
              --without-jpeg
              --without-tiff
              --without-webp
              --with-lcms2
              --without-librsvg
              --without-gd
              --without-gdk-pixbuf2
              --without-libcurl
              --without-libfetch
            extra_packages: make
            vcpkg_packages: lcms
            exec_type: msys2

          - label: Autotools-msys2-msvc-vcpkg-png-jpeg-tiff-webp-lcms2
            buildtool: autotools
            runner: windows-latest
            msystem: MSYS
            setup_options: >-
              --host=x86_64-pc-windows-msvc
              --with-png
              --with-jpeg
              --with-tiff
              --with-webp
              --with-lcms2
              --without-librsvg
              --without-gd
              --without-gdk-pixbuf2
              --without-libcurl
              --without-libfetch
            extra_packages: make
            vcpkg_packages: >-
              libpng
              libjpeg-turbo
              tiff
              libwebp
              lcms
            exec_type: msys2

          - label: Meson-msys2-msvc-vcpkg-png-jpeg-tiff-webp-lcms2
            buildtool: meson
            runner: windows-latest
            msystem: MSYS
            setup_options: >-
              --native-file build-aux/meson-native/msvc.ini
              --native-file build-aux/meson-native/msvc-vcpkg.ini
              -Dpng=enabled
              -Djpeg=enabled
              -Dtiff=enabled
              -Dwebp=enabled
              -Dlcms2=enabled
              -Dlibrsvg=disabled
              -Dgd=disabled
              -Dgdk_pixbuf2=disabled
              -Dcurl=disabled
              -Dfetch=disabled
            extra_packages: >-
              make
              meson
              ninja
            vcpkg_packages: >-
              libpng
              libjpeg-turbo
              tiff
              libwebp
              lcms
            exec_type: msys2

    steps:
      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}
