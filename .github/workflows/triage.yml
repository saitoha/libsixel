name: libsixel CI triage

on:
  push:
    branches:
      - 'ci/triage/**'
  workflow_dispatch:
    inputs:
      workflow_file:
        description: Target workflow file to inspect
        required: true
        default: experimental.yml
        type: choice
        options:
          - experimental.yml
          - ci.yml
          - fuzzing.yml
      source_branch:
        description: Branch to search for the latest failed run
        required: true
        default: develop
        type: string
      source_run_id:
        description: Optional source run id. Uses latest failed target run when empty
        required: false
        default: ''
        type: string
      max_jobs:
        description: Maximum failed jobs to replay
        required: true
        default: '8'
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: triage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin vcpkg to a stable release to avoid fetching future tool builds that
  # depend on unavailable CMake versions during bootstrap.
  VCPKG_REF: 2024.12.16
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

jobs:
  collect:
    name: Collect failed jobs
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.collect.outputs.count }}
      fuzz_labels: ${{ steps.collect.outputs.fuzz_labels }}
      matrix: ${{ steps.collect.outputs.matrix }}
      replay_kind: ${{ steps.collect.outputs.replay_kind }}
      source_run_id: ${{ steps.collect.outputs.source_run_id }}
      workflow_file: ${{ steps.collect.outputs.workflow_file }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Collect failed jobs from target workflow
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_JOBS: ${{ inputs.max_jobs || '8' }}
          SOURCE_BRANCH: ${{ inputs.source_branch || 'develop' }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id || '' }}
          WORKFLOW_FILE: ${{ inputs.workflow_file || 'experimental.yml' }}
        shell: bash
        run: |
          set -euo pipefail

          case "$WORKFLOW_FILE" in
            experimental.yml|ci.yml|fuzzing.yml)
              ;;
            fuzz.yml)
              WORKFLOW_FILE=fuzzing.yml
              ;;
            *)
              echo "::error::unsupported triage workflow: $WORKFLOW_FILE"
              exit 1
              ;;
          esac

          if test -n "$SOURCE_RUN_ID"; then
            run_id="$SOURCE_RUN_ID"
          else
            run_id="$(
              gh api \
                --method GET \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_FILE}/runs" \
                -f branch="$SOURCE_BRANCH" \
                -f status=completed \
                -f per_page=20 \
                --jq '.workflow_runs[] | select(.conclusion == "failure") | .id' |
                sed -n '1p'
            )"
          fi

          if test -z "$run_id"; then
            echo "::notice::no failed ${WORKFLOW_FILE} run found on ${SOURCE_BRANCH}."
            {
              echo 'matrix={"include":[]}'
              echo 'fuzz_labels=||'
              echo 'count=0'
              echo 'replay_kind=none'
              echo 'source_run_id='
              echo "workflow_file=$WORKFLOW_FILE"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failed_jobs_json="$(
            gh api \
              --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '.jobs[] | select(.conclusion == "failure") | .name' |
              ruby -rjson -e 'puts JSON.generate(STDIN.read.lines.map(&:chomp))'
          )"

          RUN_ID="$run_id" FAILED_JOBS_JSON="$failed_jobs_json" ruby <<'RUBY'
          require 'json'
          require 'yaml'

          def ci_steps_job?(job)
            (job['steps'] || []).any? do |step|
              step.is_a?(Hash) && step['uses'] == './.github/actions/ci-steps'
            end
          end

          def matrix_entries(job)
            matrix = job.dig('strategy', 'matrix') || {}
            include_entries = matrix['include']
            return include_entries if include_entries.is_a?(Array)

            axes = matrix.reject { |key, _| %w[include exclude].include?(key) }
            return [{}] if axes.empty?

            axes.reduce([{}]) do |entries, (axis, values)|
              entries.flat_map do |entry|
                values.map { |value| entry.merge(axis => value) }
              end
            end
          end

          def buildtool_prefix(entry, autotools_prefix, meson_prefix)
            entry['buildtool'] == 'autotools' ? autotools_prefix : meson_prefix
          end

          def render_fuzzing_label(job_id, entry)
            case job_id
            when 'fuzz_push_full', 'fuzz_push_encode_helpers'
              format(
                '%s-fuzz-%s',
                buildtool_prefix(
                  entry,
                  'Autotools-ubuntu-x86_64-gcc',
                  'Meson-ubuntu-x86_64-gcc'
                ),
                entry.fetch('target')
              )
            when 'fuzz_push_loader_formats'
              format(
                '%s-fuzz-loader-%s',
                buildtool_prefix(
                  entry,
                  'Autotools-ubuntu-x86_64-gcc',
                  'Meson-ubuntu-x86_64-gcc'
                ),
                entry.fetch('target')
              )
            when 'fuzz_push_loader_autodetect'
              format(
                '%s-fuzz-loader-autodetect',
                buildtool_prefix(
                  entry,
                  'Autotools-ubuntu-x86_64-gcc',
                  'Meson-ubuntu-x86_64-gcc'
                )
              )
            when 'fuzz_push_cli_img2sixel'
              format(
                '%s-fuzz-cli-img2sixel-%s',
                buildtool_prefix(
                  entry,
                  'Autotools-ubuntu-x86_64-clang',
                  'Meson-ubuntu-x86_64-clang'
                ),
                entry.fetch('target')
              )
            when 'fuzz_push_loader_coregraphics'
              format(
                '%s-fuzz-loader-coregraphics',
                buildtool_prefix(
                  entry,
                  'Autotools-macos-aarch64-clang',
                  'Meson-macos-aarch64-clang'
                )
              )
            when 'fuzz_push_loader_wic_detect'
              'Meson-cmd-x86_64-msvc-fuzz-loader-wic-detect'
            when 'fuzz_push_loader_wic_repro_nosan'
              'Meson-cmd-x86_64-msvc-fuzz-loader-wic-repro-nosan'
            end
          end

          workflow_file = ENV.fetch('WORKFLOW_FILE')
          failed_jobs = JSON.parse(ENV.fetch('FAILED_JOBS_JSON'))
          max_jobs = Integer(ENV.fetch('MAX_JOBS'))
          workflow = YAML.load_file(".github/workflows/#{workflow_file}")
          include_entries = []
          fuzz_labels = []
          replay_kind = workflow_file == 'fuzzing.yml' ? 'fuzzing' : 'ci_steps'

          workflow.fetch('jobs').each do |job_id, job|
            next unless job.is_a?(Hash)

            if workflow_file == 'fuzzing.yml'
              matrix_entries(job).each do |entry|
                label = render_fuzzing_label(job_id, entry)
                next if label.nil?
                next unless failed_jobs.include?(label)

                fuzz_labels << label
              end
              next
            end

            unless ci_steps_job?(job)
              next
            end

            matrix_entries(job).each do |entry|
              next unless entry.is_a?(Hash)
              next unless failed_jobs.include?(entry['label'])

              replay_entry = entry.dup
              replay_entry['runner'] ||= job['runs-on']
              include_entries << replay_entry
            end
          end

          if workflow_file == 'fuzzing.yml'
            fuzz_labels = fuzz_labels.uniq.first(max_jobs)
            wic_repro = 'Meson-cmd-x86_64-msvc-fuzz-loader-wic-repro-nosan'
            wic_detect = 'Meson-cmd-x86_64-msvc-fuzz-loader-wic-detect'
            if fuzz_labels.include?(wic_repro) && !fuzz_labels.include?(wic_detect)
              fuzz_labels.unshift(wic_detect)
            end
          else
            include_entries = include_entries.first(max_jobs)
          end

          matrix = { 'include' => include_entries }
          fuzz_label_set = "|#{fuzz_labels.join('|')}|"
          count = workflow_file == 'fuzzing.yml' ? fuzz_labels.length : include_entries.length

          File.open(ENV.fetch('GITHUB_OUTPUT'), 'a') do |output|
            output.puts("matrix=#{JSON.generate(matrix)}")
            output.puts("fuzz_labels=#{fuzz_label_set}")
            output.puts("count=#{count}")
            output.puts("replay_kind=#{replay_kind}")
            output.puts("source_run_id=#{ENV.fetch('RUN_ID')}")
            output.puts("workflow_file=#{workflow_file}")
          end

          if count.zero?
            warn 'No failed job names matched the target workflow matrix labels.'
          elsif workflow_file == 'fuzzing.yml'
            fuzz_labels.each do |label|
              puts "triage: #{label}"
            end
          else
            include_entries.each do |entry|
              puts "triage: #{entry.fetch('label')}"
            end
          end
          RUBY

  ci-steps:
    needs: collect
    if: >-
      ${{
        needs.collect.outputs.replay_kind == 'ci_steps'
        && needs.collect.outputs.count != '0'
      }}
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.collect.outputs.matrix) }}
    steps:
      - name: Report triage selection
        env:
          MATRIX_JSON: ${{ needs.collect.outputs.matrix }}
          SOURCE_RUN_ID: ${{ needs.collect.outputs.source_run_id }}
          WORKFLOW_FILE: ${{ needs.collect.outputs.workflow_file }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "workflow: ${WORKFLOW_FILE}"
            echo "source run: ${SOURCE_RUN_ID}"
            echo
            echo '```json'
            echo "$MATRIX_JSON"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set Windows Defender ExclusionPath (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "C:\a" -ErrorAction Stop
          } catch {
            Write-Warning "Windows Defender exclusion setup failed; continuing: $($_.Exception.Message)"
          }

      - name: Disable Windows Search Indexer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Stop-Service WSearch

      - name: Configure git EOL
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run CI steps
        uses: ./.github/actions/ci-steps
        with:
          matrix_json: ${{ toJSON(matrix) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  fuzzing:
    needs: collect
    if: >-
      ${{
        needs.collect.outputs.replay_kind == 'fuzzing'
        && needs.collect.outputs.count != '0'
      }}
    name: Dispatch fuzzing replay
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Report triage selection
        env:
          FUZZ_LABELS: ${{ needs.collect.outputs.fuzz_labels }}
          SOURCE_RUN_ID: ${{ needs.collect.outputs.source_run_id }}
          WORKFLOW_FILE: ${{ needs.collect.outputs.workflow_file }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "workflow: ${WORKFLOW_FILE}"
            echo "source run: ${SOURCE_RUN_ID}"
            echo
            echo '```'
            printf '%s\n' "$FUZZ_LABELS" | tr '|' '\n' | sed '/^$/d'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch fuzzing workflow replay
        env:
          FUZZ_LABELS: ${{ needs.collect.outputs.fuzz_labels }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ needs.collect.outputs.source_run_id }}
          WORKFLOW_FILE: ${{ needs.collect.outputs.workflow_file }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run "$WORKFLOW_FILE" \
            --ref "$GITHUB_REF_NAME" \
            -f "triage_job_labels=$FUZZ_LABELS" \
            -f "triage_source_run_id=$SOURCE_RUN_ID"
